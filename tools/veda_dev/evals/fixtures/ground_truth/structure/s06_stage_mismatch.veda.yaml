model:
  name: EvalStructureStageMismatch
  regions: [R1]
  milestone_years: [2020, 2030]
  commodities:
    - id: secondary:electricity
      type: energy
      unit: PJ
      combustible: false
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0

process_roles:
  - id: export_power
    stage: supply
    activity_unit: PJ
    capacity_unit: GW
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

process_variants:
  - id: odd_supply_ccgt
    role: export_power
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
