dsl_version: "0.2"
commodities:
  - id: service:heat
    kind: service
  - id: primary:natural_gas
    kind: material
technologies:
  - id: baseline
    provides: service:heat
    performance:
      kind: efficiency
      value: 0.9
  - id: feed_additives
    provides: service:heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.95
technology_roles:
  - id: provide_heat_from_gas
    primary_service: service:heat
    technologies: [baseline, feed_additives]
