dsl_version: "0.2"
commodities:
  - id: service:heat
    kind: service
  - id: primary:natural_gas
    kind: material
technologies:
  - id: gas_boiler
    provides: service:heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.9
technology_roles:
  - id: heat_supply
    primary_service: service:heat
    technologies: [gas_boiler]
