dsl_version: "0.3"
commodities:
  - id: mobility
    type: service
  - id: heat
    type: service
  - id: electricity
    type: energy
    energy_form: secondary
  - id: natural_gas
    type: energy
    energy_form: primary
technologies:
  - id: ev_car
    provides: mobility
    inputs:
      - commodity: electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: heat_pump
    provides: heat
    inputs:
      - commodity: electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_boiler
    provides: heat
    inputs:
      - commodity: natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.9
technology_roles:
  - id: mobility_supply
    primary_service: mobility
    technologies:
      - ev_car
  - id: heat_supply
    primary_service: heat
    technologies:
      - heat_pump
      - gas_boiler
