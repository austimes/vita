dsl_version: "0.2"
commodities:
  - id: service:mobility
    kind: service
  - id: service:heat
    kind: service
  - id: secondary:electricity
    kind: secondary
  - id: primary:natural_gas
    kind: primary
technologies:
  - id: ev_car
    provides: service:mobility
    inputs:
      - commodity: secondary:electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: heat_pump
    provides: service:heat
    inputs:
      - commodity: secondary:electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_boiler
    provides: service:heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.9
technology_roles:
  - id: mobility_supply
    primary_service: service:mobility
    technologies: [ev_car]
  - id: heat_supply
    primary_service: service:heat
    technologies: [heat_pump, gas_boiler]
