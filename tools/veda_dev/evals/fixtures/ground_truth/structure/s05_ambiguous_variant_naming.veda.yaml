dsl_version: "0.3"
commodities:
  - id: ag_output
    type: service
  - id: biomass
    type: energy
    energy_form: primary
technologies:
  - id: traditional_baseline
    provides: ag_output
    inputs:
      - commodity: biomass
        basis: HHV
    performance:
      kind: efficiency
      value: 0.5
  - id: feed_additives
    provides: ag_output
    inputs:
      - commodity: biomass
        basis: HHV
    performance:
      kind: efficiency
      value: 0.6
technology_roles:
  - id: ag_output_supply
    primary_service: ag_output
    technologies:
      - traditional_baseline
      - feed_additives
