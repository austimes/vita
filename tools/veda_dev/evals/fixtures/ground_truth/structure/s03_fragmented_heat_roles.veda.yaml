dsl_version: "0.2"
commodities:
  - id: service:heat
    kind: service
  - id: secondary:electricity
    kind: secondary
  - id: primary:natural_gas
    kind: primary
technologies:
  - id: electric_heater
    provides: service:heat
    inputs:
      - commodity: secondary:electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_heater
    provides: service:heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.9
technology_roles:
  - id: provide_heat_from_power
    primary_service: service:heat
    technologies: [electric_heater]
  - id: provide_heat_from_gas
    primary_service: service:heat
    technologies: [gas_heater]
