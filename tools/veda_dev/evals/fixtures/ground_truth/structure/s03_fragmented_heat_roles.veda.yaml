dsl_version: "0.3"
commodities:
  - id: heat
    type: service
  - id: electricity
    type: energy
    energy_form: secondary
  - id: natural_gas
    type: energy
    energy_form: primary
technologies:
  - id: electric_heater
    provides: heat
    inputs:
      - commodity: electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_heater
    provides: heat
    inputs:
      - commodity: natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.9
technology_roles:
  - id: provide_heat_from_power
    primary_service: heat
    technologies:
      - electric_heater
  - id: provide_heat_from_gas
    primary_service: heat
    technologies:
      - gas_heater
