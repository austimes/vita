dsl_version: "0.3"
commodities:
  - id: heat
    type: service
  - id: electricity
    type: energy
    energy_form: secondary
  - id: natural_gas
    type: energy
    energy_form: primary
technologies:
  - id: grid_import
    provides: electricity
    outputs:
      - commodity: electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_import
    provides: natural_gas
    outputs:
      - commodity: natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 1.0
  - id: heat_pump
    provides: heat
    inputs:
      - commodity: electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_boiler
    provides: heat
    inputs:
      - commodity: natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.9
technology_roles:
  - id: electricity_supply
    primary_service: electricity
    technologies:
      - grid_import
  - id: gas_supply
    primary_service: natural_gas
    technologies:
      - gas_import
  - id: heat_supply
    primary_service: heat
    technologies:
      - heat_pump
      - gas_boiler
