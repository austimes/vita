model:
  name: EvalStructureClean01
  regions: [R1]
  milestone_years: [2020, 2030]
  commodities:
    - id: service:heat
      type: service
      unit: PJ
      combustible: false
    - id: secondary:electricity
      type: energy
      unit: PJ
      combustible: false
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0

roles:
  - id: supply_electricity
    stage: supply
    activity_unit: PJ
    capacity_unit: GW
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity
  - id: supply_gas
    stage: supply
    activity_unit: PJ
    capacity_unit: GW
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas
  - id: provide_heat
    stage: end_use
    activity_unit: PJ
    capacity_unit: GW
    required_inputs: []
    required_outputs:
      - commodity: service:heat

variants:
  - id: grid_import
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
  - id: gas_import
    role: supply_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
  - id: heat_pump
    role: provide_heat
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:heat
    efficiency: 1.0
  - id: gas_boiler
    role: provide_heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: service:heat
    efficiency: 0.9
