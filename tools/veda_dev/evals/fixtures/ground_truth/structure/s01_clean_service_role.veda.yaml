dsl_version: "0.2"
commodities:
  - id: service:heat
    kind: service
  - id: secondary:electricity
    kind: secondary
  - id: primary:natural_gas
    kind: primary
technologies:
  - id: grid_import
    provides: secondary:electricity
    outputs:
      - commodity: secondary:electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_import
    provides: primary:natural_gas
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 1.0
  - id: heat_pump
    provides: service:heat
    inputs:
      - commodity: secondary:electricity
    performance:
      kind: efficiency
      value: 1.0
  - id: gas_boiler
    provides: service:heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    performance:
      kind: efficiency
      value: 0.9
technology_roles:
  - id: electricity_supply
    primary_service: secondary:electricity
    technologies: [grid_import]
  - id: gas_supply
    primary_service: primary:natural_gas
    technologies: [gas_import]
  - id: heat_supply
    primary_service: service:heat
    technologies: [heat_pump, gas_boiler]
