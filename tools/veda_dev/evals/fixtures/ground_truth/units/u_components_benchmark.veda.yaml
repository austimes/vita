model:
  name: EvalUnitsBenchmark
  monetary:
    canonical: MAUD24
  regions: [R1]
  milestone_years: [2020, 2030]
  commodities:
    - id: service:heat
      type: service
      unit: PJ
      combustible: false
    - id: service:mobility
      type: service
      unit: Bvkm
      combustible: false
    - id: secondary:electricity
      type: energy
      unit: PJ
      combustible: false
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0
    - id: material:steam
      type: other
      unit: Mt
      combustible: false

process_roles:
  - id: supply_electricity
    stage: supply
    activity_unit: PJ
    capacity_unit: GW
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity
  - id: supply_gas
    stage: supply
    activity_unit: PJ
    capacity_unit: GW
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas
  - id: provide_heat
    stage: end_use
    activity_unit: PJ
    capacity_unit: GW
    required_inputs: []
    required_outputs:
      - commodity: service:heat
  - id: provide_mobility
    stage: end_use
    activity_unit: Bvkm
    capacity_unit: Bvkm/yr
    required_inputs: []
    required_outputs:
      - commodity: service:mobility
  - id: make_steam
    stage: conversion
    activity_unit: Mt
    capacity_unit: Mt/yr
    required_inputs: []
    required_outputs:
      - commodity: material:steam

process_variants:
  - id: electricity_import
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
  - id: gas_import
    role: supply_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0

  - id: heat_clean_1
    role: provide_heat
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:heat
    efficiency: 1.0
    variable_om_cost: "10 MAUD24/PJ"
    investment_cost: "120 MAUD24/GW"

  - id: heat_missing_basis_1
    role: provide_heat
    inputs:
      - commodity: primary:natural_gas
    outputs:
      - commodity: service:heat
    efficiency: 0.9
    variable_om_cost: "12 MAUD24/PJ"
    investment_cost: "90 MAUD24/GW"

  - id: heat_bad_variable_cost_1
    role: provide_heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: service:heat
    efficiency: 0.9
    variable_om_cost: "12 MAUD24/GW"
    investment_cost: "95 MAUD24/GW"

  - id: heat_bad_investment_cost_1
    role: provide_heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: service:heat
    efficiency: 0.9
    variable_om_cost: "10 MAUD24/PJ"
    investment_cost: "60 MAUD24/PJ"

  - id: heat_bad_capacity_denom_1
    role: provide_heat
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:heat
    efficiency: 1.0
    variable_om_cost: "9 MAUD24/PJ"
    investment_cost: "40 MAUD24/Bvkm/yr"

  - id: mobility_clean_1
    role: provide_mobility
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:mobility
    efficiency: 1.0
    variable_om_cost: "20 MAUD24/Bvkm"
    investment_cost: "70 MAUD24/Bvkm/yr"

  - id: mobility_bad_variable_cost_1
    role: provide_mobility
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:mobility
    efficiency: 1.0
    variable_om_cost: "20 MAUD24/PJ"
