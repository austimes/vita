# VedaLang Pattern Library
# Reusable patterns for common modeling constructs.
# Active expansion support is TableIR-only.

patterns:
  # ============================================================================
  # Power Generation Patterns
  # ============================================================================
  
  add_power_plant:
    description: |
      Define a thermal generation process that converts fuel to electricity.
      Suitable for coal, gas, oil, and biomass power plants.
    category: generation
    parameters:
      - name: plant_name
        type: string
        required: true
        description: Unique identifier for the power plant (e.g., PP_CCGT_01)
      - name: fuel_commodity
        type: string
        required: true
        description: Input fuel commodity using namespaced ID (e.g., primary:natural_gas, primary:coal)
      - name: output_commodity
        type: string
        required: true
        description: Output commodity using namespaced ID (e.g., secondary:electricity)
      - name: efficiency
        type: number
        required: false
        default: 0.40
        description: Thermal efficiency (0-1)
      - name: capacity_unit
        type: string
        required: false
        default: GW
        description: Unit for capacity (GW, MW)
      - name: activity_unit
        type: string
        required: false
        default: PJ
        description: Unit for activity/generation (PJ, TWh)
      - name: emission_factor
        type: number
        required: false
        default: 0.05
        description: CO2 emission factor per unit activity
    example:
      plant_name: PP_CCGT
      fuel_commodity: primary:natural_gas
      output_commodity: secondary:electricity
      efficiency: 0.55
      emission_factor: 0.05

  add_renewable_plant:
    description: |
      Define a renewable generation process (solar, wind, hydro).
      No fuel input required - uses availability factors.
    category: generation
    parameters:
      - name: plant_name
        type: string
        required: true
      - name: output_commodity
        type: string
        required: true
        default: secondary:electricity
      - name: technology_type
        type: string
        required: true
        enum: [solar_pv, wind_onshore, wind_offshore, hydro_ror, hydro_dam]
      - name: capacity_unit
        type: string
        default: GW
  add_chp_plant:
    description: |
      Define a Combined Heat and Power (CHP) process that produces multiple
      useful outputs (electricity + heat) from a single fuel input.
      Output shares represent the fraction of activity going to each output.
      The sum of output shares should equal the total efficiency.
    category: generation
    parameters:
      - name: plant_name
        type: string
        required: true
        description: Unique identifier for the CHP plant (e.g., CHP_GAS_01)
      - name: fuel_commodity
        type: string
        required: true
        description: Input fuel commodity using namespaced ID (e.g., primary:natural_gas)
      - name: electricity_commodity
        type: string
        required: false
        default: secondary:electricity
        description: Electricity output commodity
      - name: heat_commodity
        type: string
        required: true
        description: Heat output commodity using namespaced ID (e.g., secondary:heat)
      - name: elec_share
        type: number
        required: false
        default: 0.35
        description: Fraction of activity to electricity (0-1)
      - name: heat_share
        type: number
        required: false
        default: 0.45
        description: Fraction of activity to heat (0-1)
      - name: total_efficiency
        type: number
        required: false
        default: 0.80
        description: Total efficiency (should equal elec_share + heat_share)
    example:
      plant_name: CHP_GAS
      fuel_commodity: primary:natural_gas
      electricity_commodity: secondary:electricity
      heat_commodity: secondary:heat
      elec_share: 0.40
      heat_share: 0.50
      total_efficiency: 0.90

  add_storage:
    description: |
      Define an energy storage process that shifts energy across time.
      Uses the same commodity for input and output with round-trip efficiency.
      Note: Full temporal behavior requires timeslice definitions.
    category: storage
    parameters:
      - name: storage_name
        type: string
        required: true
        description: Unique identifier for the storage (e.g., STG_BATTERY)
      - name: commodity
        type: string
        required: true
        description: Commodity to store using namespaced ID (e.g., secondary:electricity, secondary:heat)
      - name: round_trip_efficiency
        type: number
        required: false
        default: 0.85
        description: Round-trip efficiency (0-1), includes charging and discharging losses
      - name: capacity_unit
        type: string
        required: false
        default: GW
        description: Unit for power capacity
    example:
      storage_name: STG_BATTERY
      commodity: secondary:electricity
      round_trip_efficiency: 0.85
      capacity_unit: GW

  # ============================================================================
  # Commodity Patterns
  # ============================================================================
  
  add_energy_commodity:
    description: Define an energy carrier commodity (fuel, electricity).
    category: commodity
    parameters:
      - name: name
        type: string
        required: true
      - name: unit
        type: string
        default: PJ
      - name: description
        type: string
        default: ""
  add_emission_commodity:
    description: Define an emission commodity (CO2, NOx, etc.).
    category: commodity
    parameters:
      - name: name
        type: string
        required: true
      - name: unit
        type: string
        default: Mt
  # ============================================================================
  # Scenario Patterns (TableIR level)
  # ============================================================================
  
  co2_price_trajectory:
    description: |
      Define a CO2 price trajectory over time.
      Used for carbon pricing scenarios.
    category: scenario
    parameters:
      - name: prices
        type: object
        required: true
        description: "Dictionary of year -> price (e.g., {2025: 50, 2030: 100})"
      - name: region
        type: string
        default: REG1
    tableir_template: |
      tag: ~TFM_INS-TS
      rows:
        {% for year, price in prices.items() %}
        - Region: {{ region }}
          YEAR: {{ year }}
          Pset_CO: emission:co2
          COST: {{ price }}
        {% endfor %}
