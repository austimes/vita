schema_version: 1
id: toy_industry_core
title: "Industrial heat decarbonisation: switching, drivers, and hydrogen marginal"
question: >
  Apply an emissions-constraining gas activity cap to stylised industrial heat demand
  with gas, e-heat, and H2. Track cap-driven switching, separate policy-vs-price
  cost drivers, and measure hydrogen marginal contribution under a binding cap.

extensions:
  - id: A
    question: >
      As the gas activity cap tightens, where are the switching points across gas,
      e-heat, and H2?
  - id: B
    question: >
      Is cost pressure (fuel price) or policy pressure (mid cap) the bigger driver of
      system cost changes?
  - id: C
    question: >
      Under a binding mid cap, what is hydrogen's marginal contribution to objective
      movement when delivered H2 price increases?

defaults:
  case: scenario
  no_sankey: true
  metrics:
    - objective
    - objective_breakdown
    - var_act
    - var_ncap
    - var_cap
    - var_flo
  checks:
    require_pipeline_success: true
    require_solver_status:
      - optimal

baseline:
  id: baseline
  model: ../../models/demos/toy_industry_switch_base.veda.yaml
  run: single_2025
  notes: >
    Calibrated baseline with fixed heat demand (ACT_BND FX = 0.1242 PJ) and no gas
    activity cap.

variants:
  - id: co2_cap_loose
    from: baseline
    model: ../../models/demos/toy_industry_switch_cap_loose.veda.yaml
    run: single_2025
    hypothesis: >
      Loose cap (gas ACT_BND UP = 0.10 PJ) remains gas-led with initial clean-heat
      backfill.

  - id: co2_cap_mid
    from: baseline
    model: ../../models/demos/toy_industry_switch_cap_mid.veda.yaml
    run: single_2025
    hypothesis: >
      Mid cap (gas ACT_BND UP = 0.06 PJ) should force substantial substitution from gas
      toward e-heat.

  - id: co2_cap_tight
    from: baseline
    model: ../../models/demos/toy_industry_switch_cap_tight.veda.yaml
    run: single_2025
    hypothesis: >
      Tight cap (gas ACT_BND UP = 0.02 PJ) should create an e-heat-heavy dispatch.

  - id: high_gas_price
    from: baseline
    model: ../../models/demos/toy_industry_switch_high_gas_price.veda.yaml
    run: single_2025
    hypothesis: >
      Cost-only stress (pipe_ng ACT_COST 8 -> 20 AUD/MWh) increases objective even
      without cap tightening.

  - id: high_gas_price_co2_cap_mid
    from: baseline
    model: ../../models/demos/toy_industry_switch_high_gas_price_cap_mid.veda.yaml
    run: single_2025
    hypothesis: >
      Combined stress (mid cap + high gas price) should add only modest incremental
      objective movement beyond policy-only mid cap.

  - id: high_h2_price_co2_cap_mid
    from: baseline
    model: ../../models/demos/toy_industry_switch_high_h2_price_cap_mid.veda.yaml
    run: single_2025
    hypothesis: >
      Under mid cap, higher delivered H2 cost (pipe_h2 ACT_COST 18 -> 35 AUD/MWh)
      isolates hydrogen's marginal cost contribution.

comparisons:
  - id: baseline_vs_co2_cap_loose
    baseline: baseline
    variant: co2_cap_loose

  - id: baseline_vs_co2_cap_mid
    baseline: baseline
    variant: co2_cap_mid

  - id: baseline_vs_co2_cap_tight
    baseline: baseline
    variant: co2_cap_tight

  - id: co2_cap_loose_vs_co2_cap_mid
    baseline: co2_cap_loose
    variant: co2_cap_mid

  - id: co2_cap_mid_vs_co2_cap_tight
    baseline: co2_cap_mid
    variant: co2_cap_tight

  - id: baseline_vs_high_gas_price
    baseline: baseline
    variant: high_gas_price

  - id: baseline_vs_high_gas_price_co2_cap_mid
    baseline: baseline
    variant: high_gas_price_co2_cap_mid

  - id: co2_cap_mid_vs_high_gas_price_co2_cap_mid
    baseline: co2_cap_mid
    variant: high_gas_price_co2_cap_mid

  - id: co2_cap_mid_vs_high_h2_price_co2_cap_mid
    baseline: co2_cap_mid
    variant: high_h2_price_co2_cap_mid

analyses:
  - id: extension_a_switching
    question: >
      As the cap tightens, how do gas/e-heat/H2 dispatch shares and objective outcomes
      move across the ladder?
    comparisons:
      - baseline_vs_co2_cap_loose
      - baseline_vs_co2_cap_mid
      - baseline_vs_co2_cap_tight
      - co2_cap_loose_vs_co2_cap_mid
      - co2_cap_mid_vs_co2_cap_tight
    metrics_of_interest:
      - objective
      - objective_breakdown
      - var_act
      - var_ncap
      - var_cap
      - var_flo

  - id: extension_b_drivers
    question: >
      Compare policy-only, cost-only, and combined stress to isolate dominant objective
      drivers.
    comparisons:
      - baseline_vs_co2_cap_mid
      - baseline_vs_high_gas_price
      - baseline_vs_high_gas_price_co2_cap_mid
      - co2_cap_mid_vs_high_gas_price_co2_cap_mid
    metrics_of_interest:
      - objective
      - objective_breakdown
      - var_act
      - var_ncap
      - var_cap

  - id: extension_c_hydrogen_marginal
    question: >
      Under a binding mid cap, what additional objective movement appears when only H2
      delivered price is stressed?
    comparisons:
      - baseline_vs_co2_cap_mid
      - co2_cap_mid_vs_high_h2_price_co2_cap_mid
      - baseline_vs_co2_cap_tight
    metrics_of_interest:
      - objective
      - objective_breakdown
      - var_act
      - var_ncap
      - var_cap
      - var_flo
