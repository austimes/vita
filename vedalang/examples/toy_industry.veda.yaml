model:
  name: ToyIndustry
  description: Industrial heat decarbonisation with gas, electricity, and hydrogen
    competing under tightening CO2 cap
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: service:industrial_heat
      type: service
      unit: PJ
      description: Industrial heat demand
      combustible: false
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity
      combustible: false
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      description: Natural gas
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0
    - id: secondary:hydrogen
      type: energy
      unit: PJ
      description: Hydrogen
      combustible: true
      lhv_mj_per_unit: 120.0
      hhv_mj_per_unit: 132.0
    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide
      combustible: false
  constraints:
    - name: CO2_CAP
      type: emission_cap
      commodity: emission:co2
      limtype: up
      interpolation: interp_extrap
      years:
        "2020": 5
        "2030": 3
        "2040": 1
        "2050": 0.5
segments:
  sectors:
    - IND
process_roles:
  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas
  - id: import_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity
  - id: import_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:hydrogen
  - id: provide_industrial_heat
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:industrial_heat
process_variants:
  - id: pipeline_gas_supply
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8 MUSD24/PJ
    variable_om_cost_basis: HHV
  - id: grid_electricity_supply
    role: import_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25 MUSD24/PJ
  - id: pipeline_hydrogen_supply
    role: import_hydrogen
    inputs: []
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost:
      values:
        "2020": 40 MUSD24/PJ
        "2030": 30 MUSD24/PJ
        "2040": 22 MUSD24/PJ
        "2050": 18 MUSD24/PJ
      interpolation: interp_extrap
    variable_om_cost_basis: HHV
  - id: gas_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.9
    lifetime: 30
    investment_cost: 50 MUSD24/GW
    emission_factors:
      emission:co2: 0.056
    emission_factor_basis: HHV
  - id: electric_heater
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.95
    lifetime: 30
    investment_cost: 80 MUSD24/GW
  - id: h2_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.85
    lifetime: 30
    investment_cost: 100 MUSD24/GW
availability:
  - variant: pipeline_gas_supply
    regions:
      - SINGLE
  - variant: grid_electricity_supply
    regions:
      - SINGLE
  - variant: pipeline_hydrogen_supply
    regions:
      - SINGLE
  - variant: gas_boiler
    regions:
      - SINGLE
    sectors:
      - IND
  - variant: electric_heater
    regions:
      - SINGLE
    sectors:
      - IND
  - variant: h2_boiler
    regions:
      - SINGLE
    sectors:
      - IND
process_parameters:
  - selector:
      variant: pipeline_gas_supply
      region: SINGLE
    stock: 1000
  - selector:
      variant: grid_electricity_supply
      region: SINGLE
    stock: 1000
  - selector:
      variant: pipeline_hydrogen_supply
      region: SINGLE
    stock: 1000
  - selector:
      variant: gas_boiler
      region: SINGLE
      sector: IND
    stock: 5
    cap_bound:
      up: 100
  - selector:
      variant: electric_heater
      region: SINGLE
      sector: IND
    stock: 1
    cap_bound:
      up: 100
  - selector:
      variant: h2_boiler
      region: SINGLE
      sector: IND
    stock: 0.5
    cap_bound:
      up: 100
demands:
  - commodity: service:industrial_heat
    region: SINGLE
    sector: IND
    interpolation: interp_extrap
    values:
      "2020": 50
      "2050": 50
