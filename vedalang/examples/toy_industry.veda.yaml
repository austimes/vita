# Model: core system definition (regions, years, commodities, cases).
model:
  name: ToyIndustry
  description: Industrial heat decarbonisation with gas, electricity, and hydrogen
    competing under tightening CO2 cap
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: emission:co2
      description: Carbon dioxide
      type: emission
      unit: Mt
      combustible: false

    - id: primary:natural_gas
      description: Natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: secondary:hydrogen
      description: Hydrogen
      type: energy
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 132.0
      lhv_mj_per_unit: 120.0

    - id: service:industrial_heat
      description: Industrial heat demand
      type: service
      unit: PJ
      combustible: false
  constraints:
    - name: CO2_CAP
      type: emission_cap
      commodity: emission:co2
      years:
        "2020": 5
        "2030": 3
        "2040": 1
        "2050": 0.5
      interpolation: interp_extrap
      limtype: up

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - IND

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: import_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: import_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:hydrogen

  - id: provide_industrial_heat
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:industrial_heat

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: electric_heater
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.95
    investment_cost: 80 MUSD24/GW
    lifetime: 30

  - id: gas_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    emission_factors:
      emission:co2: 0.056
    efficiency: 0.9
    emission_factor_basis: HHV
    investment_cost: 50 MUSD24/GW
    lifetime: 30

  - id: grid_electricity_supply
    role: import_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25 MUSD24/PJ

  - id: h2_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.85
    investment_cost: 100 MUSD24/GW
    lifetime: 30

  - id: pipeline_gas_supply
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: pipeline_hydrogen_supply
    role: import_hydrogen
    inputs: []
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost:
      values:
        "2020": 40 MUSD24/PJ
        "2030": 30 MUSD24/PJ
        "2040": 22 MUSD24/PJ
        "2050": 18 MUSD24/PJ
      interpolation: interp_extrap
    variable_om_cost_basis: HHV

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: electric_heater
    regions:
      - SINGLE
    sectors:
      - IND

  - variant: gas_boiler
    regions:
      - SINGLE
    sectors:
      - IND

  - variant: grid_electricity_supply
    regions:
      - SINGLE

  - variant: h2_boiler
    regions:
      - SINGLE
    sectors:
      - IND

  - variant: pipeline_gas_supply
    regions:
      - SINGLE

  - variant: pipeline_hydrogen_supply
    regions:
      - SINGLE

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - cap_bound:
      up: 100
    selector:
      variant: electric_heater
      region: SINGLE
      sector: IND
    stock: 1

  - cap_bound:
      up: 100
    selector:
      variant: gas_boiler
      region: SINGLE
      sector: IND
    stock: 5

  - selector:
      variant: grid_electricity_supply
      region: SINGLE
    stock: 1000

  - cap_bound:
      up: 100
    selector:
      variant: h2_boiler
      region: SINGLE
      sector: IND
    stock: 0.5

  - selector:
      variant: pipeline_gas_supply
      region: SINGLE
    stock: 1000

  - selector:
      variant: pipeline_hydrogen_supply
      region: SINGLE
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:industrial_heat
    region: SINGLE
    values:
      "2020": 50
      "2050": 50
    interpolation: interp_extrap
    sector: IND
