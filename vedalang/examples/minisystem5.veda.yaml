# MiniSystem5: Technology Competition with Renewables
# Increment 5: Multiple generation options, technology choice
# New capabilities: Competing processes for same output, technology mix
# Tests: CCGT vs WIND competition, wind share increases with CO2 price
# Issue: vedalang-8pr.5
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniSystem5
  description: Technology competition between fossil and renewables

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2040]

  commodities:
    - id: fuel:natural_gas
      type: fuel
      unit: PJ
      description: Natural gas

    - id: energy:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: resource:wind_resource
      type: other
      unit: PJ
      description: Wind energy resource

    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide emissions

    - id: service:residential_demand
      type: service
      unit: PJ
      description: Residential demand

  scenario_parameters:
    - name: co2_price
      description: Carbon price trajectory
      type: commodity_price
      commodity: emission:co2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 100

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: fuel:natural_gas

  - id: supply_wind_resource
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

  - id: generate_electricity
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: energy:electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: energy:electricity
    required_outputs:
      - commodity: service:residential_demand

process_variants:
  - id: lng_terminal
    role: import_gas
    inputs: []
    outputs:
      - commodity: fuel:natural_gas
    efficiency: 1.0
    lifetime: 100

  - id: onshore_wind
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: fuel:natural_gas
    outputs:
      - commodity: energy:electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    lifetime: 40
    emission_factors:
      emission:co2: 0.05

  - id: wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: energy:electricity
    efficiency: 1.0
    investment_cost: 1200
    fixed_om_cost: 25
    variable_om_cost: 1
    lifetime: 25

  - id: electric_enduse
    role: deliver_residential
    inputs:
      - commodity: energy:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: lng_terminal
    regions: [SINGLE]

  - variant: onshore_wind
    regions: [SINGLE]

  - variant: ccgt
    regions: [SINGLE]

  - variant: wind
    regions: [SINGLE]

  - variant: electric_enduse
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: lng_terminal
      region: SINGLE
    stock: 1000

  - selector:
      variant: onshore_wind
      region: SINGLE
    stock: 1000

  - selector:
      variant: ccgt
      region: SINGLE
    stock: 2
    cap_bound:
      up: 100

  - selector:
      variant: wind
      region: SINGLE
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: electric_enduse
      region: SINGLE
      sector: RES
    stock: 1000

demands:
  - commodity: service:residential_demand
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 30
      "2030": 60
      "2050": 90
