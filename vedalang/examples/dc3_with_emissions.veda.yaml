# DC3: Thermal + Renewable plants with emission tracking
# Extends DC2 with explicit emission accounting via emission_factors.

model:
  name: MiniModel
  description: Thermal and renewable electricity supply with CO2 emissions accounting

  regions:
    - SINGLE
  
  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: fuel:natural_gas
      type: fuel
      unit: PJ
      description: Natural gas fuel

    - id: resource:wind_resource
      type: other
      unit: PJ
      description: Wind resource input

    - id: energy:electricity
      type: energy
      unit: PJ
      description: Electricity carrier

    - id: service:electricity_demand
      type: service
      unit: PJ
      description: Electricity demand service

    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide emissions ledger

segments:
  sectors: [IND]

process_roles:
  - id: supply_natural_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: fuel:natural_gas

  - id: supply_wind_resource
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

  - id: provide_electricity
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: energy:electricity

  - id: satisfy_electricity_demand
    stage: end_use
    required_inputs:
      - commodity: energy:electricity
    required_outputs:
      - commodity: service:electricity_demand

process_variants:
  - id: natural_gas_supply
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: fuel:natural_gas
    efficiency: 1.0
    lifetime: 100

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: provide_electricity
    inputs:
      - commodity: fuel:natural_gas
    outputs:
      - commodity: energy:electricity
    efficiency: 0.55
    lifetime: 30
    emission_factors:
      emission:co2: 0.05

  - id: wind_turbine
    role: provide_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: energy:electricity
    efficiency: 1.0
    lifetime: 25

  - id: grid_delivery
    role: satisfy_electricity_demand
    inputs:
      - commodity: energy:electricity
    outputs:
      - commodity: service:electricity_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: natural_gas_supply
    regions: [SINGLE]

  - variant: wind_resource_supply
    regions: [SINGLE]

  - variant: ccgt
    regions: [SINGLE]
    sectors: [IND]

  - variant: wind_turbine
    regions: [SINGLE]
    sectors: [IND]

  - variant: grid_delivery
    regions: [SINGLE]
    sectors: [IND]

process_parameters:
  - selector:
      variant: natural_gas_supply
      region: SINGLE
    stock: 1000

  - selector:
      variant: wind_resource_supply
      region: SINGLE
    stock: 1000

  - selector:
      variant: ccgt
      region: SINGLE
      sector: IND
    stock: 5

  - selector:
      variant: wind_turbine
      region: SINGLE
      sector: IND
    stock: 3

  - selector:
      variant: grid_delivery
      region: SINGLE
      sector: IND
    stock: 1000

demands:
  - commodity: service:electricity_demand
    region: SINGLE
    sector: IND
    interpolation: interp_extrap
    values:
      "2020": 8
      "2050": 10
