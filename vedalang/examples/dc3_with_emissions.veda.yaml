# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniModel
  description: Thermal and renewable electricity supply with CO2 emissions accounting
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: emission:co2
      description: Carbon dioxide emissions ledger
      type: emission
      unit: Mt
      combustible: false

    - id: primary:natural_gas
      description: Natural gas fuel
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: resource:wind_resource
      description: Wind resource input
      type: other
      unit: PJ
      combustible: false

    - id: secondary:electricity
      description: Electricity carrier
      type: energy
      unit: PJ
      combustible: false

    - id: service:electricity_demand
      description: Electricity demand service
      type: service
      unit: PJ
      combustible: false

# Scoping (current key name: segments): defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
segments:
  sectors:
    - IND

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: provide_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: satisfy_electricity_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:electricity_demand

  - id: supply_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: ccgt
    role: provide_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emission_factors:
      emission:co2: 0.05
    efficiency: 0.55
    emission_factor_basis: HHV
    lifetime: 30

  - id: grid_delivery
    role: satisfy_electricity_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:electricity_demand
    efficiency: 1.0
    lifetime: 100

  - id: natural_gas_supply
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: wind_turbine
    role: provide_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt
    regions:
      - SINGLE
    sectors:
      - IND

  - variant: grid_delivery
    regions:
      - SINGLE
    sectors:
      - IND

  - variant: natural_gas_supply
    regions:
      - SINGLE

  - variant: wind_resource_supply
    regions:
      - SINGLE

  - variant: wind_turbine
    regions:
      - SINGLE
    sectors:
      - IND

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - selector:
      variant: ccgt
      region: SINGLE
      sector: IND
    stock: 5

  - selector:
      variant: grid_delivery
      region: SINGLE
      sector: IND
    stock: 1000

  - selector:
      variant: natural_gas_supply
      region: SINGLE
    stock: 1000

  - selector:
      variant: wind_resource_supply
      region: SINGLE
    stock: 1000

  - selector:
      variant: wind_turbine
      region: SINGLE
      sector: IND
    stock: 3

# Demands: service demand trajectories by region and optional scope (sector/segment).
demands:
  - commodity: service:electricity_demand
    region: SINGLE
    values:
      "2020": 8
      "2050": 10
    interpolation: interp_extrap
    sector: IND
