model:
  name: ToyTransport
  description: EV uptake model with S-curve adoption constraint
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2025
    - 2030
    - 2035
    - 2040
    - 2050
  monetary:
    canonical: MAUD24
    fx_table: rules/monetary/fx_aud_usd_world_bank_pa_nus_fcrf.yaml
  commodities:
    - id: emission:co2
      description: Carbon dioxide
      type: emission
      unit: Mt
      combustible: false

    - id: primary:petrol
      description: Petrol/gasoline
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 48.4
      lhv_mj_per_unit: 44.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:passenger_km
      description: Passenger travel demand
      type: service
      unit: Bvkm
      combustible: false
  constraints:
    - name: EV_SHARE
      type: activity_share
      commodity: service:passenger_km
      minimum_share: 0.3
      processes:
        - ev_car

segments:
  sectors:
    - TRN

process_roles:
  - id: provide_passenger_km
    activity_unit: Bvkm
    capacity_unit: Bvkm/yr
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:passenger_km

  - id: supply_electricity
    activity_unit: PJ
    capacity_unit: PJ/yr
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: supply_petrol
    activity_unit: PJ
    capacity_unit: PJ/yr
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:petrol

process_variants:
  - id: electricity_import
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 6.944444 MUSD24/PJ

  - id: ev_car
    role: provide_passenger_km
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:passenger_km
    efficiency: 1.0
    investment_cost: 100 MAUD24/Bvkm/yr
    lifetime: 15
    variable_om_cost: 20 MAUD24/Bvkm

  - id: ice_car
    role: provide_passenger_km
    inputs:
      - commodity: primary:petrol
        basis: HHV
    outputs:
      - commodity: service:passenger_km
    emission_factors:
      emission:co2: 0.067
    efficiency: 1.0
    emission_factor_basis: HHV
    lifetime: 15
    variable_om_cost: 50 MAUD24/Bvkm

  - id: petrol_import
    role: supply_petrol
    inputs: []
    outputs:
      - commodity: primary:petrol
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 15 MAUD24/PJ
    variable_om_cost_basis: HHV

availability:
  - variant: electricity_import
    regions:
      - SINGLE

  - variant: ev_car
    regions:
      - SINGLE
    sectors:
      - TRN

  - variant: ice_car
    regions:
      - SINGLE
    sectors:
      - TRN

  - variant: petrol_import
    regions:
      - SINGLE

process_parameters:
  - selector:
      variant: electricity_import
      region: SINGLE
    stock: 1000

  - cap_bound:
      up: 500
    selector:
      variant: ev_car
      region: SINGLE
      sector: TRN
    stock: 10

  - cap_bound:
      up: 500
    selector:
      variant: ice_car
      region: SINGLE
      sector: TRN
    stock: 200

  - selector:
      variant: petrol_import
      region: SINGLE
    stock: 1000

demands:
  - commodity: service:passenger_km
    region: SINGLE
    values:
      "2020": 200
      "2050": 200
    interpolation: interp_extrap
    sector: TRN
