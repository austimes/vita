# Toy Transport: EV Uptake and Electrification
# Variant-level inputs for fuel-specific topology
# Tests: activity_share constraint, transport sector, fuel switching
# Issue: vedalang-0pt.8
#
# Uses composable P4 syntax: model, segments, process_roles, process_variants,
# availability, process_parameters, demands

model:
  name: ToyTransport
  description: EV uptake model with S-curve adoption constraint

  monetary:
    canonical: MAUD24
    fx_table: rules/monetary/fx_aud_usd_world_bank_pa_nus_fcrf.yaml

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2035, 2040, 2050]

  commodities:
    - id: service:passenger_km
      type: service
      unit: Bvkm
      description: Passenger travel demand

      combustible: false
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

      combustible: false
    - id: primary:petrol
      type: fuel
      unit: PJ
      description: Petrol/gasoline

      combustible: true
      lhv_mj_per_unit: 44.0
      hhv_mj_per_unit: 48.4
    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide

      combustible: false
  constraints:
    # EV adoption target: at least 30% of passenger_km from EVs
    # NOTE: Ideally time-varying for S-curve {2020: 0.05, 2025: 0.15,
    # 2030: 0.30, 2035: 0.60, 2040: 0.75, 2050: 0.85} but schema
    # currently supports only a scalar minimum_share (future enhancement).
    - name: EV_SHARE
      type: activity_share
      commodity: service:passenger_km
      processes: [ev_car]
      minimum_share: 0.30

segments:
  sectors: [TRN]

process_roles:
  - id: supply_petrol
    stage: supply
    activity_unit: PJ
    capacity_unit: PJ/yr
    required_inputs: []
    required_outputs:
      - commodity: primary:petrol

  - id: supply_electricity
    stage: supply
    activity_unit: PJ
    capacity_unit: PJ/yr
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_passenger_km
    stage: end_use
    activity_unit: Bvkm
    capacity_unit: Bvkm/yr
    required_inputs: []
    required_outputs:
      - commodity: service:passenger_km

process_variants:
  - id: petrol_import
    role: supply_petrol
    inputs: []
    outputs:
      - commodity: primary:petrol
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: "15 MAUD24/PJ"

    variable_om_cost_basis: HHV
  - id: electricity_import
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: "6.944444 MUSD24/PJ"

  - id: ice_car
    role: provide_passenger_km
    inputs:
      - commodity: primary:petrol
        basis: HHV
    outputs:
      - commodity: service:passenger_km
    efficiency: 1.0
    lifetime: 15
    variable_om_cost: "50 MAUD24/Bvkm"
    emission_factors:
      emission:co2: 0.067

    emission_factor_basis: HHV
  - id: ev_car
    role: provide_passenger_km
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:passenger_km
    efficiency: 1.0
    lifetime: 15
    investment_cost: "100 MAUD24/Bvkm/yr"
    variable_om_cost: "20 MAUD24/Bvkm"

availability:
  - variant: petrol_import
    regions: [SINGLE]

  - variant: electricity_import
    regions: [SINGLE]

  - variant: ice_car
    regions: [SINGLE]
    sectors: [TRN]

  - variant: ev_car
    regions: [SINGLE]
    sectors: [TRN]

process_parameters:
  - selector:
      variant: petrol_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: electricity_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: ice_car
      region: SINGLE
      sector: TRN
    stock: 200
    cap_bound:
      up: 500

  - selector:
      variant: ev_car
      region: SINGLE
      sector: TRN
    stock: 10
    cap_bound:
      up: 500

demands:
  - commodity: service:passenger_km
    region: SINGLE
    sector: TRN
    interpolation: interp_extrap
    values:
      "2020": 200
      "2050": 200
