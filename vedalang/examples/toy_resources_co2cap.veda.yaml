# Toy Resources (B): Mining Electrification — CO2 Cap Policy
# Same mining system as Variant A but with emission_cap instead of activity_share
# Tests: emission_cap constraint, fuel switching under carbon budget
# Issue: vedalang-248.5

model:
  name: ToyResourcesCO2Cap
  description: Mining haulage electrification under emission_cap constraint

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2035, 2040, 2050]

  commodities:
    - id: haul_work
      kind: service
      unit: PJ
      description: Haulage work demand

    - id: electricity
      kind: carrier
      unit: PJ
      description: Electricity

    - id: diesel
      kind: carrier
      unit: PJ
      description: Diesel fuel

    - id: biodiesel
      kind: carrier
      unit: PJ
      description: Biodiesel

    - id: co2
      kind: emission
      unit: Mt
      description: Carbon dioxide

  constraints:
    - name: CO2_CAP
      type: emission_cap
      commodity: co2
      years:
        "2020": 2
        "2030": 1.2
        "2040": 0.5
        "2050": 0.2
      interpolation: interp_extrap
      limtype: up

segments:
  sectors: [IND]

process_roles:
  - id: import_diesel
    stage: supply
    inputs: []
    outputs:
      - commodity: diesel

  - id: import_electricity
    stage: supply
    inputs: []
    outputs:
      - commodity: electricity

  - id: import_biodiesel
    stage: supply
    inputs: []
    outputs:
      - commodity: biodiesel

  - id: haul_with_diesel
    stage: end_use
    inputs:
      - commodity: diesel
    outputs:
      - commodity: haul_work
      - commodity: co2

  - id: haul_with_electricity
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: haul_work

  - id: haul_with_biodiesel
    stage: end_use
    inputs:
      - commodity: biodiesel
    outputs:
      - commodity: haul_work

process_variants:
  - id: diesel_import
    role: import_diesel
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 12

  - id: electricity_import
    role: import_electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25

  - id: biodiesel_import
    role: import_biodiesel
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 20

  - id: diesel_haul
    role: haul_with_diesel
    efficiency: 0.35
    lifetime: 15
    emission_factors:
      co2: 0.074

  - id: electric_haul
    role: haul_with_electricity
    efficiency: 0.85
    lifetime: 15
    investment_cost: 200

  - id: biodiesel_haul
    role: haul_with_biodiesel
    efficiency: 0.35
    lifetime: 15

availability:
  - variant: diesel_import
    regions: [SINGLE]

  - variant: electricity_import
    regions: [SINGLE]

  - variant: biodiesel_import
    regions: [SINGLE]

  - variant: diesel_haul
    regions: [SINGLE]
    sectors: [IND]

  - variant: electric_haul
    regions: [SINGLE]
    sectors: [IND]

  - variant: biodiesel_haul
    regions: [SINGLE]
    sectors: [IND]

process_parameters:
  - selector:
      variant: diesel_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: electricity_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: biodiesel_import
      region: SINGLE
    stock: 1000
    ncap_bound:
      up: 5

  - selector:
      variant: diesel_haul
      region: SINGLE
      sector: IND
    stock: 20
    cap_bound:
      up: 100

  - selector:
      variant: electric_haul
      region: SINGLE
      sector: IND
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: biodiesel_haul
      region: SINGLE
      sector: IND
    stock: 1
    cap_bound:
      up: 100

demands:
  - commodity: haul_work
    region: SINGLE
    sector: IND
    interpolation: interp_extrap
    values:
      "2020": 20
      "2050": 20

# --- Composition Notes for vedalang-9xy ---
# Both toy_resources_forceshift and toy_resources_co2cap share identical
# base model (commodities, roles, variants, availability, parameters, demands).
# They differ ONLY in constraints.
#
# Explored approaches:
# 1. Separate files (this approach): Simple but duplicates 95% of content
# 2. Factor into base + overlay: Would need import/include mechanism
# 3. Cases block: model.cases could reference different constraint sets
#
# Observation: For policy comparison, a single file with a cases: block
# selecting different constraints would be most natural. The shared RES
# (topology + costs) should only be written once.
