# Toy Resources: Mining Haulage Electrification
# Service-level role with diesel/electric/biodiesel pathway variants
# Three policy cases: REF (baseline), CO2CAP (emission cap), FORCE_SHIFT (activity share)
# Tests: cases overlay, constraint_overrides, emission_cap, activity_share, fuel switching
# Issue: vedalang-0pt.9

model:
  name: ToyResources
  description: Mining haulage electrification with case overlays for REF, CO2 cap, and force-shift policies

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2035, 2040, 2050]

  commodities:
    - id: haul_work
      type: service
      unit: PJ
      description: Haulage work demand

    - id: haul_energy_input
      type: energy
      unit: PJ
      description: Intermediate haulage energy carrier for service-level delivery role

    - id: electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: diesel
      type: fuel
      unit: PJ
      description: Diesel fuel

    - id: biodiesel
      type: fuel
      unit: PJ
      description: Biodiesel

    - id: co2
      type: emission
      unit: Mt
      description: Carbon dioxide

  constraints:
    - name: CO2_CAP
      type: emission_cap
      commodity: co2
      years:
        "2020": 2
        "2030": 1.2
        "2040": 0.5
        "2050": 0.2
      interpolation: interp_extrap
      limtype: up

    - name: ELC_SHARE
      type: activity_share
      commodity: haul_work
      processes: [electric_haul]
      minimum_share: 0.30

  cases:
    - name: ref
      is_baseline: true
      description: Reference case — no policy constraints
      constraint_overrides:
        - name: CO2_CAP
          enabled: false
        - name: ELC_SHARE
          enabled: false

    - name: co2cap
      description: CO2 emission cap driving electrification
      constraint_overrides:
        - name: ELC_SHARE
          enabled: false

    - name: force_shift
      description: Mandated electric haulage activity share
      constraint_overrides:
        - name: CO2_CAP
          enabled: false

segments:
  sectors: [IND]

process_roles:
  - id: import_diesel
    stage: supply
    inputs: []
    outputs:
      - commodity: diesel

  - id: import_electricity
    stage: supply
    inputs: []
    outputs:
      - commodity: electricity

  - id: import_biodiesel
    stage: supply
    inputs: []
    outputs:
      - commodity: biodiesel

  - id: convert_diesel_to_haul_energy
    stage: conversion
    inputs:
      - commodity: diesel
    outputs:
      - commodity: haul_energy_input
      - commodity: co2

  - id: convert_electricity_to_haul_energy
    stage: conversion
    inputs:
      - commodity: electricity
    outputs:
      - commodity: haul_energy_input

  - id: convert_biodiesel_to_haul_energy
    stage: conversion
    inputs:
      - commodity: biodiesel
    outputs:
      - commodity: haul_energy_input

  - id: provide_haul_work
    stage: end_use
    inputs:
      - commodity: haul_energy_input
    outputs:
      - commodity: haul_work

process_variants:
  - id: diesel_import
    role: import_diesel
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 12

  - id: electricity_import
    role: import_electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25

  - id: biodiesel_import
    role: import_biodiesel
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 20

  - id: diesel_haul
    role: convert_diesel_to_haul_energy
    efficiency: 0.35
    lifetime: 15
    emission_factors:
      co2: 0.074

  - id: electric_haul
    role: convert_electricity_to_haul_energy
    efficiency: 0.85
    lifetime: 15
    investment_cost: 200

  - id: biodiesel_haul
    role: convert_biodiesel_to_haul_energy
    efficiency: 0.35
    lifetime: 15

  - id: haul_work_delivery
    role: provide_haul_work
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 0

availability:
  - variant: diesel_import
    regions: [SINGLE]

  - variant: electricity_import
    regions: [SINGLE]

  - variant: biodiesel_import
    regions: [SINGLE]

  - variant: diesel_haul
    regions: [SINGLE]
    sectors: [IND]

  - variant: electric_haul
    regions: [SINGLE]
    sectors: [IND]

  - variant: biodiesel_haul
    regions: [SINGLE]
    sectors: [IND]

  - variant: haul_work_delivery
    regions: [SINGLE]
    sectors: [IND]

process_parameters:
  - selector:
      variant: diesel_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: electricity_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: biodiesel_import
      region: SINGLE
    stock: 1000
    ncap_bound:
      up: 5

  - selector:
      variant: diesel_haul
      region: SINGLE
      sector: IND
    stock: 20
    cap_bound:
      up: 100

  - selector:
      variant: electric_haul
      region: SINGLE
      sector: IND
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: biodiesel_haul
      region: SINGLE
      sector: IND
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: haul_work_delivery
      region: SINGLE
      sector: IND
    stock: 25
    cap_bound:
      up: 150

demands:
  - commodity: haul_work
    region: SINGLE
    sector: IND
    interpolation: interp_extrap
    values:
      "2020": 20
      "2050": 20
