# Toy Resources: Mining Haulage Electrification
# Service-level role with diesel/electric/biodiesel pathway variants
# Three policy cases: ref (baseline), co2cap (emission cap), force-shift (activity share)
# Tests: cases overlay, constraint_overrides, emission_cap, activity_share, fuel switching
# Issue: vedalang-0pt.9

model:
  name: ToyResources
  description: Mining haulage electrification with case overlays for REF, CO2 cap, and force-shift policies

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2035, 2040, 2050]

  commodities:
    - id: service:haul_work
      type: service
      unit: PJ
      description: Haulage work demand

    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: primary:diesel
      type: fuel
      unit: PJ
      description: Diesel fuel

    - id: primary:biodiesel
      type: fuel
      unit: PJ
      description: Biodiesel

    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide

  constraints:
    - name: co2_cap
      type: emission_cap
      commodity: emission:co2
      years:
        "2020": 2
        "2030": 1.2
        "2040": 0.5
        "2050": 0.2
      interpolation: interp_extrap
      limtype: up

    - name: elc_share
      type: activity_share
      commodity: service:haul_work
      processes: [electric_haul]
      minimum_share: 0.30

  cases:
    - name: ref
      is_baseline: true
      description: Reference case — no policy constraints
      constraint_overrides:
        - name: co2_cap
          enabled: false
        - name: elc_share
          enabled: false

    - name: co2cap
      description: CO2 emission cap driving electrification
      constraint_overrides:
        - name: elc_share
          enabled: false

    - name: force_shift
      description: Mandated electric haulage activity share
      constraint_overrides:
        - name: co2_cap
          enabled: false

segments:
  sectors: [IND]

process_roles:
  - id: import_diesel
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:diesel

  - id: import_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_biodiesel
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:biodiesel

  - id: provide_haul_work
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:haul_work

process_variants:
  - id: diesel_import
    role: import_diesel
    inputs: []
    outputs:
      - commodity: primary:diesel
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 12

  - id: electricity_import
    role: import_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25

  - id: biodiesel_import
    role: import_biodiesel
    inputs: []
    outputs:
      - commodity: primary:biodiesel
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 20

  - id: diesel_haul
    role: provide_haul_work
    inputs:
      - commodity: primary:diesel
    outputs:
      - commodity: service:haul_work
    efficiency: 0.35
    lifetime: 15
    emission_factors:
      emission:co2: 0.074

  - id: electric_haul
    role: provide_haul_work
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:haul_work
    efficiency: 0.85
    lifetime: 15
    investment_cost: 200

  - id: biodiesel_haul
    role: provide_haul_work
    inputs:
      - commodity: primary:biodiesel
    outputs:
      - commodity: service:haul_work
    efficiency: 0.35
    lifetime: 15

availability:
  - variant: diesel_import
    regions: [SINGLE]

  - variant: electricity_import
    regions: [SINGLE]

  - variant: biodiesel_import
    regions: [SINGLE]

  - variant: diesel_haul
    regions: [SINGLE]
    sectors: [IND]

  - variant: electric_haul
    regions: [SINGLE]
    sectors: [IND]

  - variant: biodiesel_haul
    regions: [SINGLE]
    sectors: [IND]

process_parameters:
  - selector:
      variant: diesel_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: electricity_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: biodiesel_import
      region: SINGLE
    stock: 1000
    ncap_bound:
      up: 5

  - selector:
      variant: diesel_haul
      region: SINGLE
      sector: IND
    stock: 20
    cap_bound:
      up: 100

  - selector:
      variant: electric_haul
      region: SINGLE
      sector: IND
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: biodiesel_haul
      region: SINGLE
      sector: IND
    stock: 1
    cap_bound:
      up: 100

demands:
  - commodity: service:haul_work
    region: SINGLE
    sector: IND
    interpolation: interp_extrap
    values:
      "2020": 20
      "2050": 20
