# Model: core system definition (regions, years, commodities, cases).
model:
  name: ToyIntegrated6Sector
  description: Minimal integrated 6-sector model with shared grids and economy-wide
    CO2 cap
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: emission:co2
      description: Carbon dioxide
      type: emission
      unit: Mt
      combustible: false

    - id: primary:crude_oil
      description: Crude oil
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 46.2
      lhv_mj_per_unit: 42.0

    - id: primary:natural_gas
      description: Bulk natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: primary:natural_gas_grid
      description: Delivered natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: primary:petrol
      description: Refined petrol/diesel proxy
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 48.4
      lhv_mj_per_unit: 44.0

    - id: resource:solar_resource
      description: Solar resource potential
      type: other
      unit: PJ
      combustible: false

    - id: resource:wind_resource
      description: Wind resource potential
      type: other
      unit: PJ
      combustible: false

    - id: secondary:electricity
      description: Bulk electricity (generation bus)
      type: energy
      unit: PJ
      combustible: false

    - id: secondary:electricity_grid
      description: Delivered electricity
      type: energy
      unit: PJ
      combustible: false

    - id: secondary:hydrogen
      description: Hydrogen
      type: energy
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 132.0
      lhv_mj_per_unit: 120.0

    - id: service:farm_work
      description: Agricultural machinery service
      type: service
      unit: PJ
      combustible: false

    - id: service:industrial_heat
      description: Industrial process heat
      type: service
      unit: PJ
      combustible: false

    - id: service:passenger_km
      description: Passenger travel
      type: service
      unit: Bvkm
      combustible: false

    - id: service:space_heat
      description: Space heating (RES/COM/OTH)
      type: service
      unit: PJ
      combustible: false
  constraints:
    - name: CO2_CAP
      type: emission_cap
      commodity: emission:co2
      years:
        "2020": 30
        "2030": 20
        "2040": 10
        "2050": 2
      interpolation: interp_extrap
      limtype: up

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - AGR
    - COM
    - IND
    - OTH
    - RES
    - TRN

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: deliver_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: distribution
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: primary:natural_gas_grid

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: import_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:hydrogen

  - id: import_oil
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:crude_oil

  - id: produce_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: secondary:electricity_grid
    required_outputs:
      - commodity: secondary:hydrogen

  - id: provide_farm_work
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:farm_work

  - id: provide_industrial_heat
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:industrial_heat

  - id: provide_passenger_km
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:passenger_km

  - id: provide_space_heat
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:space_heat

  - id: refine_oil
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:crude_oil
    required_outputs:
      - commodity: primary:petrol

  - id: supply_solar_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_resource

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

  - id: transmit_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: secondary:electricity_grid

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emission_factors:
      emission:co2: 0.05
    efficiency: 0.55
    emission_factor_basis: HHV
    fixed_om_cost: 20 MUSD24/GW/yr
    investment_cost: 800 MUSD24/GW
    lifetime: 40
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: elec_grid
    role: transmit_electricity
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: secondary:electricity_grid
    efficiency: 0.95
    kind: network
    lifetime: 100

  - id: electric_industrial_heater
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.95
    investment_cost: 80 MUSD24/GW
    lifetime: 30

  - id: electric_space_heater
    role: provide_space_heat
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:space_heat
    efficiency: 0.95
    investment_cost: 120 MUSD24/GW
    lifetime: 20

  - id: electric_tractor
    role: provide_farm_work
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:farm_work
    efficiency: 1.0
    investment_cost: 120 MUSD24/GW
    lifetime: 20
    variable_om_cost: 2 MUSD24/PJ

  - id: electrolyser
    role: produce_hydrogen
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 0.7
    fixed_om_cost: 10 MUSD24/GW/yr
    investment_cost: 600 MUSD24/GW
    lifetime: 25

  - id: ev_car
    role: provide_passenger_km
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:passenger_km
    efficiency: 1.0
    investment_cost: 100 MUSD24/GW
    lifetime: 15
    variable_om_cost: 2 MUSD24/PJ

  - id: gas_grid
    role: deliver_gas
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    efficiency: 0.98
    kind: network
    lifetime: 100

  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: gas_industrial_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    emission_factors:
      emission:co2: 0.056
    efficiency: 0.9
    emission_factor_basis: HHV
    investment_cost: 50 MUSD24/GW
    lifetime: 30

  - id: gas_space_heater
    role: provide_space_heat
    inputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    outputs:
      - commodity: service:space_heat
    emission_factors:
      emission:co2: 0.056
    efficiency: 0.9
    emission_factor_basis: HHV
    investment_cost: 30 MUSD24/GW
    lifetime: 20

  - id: h2_industrial_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.85
    investment_cost: 100 MUSD24/GW
    lifetime: 30

  - id: hydrogen_import
    role: import_hydrogen
    inputs: []
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost:
      values:
        "2020": 40 MUSD24/PJ
        "2030": 30 MUSD24/PJ
        "2040": 22 MUSD24/PJ
        "2050": 18 MUSD24/PJ
      interpolation: interp_extrap
    variable_om_cost_basis: HHV

  - id: ice_car
    role: provide_passenger_km
    inputs:
      - commodity: primary:petrol
        basis: HHV
    outputs:
      - commodity: service:passenger_km
    emission_factors:
      emission:co2: 0.067
    efficiency: 1.0
    emission_factor_basis: HHV
    lifetime: 15
    variable_om_cost: 5 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: oil_import
    role: import_oil
    inputs: []
    outputs:
      - commodity: primary:crude_oil
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 10 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: onshore_wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    fixed_om_cost: 25 MUSD24/GW/yr
    investment_cost: 1200 MUSD24/GW
    lifetime: 25

  - id: petrol_tractor
    role: provide_farm_work
    inputs:
      - commodity: primary:petrol
        basis: HHV
    outputs:
      - commodity: service:farm_work
    emission_factors:
      emission:co2: 0.074
    efficiency: 1.0
    emission_factor_basis: HHV
    lifetime: 20
    variable_om_cost: 4 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: refinery
    role: refine_oil
    inputs:
      - commodity: primary:crude_oil
        basis: HHV
    outputs:
      - commodity: primary:petrol
        basis: HHV
    emission_factors:
      emission:co2: 0.01
    efficiency: 0.9
    emission_factor_basis: HHV
    investment_cost: 200 MUSD24/GW
    lifetime: 40
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: solar_pv
    role: generate_electricity
    inputs:
      - commodity: resource:solar_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    fixed_om_cost: 15 MUSD24/GW/yr
    investment_cost:
      values:
        "2020": 1000 MUSD24/GW
        "2030": 600 MUSD24/GW
        "2050": 400 MUSD24/GW
      interpolation: interp_extrap
    lifetime: 25

  - id: solar_resource_supply
    role: supply_solar_resource
    inputs: []
    outputs:
      - commodity: resource:solar_resource
    efficiency: 1.0
    lifetime: 100

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

