model:
  name: ToyIntegrated6Sector
  description: Minimal integrated 6-sector model with shared grids and economy-wide
    CO2 cap
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      description: Bulk natural gas
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0
    - id: primary:crude_oil
      type: fuel
      unit: PJ
      description: Crude oil
      combustible: true
      lhv_mj_per_unit: 42.0
      hhv_mj_per_unit: 46.2
    - id: resource:wind_resource
      type: other
      unit: PJ
      description: Wind resource potential
      combustible: false
    - id: resource:solar_resource
      type: other
      unit: PJ
      description: Solar resource potential
      combustible: false
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Bulk electricity (generation bus)
      combustible: false
    - id: secondary:electricity_grid
      type: energy
      unit: PJ
      description: Delivered electricity
      combustible: false
    - id: primary:natural_gas_grid
      type: fuel
      unit: PJ
      description: Delivered natural gas
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0
    - id: primary:petrol
      type: fuel
      unit: PJ
      description: Refined petrol/diesel proxy
      combustible: true
      lhv_mj_per_unit: 44.0
      hhv_mj_per_unit: 48.4
    - id: secondary:hydrogen
      type: energy
      unit: PJ
      description: Hydrogen
      combustible: true
      lhv_mj_per_unit: 120.0
      hhv_mj_per_unit: 132.0
    - id: service:space_heat
      type: service
      unit: PJ
      description: Space heating (RES/COM/OTH)
      combustible: false
    - id: service:industrial_heat
      type: service
      unit: PJ
      description: Industrial process heat
      combustible: false
    - id: service:passenger_km
      type: service
      unit: Bvkm
      description: Passenger travel
      combustible: false
    - id: service:farm_work
      type: service
      unit: PJ
      description: Agricultural machinery service
      combustible: false
    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide
      combustible: false
  constraints:
    - name: CO2_CAP
      type: emission_cap
      commodity: emission:co2
      limtype: up
      interpolation: interp_extrap
      years:
        "2020": 30
        "2030": 20
        "2040": 10
        "2050": 2
segments:
  sectors:
    - RES
    - COM
    - IND
    - TRN
    - AGR
    - OTH
process_roles:
  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas
  - id: import_oil
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:crude_oil
  - id: import_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:hydrogen
  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource
  - id: supply_solar_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_resource
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity
  - id: refine_oil
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:crude_oil
    required_outputs:
      - commodity: primary:petrol
  - id: produce_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: secondary:electricity_grid
    required_outputs:
      - commodity: secondary:hydrogen
  - id: transmit_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: secondary:electricity_grid
  - id: deliver_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: distribution
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: primary:natural_gas_grid
  - id: provide_space_heat
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:space_heat
  - id: provide_industrial_heat
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:industrial_heat
  - id: provide_passenger_km
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:passenger_km
  - id: provide_farm_work
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:farm_work
process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8 MUSD24/PJ
    variable_om_cost_basis: HHV
  - id: oil_import
    role: import_oil
    inputs: []
    outputs:
      - commodity: primary:crude_oil
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 10 MUSD24/PJ
    variable_om_cost_basis: HHV
  - id: hydrogen_import
    role: import_hydrogen
    inputs: []
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost:
      values:
        "2020": 40 MUSD24/PJ
        "2030": 30 MUSD24/PJ
        "2040": 22 MUSD24/PJ
        "2050": 18 MUSD24/PJ
      interpolation: interp_extrap
    variable_om_cost_basis: HHV
  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100
  - id: solar_resource_supply
    role: supply_solar_resource
    inputs: []
    outputs:
      - commodity: resource:solar_resource
    efficiency: 1.0
    lifetime: 100
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 40
    investment_cost: 800 MUSD24/GW
    fixed_om_cost: 20 MUSD24/GW/yr
    variable_om_cost: 2 MUSD24/PJ
    emission_factors:
      emission:co2: 0.05
    variable_om_cost_basis: HHV
    emission_factor_basis: HHV
  - id: solar_pv
    role: generate_electricity
    inputs:
      - commodity: resource:solar_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25
    investment_cost:
      values:
        "2020": 1000 MUSD24/GW
        "2030": 600 MUSD24/GW
        "2050": 400 MUSD24/GW
      interpolation: interp_extrap
    fixed_om_cost: 15 MUSD24/GW/yr
  - id: onshore_wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25
    investment_cost: 1200 MUSD24/GW
    fixed_om_cost: 25 MUSD24/GW/yr
  - id: refinery
    role: refine_oil
    inputs:
      - commodity: primary:crude_oil
        basis: HHV
    outputs:
      - commodity: primary:petrol
        basis: HHV
    efficiency: 0.9
    lifetime: 40
    investment_cost: 200 MUSD24/GW
    variable_om_cost: 2 MUSD24/PJ
    emission_factors:
      emission:co2: 0.01
    variable_om_cost_basis: HHV
    emission_factor_basis: HHV
  - id: electrolyser
    role: produce_hydrogen
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 0.7
    lifetime: 25
    investment_cost: 600 MUSD24/GW
    fixed_om_cost: 10 MUSD24/GW/yr
  - id: elec_grid
    role: transmit_electricity
    kind: network
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: secondary:electricity_grid
    efficiency: 0.95
    lifetime: 100
  - id: gas_grid
    role: deliver_gas
    kind: network
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    efficiency: 0.98
    lifetime: 100
  - id: gas_space_heater
    role: provide_space_heat
    inputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    outputs:
      - commodity: service:space_heat
    efficiency: 0.9
    lifetime: 20
    investment_cost: 30 MUSD24/GW
    emission_factors:
      emission:co2: 0.056
    emission_factor_basis: HHV
  - id: electric_space_heater
    role: provide_space_heat
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:space_heat
    efficiency: 0.95
    lifetime: 20
    investment_cost: 120 MUSD24/GW
  - id: gas_industrial_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: primary:natural_gas_grid
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.9
    lifetime: 30
    investment_cost: 50 MUSD24/GW
    emission_factors:
      emission:co2: 0.056
    emission_factor_basis: HHV
  - id: electric_industrial_heater
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.95
    lifetime: 30
    investment_cost: 80 MUSD24/GW
  - id: h2_industrial_boiler
    role: provide_industrial_heat
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:industrial_heat
    efficiency: 0.85
    lifetime: 30
    investment_cost: 100 MUSD24/GW
  - id: ice_car
    role: provide_passenger_km
    inputs:
      - commodity: primary:petrol
        basis: HHV
    outputs:
      - commodity: service:passenger_km
    efficiency: 1.0
    lifetime: 15
    variable_om_cost: 5 MUSD24/PJ
    emission_factors:
      emission:co2: 0.067
    variable_om_cost_basis: HHV
    emission_factor_basis: HHV
  - id: ev_car
    role: provide_passenger_km
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:passenger_km
    efficiency: 1.0
    lifetime: 15
    investment_cost: 100 MUSD24/GW
    variable_om_cost: 2 MUSD24/PJ
  - id: petrol_tractor
    role: provide_farm_work
    inputs:
      - commodity: primary:petrol
        basis: HHV
    outputs:
      - commodity: service:farm_work
    efficiency: 1.0
    lifetime: 20
    variable_om_cost: 4 MUSD24/PJ
    emission_factors:
      emission:co2: 0.074
    variable_om_cost_basis: HHV
    emission_factor_basis: HHV
  - id: electric_tractor
    role: provide_farm_work
    inputs:
      - commodity: secondary:electricity_grid
    outputs:
      - commodity: service:farm_work
    efficiency: 1.0
    lifetime: 20
    investment_cost: 120 MUSD24/GW
    variable_om_cost: 2 MUSD24/PJ
