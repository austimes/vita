# MiniSystem2: Fuel Chain
# Increment 2: Primary fuel and conversion
# New capabilities: Input-output chains, cost propagation, fuel supply
# Tests: gas → CCGT → electricity → demand device → residential_demand
# Issue: vedalang-8pr.2
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniSystem2
  description: Fuel chain with natural gas import and CCGT conversion

  regions:
    - SINGLE

  milestone_years: [2020, 2030]

  commodities:
    - id: gas
      type: fuel
      unit: PJ
      description: Natural gas

    - id: electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: residential_demand
      type: service
      unit: PJ
      description: Residential demand

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: gas

  - id: generate_electricity
    stage: conversion
    required_inputs:
      - commodity: gas
    required_outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: electricity
    required_outputs:
      - commodity: residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity
    efficiency: 0.55
    variable_om_cost: 2
    lifetime: 40

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [SINGLE]

  - variant: ccgt
    regions: [SINGLE]

  - variant: residential_device
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: SINGLE
    stock: 100

  - selector:
      variant: ccgt
      region: SINGLE
    stock: 100

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    stock: 100

demands:
  - commodity: residential_demand
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 50
