model:
  name: MiniSystem2
  description: Fuel chain with natural gas import and CCGT conversion
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
  commodities:
    - id: primary:natural_gas
      description: Natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_demand
      description: Residential demand
      type: service
      unit: PJ
      combustible: false

segments:
  sectors:
    - RES

process_roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: provide_residential_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:residential_demand

process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 40
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: electric_residential_device
    role: provide_residential_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

  - id: pipeline_gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: ccgt
    regions:
      - SINGLE

  - variant: electric_residential_device
    regions:
      - SINGLE
    sectors:
      - RES

  - variant: pipeline_gas_import
    regions:
      - SINGLE

process_parameters:
  - selector:
      variant: ccgt
      region: SINGLE
    stock: 100

  - selector:
      variant: electric_residential_device
      region: SINGLE
      sector: RES
    stock: 100

  - selector:
      variant: pipeline_gas_import
      region: SINGLE
    stock: 100

demands:
  - commodity: service:residential_demand
    region: SINGLE
    values:
      "2020": 50
    interpolation: interp_extrap
    sector: RES
