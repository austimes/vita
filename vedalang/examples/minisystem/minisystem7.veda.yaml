dsl_version: "0.3"
commodities:
  - id: co2
    type: emission
  - id: gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: electricity_generation
    type: service
  - id: gas_supply
    type: service
  - id: residential_demand
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
  - id: gas_import
    outputs:
      - commodity: gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
  - id: residential_device
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: residential_demand
  - id: wind
    outputs:
      - commodity: electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_generation
technology_roles:
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - ccgt
      - wind
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - gas_import
  - id: residential_service
    primary_service: residential_demand
    technologies:
      - residential_device
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: north_south
    layer: geo.demo
    mapping:
      kind: constant
      value: NORTH
    members:
      - NORTH
      - SOUTH
sites:
  - id: north_hub
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        north_south: NORTH
  - id: south_hub
    location:
      point:
        lat: -37.81
        lon: 144.96
    membership_overrides:
      region_partitions:
        north_south: SOUTH
facilities:
  - id: north_generation
    available_technologies:
      - ccgt
      - wind
    site: north_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 2 MW
            year: 2025
          technology: ccgt
        - metric: installed_capacity
          observed:
            value: 1 MW
            year: 2025
          technology: wind
    technology_role: electricity_generation
  - id: north_service
    site: north_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 30 GWh/year
            year: 2025
          technology: residential_device
    technology_role: residential_service
  - id: north_supply
    site: north_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply
  - id: south_generation
    available_technologies:
      - ccgt
      - wind
    site: south_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 2 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation
  - id: south_service
    site: south_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 30 GWh/year
            year: 2025
          technology: residential_device
    technology_role: residential_service
  - id: south_supply
    site: south_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply
networks:
  - id: north_south_power
    kind: transmission
    links:
      - id: north_to_south
        commodity: electricity
        existing_transfer_capacity: 50 MW
        from: NORTH
        to: SOUTH
    node_basis:
      kind: region_partition
      ref: north_south
runs:
  - id: north_south_2025
    base_year: 2025
    currency_year: 2024
    region_partition: north_south
