dsl_version: "0.3"
commodities:
  - id: electricity
    type: energy
    energy_form: secondary
  - id: electricity_supply
    type: service
  - id: residential_electricity
    type: service
technologies:
  - id: grid_supply
    outputs:
      - commodity: electricity
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_supply
    variable_om: 10 AUD2024/MWh
  - id: residential_device
    inputs:
      - commodity: electricity
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 1.0
    provides: residential_electricity
technology_roles:
  - id: electricity_supply
    primary_service: electricity_supply
    technologies:
      - grid_supply
  - id: residential_service
    primary_service: residential_electricity
    technologies:
      - residential_device
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE
sites:
  - id: single_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        single_region: SINGLE
facilities:
  - id: grid_supply_facility
    site: single_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 50 GWh/year
            year: 2020
          technology: grid_supply
    technology_role: electricity_supply
  - id: residential_service_facility
    site: single_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 50 GWh/year
            year: 2020
          technology: residential_device
    technology_role: residential_service
runs:
  - id: single_2020
    base_year: 2020
    currency_year: 2024
    region_partition: single_region
