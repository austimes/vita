# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniSystem1
  description: Simplest possible solvable VedaLang model
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
  commodities:
    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_electricity
      description: Residential demand
      type: service
      unit: PJ
      combustible: false

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
roles:
  - id: provide_residential_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_electricity

  - id: supply_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

# Process variants: concrete technology definitions bound to roles.
variants:
  - id: grid_supply
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 40
    variable_om_cost: 10 MUSD24/PJ

  - id: residential_device
    role: provide_residential_electricity
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_electricity
    efficiency: 1.0
    lifetime: 40

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: grid_supply
    regions:
      - SINGLE

  - variant: residential_device
    regions:
      - SINGLE
    sectors:
      - RES

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - cap_bound:
      up: 1000
    existing_capacity:
      - capacity: 100
        vintage: 2010
    selector:
      variant: grid_supply
      region: SINGLE

  - cap_bound:
      up: 1000
    existing_capacity:
      - capacity: 100
        vintage: 2010
    selector:
      variant: residential_device
      region: SINGLE
      sector: RES

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:residential_electricity
    region: SINGLE
    values:
      "2020": 50
    interpolation: interp_extrap
    sector: RES
