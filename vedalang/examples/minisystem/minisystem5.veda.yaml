dsl_version: "0.3"
commodities:
  - id: co2
    type: emission
  - id: wind_resource
    type: material
  - id: natural_gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: electricity_generation
    type: service
  - id: gas_supply
    type: service
  - id: residential_demand
    type: service
  - id: wind_supply
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.05 t/GJ
    fixed_om: 20 AUD2024/kW/year
    investment_cost: 800 AUD2024/kW
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
    variable_om: 2 AUD2024/MWh
  - id: electric_enduse
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: residential_demand
  - id: lng_terminal
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
  - id: onshore_wind_supply
    outputs:
      - commodity: wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: wind_supply
  - id: wind
    inputs:
      - commodity: wind_resource
    outputs:
      - commodity: electricity
    fixed_om: 25 AUD2024/kW/year
    investment_cost: 1200 AUD2024/kW
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_generation
technology_roles:
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - ccgt
      - wind
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - lng_terminal
  - id: residential_service
    primary_service: residential_demand
    technologies:
      - electric_enduse
  - id: wind_supply
    primary_service: wind_supply
    technologies:
      - onshore_wind_supply
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE
sites:
  - id: single_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        single_region: SINGLE
facilities:
  - id: gas_supply_facility
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2025
          technology: lng_terminal
    technology_role: gas_supply
  - id: generation_facility
    available_technologies:
      - ccgt
      - wind
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 2 MW
            year: 2025
          technology: ccgt
        - metric: installed_capacity
          observed:
            value: 1 MW
            year: 2025
          technology: wind
    technology_role: electricity_generation
  - id: residential_service_facility
    site: single_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 60 GWh/year
            year: 2025
          technology: electric_enduse
    technology_role: residential_service
  - id: wind_supply_facility
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2025
          technology: onshore_wind_supply
    technology_role: wind_supply
opportunities:
  - id: wind_expansion
    max_new_capacity: 20 MW
    siting:
      region_member:
        member: SINGLE
        partition: single_region
    technology: wind
runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region
