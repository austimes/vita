# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniSystem3
  description: Investment decisions with demand growth forcing new capacity
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2025
    - 2030
    - 2040
  commodities:
    - id: primary:natural_gas
      description: Natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_demand
      description: Residential demand
      type: service
      unit: PJ
      combustible: false

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
roles:
  - id: deliver_residential
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_demand

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

# Process variants: concrete technology definitions bound to roles.
variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    fixed_om_cost: 20 MUSD24/GW/yr
    investment_cost: 800 MUSD24/GW
    lifetime: 40
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt
    regions:
      - SINGLE

  - variant: gas_import
    regions:
      - SINGLE

  - variant: residential_device
    regions:
      - SINGLE
    sectors:
      - RES

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - cap_bound:
      up: 100
    existing_capacity:
      - capacity: 2
        vintage: 2010
    selector:
      variant: ccgt
      region: SINGLE

  - selector:
      variant: gas_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:residential_demand
    region: SINGLE
    values:
      "2020": 30
      "2030": 60
      "2050": 90
    interpolation: interp_extrap
    sector: RES
