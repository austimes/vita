dsl_version: "0.3"
commodities:
  - id: co2
    type: emission
  - id: wind_resource
    type: material
  - id: natural_gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: electricity_generation
    type: service
  - id: gas_supply
    type: service
  - id: residential_demand
    type: service
  - id: wind_supply
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
  - id: gas_import
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
  - id: residential_device
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: residential_demand
  - id: wind
    inputs:
      - commodity: wind_resource
    outputs:
      - commodity: electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_generation
  - id: wind_resource_supply
    outputs:
      - commodity: wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: wind_supply
technology_roles:
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - ccgt
      - wind
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - gas_import
  - id: residential_service
    primary_service: residential_demand
    technologies:
      - residential_device
  - id: wind_supply
    primary_service: wind_supply
    technologies:
      - wind_resource_supply
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
temporal_index_series:
  - id: demand_index
    unit: index
    values:
      "2020": 1.0
      "2025": 1.1
      "2030": 1.2
      "2040": 1.4
    base_year: 2020
region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE
sites:
  - id: single_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        single_region: SINGLE
facilities:
  - id: gas_supply_facility
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2020
          technology: gas_import
    technology_role: gas_supply
  - id: generation_facility
    available_technologies:
      - ccgt
      - wind
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 2 MW
            year: 2020
          technology: ccgt
        - metric: installed_capacity
          observed:
            value: 1 MW
            year: 2020
          technology: wind
    technology_role: electricity_generation
  - id: residential_service_facility
    site: single_hub
    stock:
      items:
        - adjust_to_base_year:
            using: demand_index
          metric: annual_activity
          observed:
            value: 30 GWh/year
            year: 2020
          technology: residential_device
    technology_role: residential_service
  - id: wind_supply_facility
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2020
          technology: wind_resource_supply
    technology_role: wind_supply
runs:
  - id: single_2020
    base_year: 2020
    currency_year: 2024
    region_partition: single_region
