dsl_version: "0.2"

commodities:
  - id: emission:co2
    kind: emission

  - id: material:wind_resource
    kind: material

  - id: primary:natural_gas
    kind: primary

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_generation
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:residential_demand
    kind: service

  - id: service:wind_supply
    kind: service

technologies:
  - id: ccgt
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emissions:
      - commodity: emission:co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: service:electricity_generation

  - id: gas_import
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply

  - id: residential_device
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:residential_demand

  - id: wind
    inputs:
      - commodity: material:wind_resource
    outputs:
      - commodity: secondary:electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_generation

  - id: wind_resource_supply
    outputs:
      - commodity: material:wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:wind_supply

technology_roles:
  - id: electricity_generation
    primary_service: service:electricity_generation
    technologies:
      - ccgt
      - wind

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - gas_import

  - id: residential_service
    primary_service: service:residential_demand
    technologies:
      - residential_device

  - id: wind_supply
    primary_service: service:wind_supply
    technologies:
      - wind_resource_supply

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

temporal_index_series:
  - id: demand_index
    unit: index
    values:
      "2020": 1.0
      "2025": 1.1
      "2030": 1.2
      "2040": 1.4
    base_year: 2020

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

sites:
  - id: single_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        single_region: SINGLE

facilities:
  - id: gas_supply_facility
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2020
          technology: gas_import
    technology_role: gas_supply

  - id: generation_facility
    available_technologies:
      - ccgt
      - wind
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 2 MW
            year: 2020
          technology: ccgt

        - metric: installed_capacity
          observed:
            value: 1 MW
            year: 2020
          technology: wind
    technology_role: electricity_generation

  - id: residential_service_facility
    site: single_hub
    stock:
      items:
        - adjust_to_base_year:
            using: demand_index
          metric: annual_activity
          observed:
            value: 30 GWh/year
            year: 2020
          technology: residential_device
    technology_role: residential_service

  - id: wind_supply_facility
    site: single_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2020
          technology: wind_resource_supply
    technology_role: wind_supply

runs:
  - id: single_2020
    base_year: 2020
    currency_year: 2024
    region_partition: single_region
