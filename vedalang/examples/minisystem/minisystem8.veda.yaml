dsl_version: "0.2"

commodities:
  - id: emission:co2
    kind: emission

  - id: primary:coal
    kind: primary

  - id: primary:gas
    kind: primary

  - id: secondary:electricity
    kind: secondary

  - id: secondary:hydrogen
    kind: secondary

  - id: service:coal_supply
    kind: service

  - id: service:commercial_demand
    kind: service

  - id: service:electricity_generation
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:hydrogen_supply
    kind: service

  - id: service:industrial_demand
    kind: service

  - id: service:residential_demand
    kind: service

  - id: service:transport_demand
    kind: service

technologies:
  - id: ccgt
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emissions:
      - commodity: emission:co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: service:electricity_generation

  - id: coal_import
    outputs:
      - commodity: primary:coal
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:coal_supply

  - id: coal_plant
    inputs:
      - commodity: primary:coal
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emissions:
      - commodity: emission:co2
        factor: 0.09 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.38
    provides: service:electricity_generation

  - id: commercial_device
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:commercial_demand

  - id: gas_import
    outputs:
      - commodity: primary:gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply

  - id: industrial_device
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:industrial_demand

  - id: residential_device
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:residential_demand

  - id: smr
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: secondary:hydrogen
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.7
    provides: service:hydrogen_supply

  - id: transport_device
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:transport_demand

technology_roles:
  - id: coal_supply
    primary_service: service:coal_supply
    technologies:
      - coal_import

  - id: commercial_service
    primary_service: service:commercial_demand
    technologies:
      - commercial_device

  - id: electricity_generation
    primary_service: service:electricity_generation
    technologies:
      - coal_plant
      - ccgt

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - gas_import

  - id: hydrogen_supply
    primary_service: service:hydrogen_supply
    technologies:
      - smr

  - id: industrial_service
    primary_service: service:industrial_demand
    technologies:
      - industrial_device

  - id: residential_service
    primary_service: service:residential_demand
    technologies:
      - residential_device

  - id: transport_service
    primary_service: service:transport_demand
    technologies:
      - transport_device

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: australian_regions
    layer: geo.demo
    mapping:
      kind: constant
      value: NEM_EAST
    members:
      - NEM_EAST
      - NEM_SOUTH
      - WA

sites:
  - id: nem_east_hub
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        australian_regions: NEM_EAST

  - id: nem_south_hub
    location:
      point:
        lat: -37.81
        lon: 144.96
    membership_overrides:
      region_partitions:
        australian_regions: NEM_SOUTH

  - id: wa_hub
    location:
      point:
        lat: -31.95
        lon: 115.86
    membership_overrides:
      region_partitions:
        australian_regions: WA

facilities:
  - id: commercial_sector
    site: nem_south_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 60 GWh/year
            year: 2025
          technology: commercial_device
    technology_role: commercial_service

  - id: industrial_sector
    site: nem_east_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 40 GWh/year
            year: 2025
          technology: industrial_device
    technology_role: industrial_service

  - id: nem_east_generation
    available_technologies:
      - coal_plant
      - ccgt
    site: nem_east_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 20 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation

  - id: nem_east_hydrogen
    site: nem_east_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: smr
    technology_role: hydrogen_supply

  - id: nem_east_supply
    site: nem_east_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply

  - id: nem_south_generation
    available_technologies:
      - coal_plant
      - ccgt
    site: nem_south_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 18 MW
            year: 2025
          technology: coal_plant
    technology_role: electricity_generation

  - id: nem_south_supply
    site: nem_south_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: coal_import
    technology_role: coal_supply

  - id: residential_sector
    site: nem_east_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 70 GWh/year
            year: 2025
          technology: residential_device
    technology_role: residential_service

  - id: transport_sector
    site: wa_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 50 GWh/year
            year: 2025
          technology: transport_device
    technology_role: transport_service

  - id: wa_generation
    available_technologies:
      - coal_plant
      - ccgt
    site: wa_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 12 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation

  - id: wa_supply
    site: wa_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply

networks:
  - id: east_south_interconnector
    kind: transmission
    links:
      - id: east_to_south
        commodity: secondary:electricity
        existing_transfer_capacity: 80 MW
        from: NEM_EAST
        to: NEM_SOUTH
    node_basis:
      kind: region_partition
      ref: australian_regions

runs:
  - id: australia_2025
    base_year: 2025
    currency_year: 2024
    region_partition: australian_regions
