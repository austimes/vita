dsl_version: "0.3"
commodities:
  - id: co2
    type: emission
  - id: coal
    type: energy
    energy_form: primary
  - id: gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: hydrogen
    type: energy
    energy_form: secondary
  - id: coal_supply
    type: service
  - id: commercial_demand
    type: service
  - id: electricity_generation
    type: service
  - id: gas_supply
    type: service
  - id: hydrogen_supply
    type: service
  - id: industrial_demand
    type: service
  - id: residential_demand
    type: service
  - id: transport_demand
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
  - id: coal_import
    outputs:
      - commodity: coal
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: coal_supply
  - id: coal_plant
    inputs:
      - commodity: coal
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.09 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.38
    provides: electricity_generation
  - id: commercial_device
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: commercial_demand
  - id: gas_import
    outputs:
      - commodity: gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
  - id: industrial_device
    inputs:
      - commodity: hydrogen
        basis: HHV
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: industrial_demand
  - id: residential_device
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: residential_demand
  - id: smr
    inputs:
      - commodity: gas
        basis: HHV
    outputs:
      - commodity: hydrogen
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.7
    provides: hydrogen_supply
  - id: transport_device
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: transport_demand
technology_roles:
  - id: coal_supply
    primary_service: coal_supply
    technologies:
      - coal_import
  - id: commercial_service
    primary_service: commercial_demand
    technologies:
      - commercial_device
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - coal_plant
      - ccgt
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - gas_import
  - id: hydrogen_supply
    primary_service: hydrogen_supply
    technologies:
      - smr
  - id: industrial_service
    primary_service: industrial_demand
    technologies:
      - industrial_device
  - id: residential_service
    primary_service: residential_demand
    technologies:
      - residential_device
  - id: transport_service
    primary_service: transport_demand
    technologies:
      - transport_device
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: australian_regions
    layer: geo.demo
    mapping:
      kind: constant
      value: NEM_EAST
    members:
      - NEM_EAST
      - NEM_SOUTH
      - WA
sites:
  - id: nem_east_hub
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        australian_regions: NEM_EAST
  - id: nem_south_hub
    location:
      point:
        lat: -37.81
        lon: 144.96
    membership_overrides:
      region_partitions:
        australian_regions: NEM_SOUTH
  - id: wa_hub
    location:
      point:
        lat: -31.95
        lon: 115.86
    membership_overrides:
      region_partitions:
        australian_regions: WA
facilities:
  - id: commercial_sector
    site: nem_south_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 60 GWh/year
            year: 2025
          technology: commercial_device
    technology_role: commercial_service
  - id: industrial_sector
    site: nem_east_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 40 GWh/year
            year: 2025
          technology: industrial_device
    technology_role: industrial_service
  - id: nem_east_generation
    available_technologies:
      - coal_plant
      - ccgt
    site: nem_east_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 20 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation
  - id: nem_east_hydrogen
    site: nem_east_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: smr
    technology_role: hydrogen_supply
  - id: nem_east_supply
    site: nem_east_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply
  - id: nem_south_generation
    available_technologies:
      - coal_plant
      - ccgt
    site: nem_south_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 18 MW
            year: 2025
          technology: coal_plant
    technology_role: electricity_generation
  - id: nem_south_supply
    site: nem_south_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: coal_import
    technology_role: coal_supply
  - id: residential_sector
    site: nem_east_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 70 GWh/year
            year: 2025
          technology: residential_device
    technology_role: residential_service
  - id: transport_sector
    site: wa_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 50 GWh/year
            year: 2025
          technology: transport_device
    technology_role: transport_service
  - id: wa_generation
    available_technologies:
      - coal_plant
      - ccgt
    site: wa_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 12 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation
  - id: wa_supply
    site: wa_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply
networks:
  - id: east_south_interconnector
    kind: transmission
    links:
      - id: east_to_south
        commodity: electricity
        existing_transfer_capacity: 80 MW
        from: NEM_EAST
        to: NEM_SOUTH
    node_basis:
      kind: region_partition
      ref: australian_regions
runs:
  - id: australia_2025
    base_year: 2025
    currency_year: 2024
    region_partition: australian_regions
