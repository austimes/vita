dsl_version: "0.2"

commodities:
  - id: emission:co2
    kind: emission

  - id: primary:natural_gas
    kind: primary

  - id: resource:wind_resource
    kind: material

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_generation
    kind: service

  - id: service:electricity_service
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:wind_resource_supply
    kind: service

technologies:
  - id: ccgt
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emissions:
      - commodity: emission:co2
        factor: 0.056 t/GJ
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: service:electricity_generation

  - id: grid_delivery
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_service

  - id: natural_gas_supply
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply

  - id: wind_resource_supply
    outputs:
      - commodity: resource:wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:wind_resource_supply

  - id: wind_turbine
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_generation

technology_roles:
  - id: electricity_generation
    primary_service: service:electricity_generation
    technologies:
      - ccgt
      - wind_turbine

  - id: electricity_service
    primary_service: service:electricity_service
    technologies:
      - grid_delivery

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - natural_gas_supply

  - id: wind_resource_supply
    primary_service: service:wind_resource_supply
    technologies:
      - wind_resource_supply

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

sites:
  - id: single_energy_hub
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        single_region: SINGLE

facilities:
  - id: single_gas_supply
    site: single_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 200 MW
            year: 2025
          technology: natural_gas_supply
    technology_role: gas_supply

  - id: single_generation
    available_technologies:
      - ccgt
      - wind_turbine
    site: single_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: ccgt

        - metric: installed_capacity
          observed:
            value: 4 MW
            year: 2025
          technology: wind_turbine
    technology_role: electricity_generation

  - id: single_service_delivery
    site: single_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 12 MW
            year: 2025
          technology: grid_delivery
    technology_role: electricity_service

  - id: single_wind_resource
    site: single_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 200 MW
            year: 2025
          technology: wind_resource_supply
    technology_role: wind_resource_supply

opportunities:
  - id: single_more_wind
    max_new_capacity: 25 MW
    siting:
      region_member:
        member: SINGLE
        partition: single_region
    technology: wind_turbine

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region
