# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniModel
  description: Thermal and renewable plants with CO2 price trajectory
  regions:
    - REG1
  milestone_years:
    - 2025
    - 2030
    - 2040
    - 2050
  commodities:
    - id: emission:co2
      description: Carbon dioxide emissions
      type: emission
      unit: Mt
      combustible: false

    - id: primary:natural_gas
      description: Natural Gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: resource:wind_resource
      description: Wind resource potential
      type: other
      unit: PJ
      combustible: false

    - id: secondary:electricity
      description: Electricity carrier
      type: energy
      unit: PJ
      combustible: false

    - id: service:electricity_demand
      description: Electricity demand service
      type: service
      unit: PJ
      combustible: false
  scenario_parameters:
    - name: co2_price
      description: Carbon price trajectory 2025-2050
      type: commodity_price
      commodity: emission:co2
      values:
        "2025": 50
        "2030": 100
        "2040": 150
        "2050": 200
      interpolation: interp_extrap

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: satisfy_electricity_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:electricity_demand

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

# Process variants: concrete technology definitions bound to roles.
variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emission_factors:
      emission:co2: 0.05
    efficiency: 0.55
    emission_factor_basis: HHV
    lifetime: 40

  - id: grid_delivery
    role: satisfy_electricity_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:electricity_demand
    efficiency: 1.0
    lifetime: 100

  - id: onshore_wind_potential
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: pipeline_import
    role: import_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt
    regions:
      - REG1

  - variant: grid_delivery
    regions:
      - REG1
    sectors:
      - RES

  - variant: onshore_wind_potential
    regions:
      - REG1

  - variant: pipeline_import
    regions:
      - REG1

  - variant: wind
    regions:
      - REG1

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - cap_bound:
      up: 100
    selector:
      variant: ccgt
      region: REG1
    stock: 2

  - selector:
      variant: grid_delivery
      region: REG1
      sector: RES
    stock: 1000

  - ncap_bound:
      up: 100
    selector:
      variant: onshore_wind_potential
      region: REG1
    stock: 1000

  - selector:
      variant: pipeline_import
      region: REG1
    stock: 1000

  - cap_bound:
      up: 100
    selector:
      variant: wind
      region: REG1
    stock: 1

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:electricity_demand
    region: REG1
    values:
      "2025": 30
      "2030": 40
      "2040": 50
      "2050": 60
    interpolation: interp_extrap
    sector: RES
