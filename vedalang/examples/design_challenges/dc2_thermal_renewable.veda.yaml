dsl_version: "0.2"

commodities:
  - id: primary:natural_gas
    kind: primary

  - id: resource:wind_resource
    kind: material

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_generation
    kind: service

  - id: service:electricity_service
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:wind_resource_supply
    kind: service

technologies:
  - id: ccgt
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: service:electricity_generation

  - id: direct_electric_service
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_service

  - id: natural_gas_import
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply

  - id: wind_resource_supply
    outputs:
      - commodity: resource:wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:wind_resource_supply

  - id: wind_turbine
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_generation

technology_roles:
  - id: electricity_generation
    primary_service: service:electricity_generation
    technologies:
      - ccgt
      - wind_turbine

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - natural_gas_import

  - id: useful_electricity
    primary_service: service:electricity_service
    technologies:
      - direct_electric_service

  - id: wind_resource_supply
    primary_service: service:wind_resource_supply
    technologies:
      - wind_resource_supply

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: reg1_partition
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1

sites:
  - id: reg1_energy_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        reg1_partition: REG1

facilities:
  - id: reg1_gas_supply
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2020
          technology: natural_gas_import
    technology_role: gas_supply

  - id: reg1_generation
    available_technologies:
      - ccgt
      - wind_turbine
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2020
          technology: ccgt

        - metric: installed_capacity
          observed:
            value: 6 MW
            year: 2020
          technology: wind_turbine
    technology_role: electricity_generation

  - id: reg1_useful_electricity
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 20 MW
            year: 2020
          technology: direct_electric_service
    technology_role: useful_electricity

  - id: reg1_wind_resource
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2020
          technology: wind_resource_supply
    technology_role: wind_resource_supply

opportunities:
  - id: reg1_more_wind
    max_new_capacity: 20 MW
    siting:
      region_member:
        member: REG1
        partition: reg1_partition
    technology: wind_turbine

runs:
  - id: reg1_2020
    base_year: 2020
    currency_year: 2024
    region_partition: reg1_partition
