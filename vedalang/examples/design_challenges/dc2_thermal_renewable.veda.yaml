# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniModel
  description: Thermal and renewable plants sharing electricity output
  regions:
    - REG1
  milestone_years:
    - 2020
    - 2030
  commodities:
    - id: primary:natural_gas
      description: Natural gas fuel
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: resource:wind_resource
      description: Wind resource input
      type: other
      unit: PJ
      combustible: false

    - id: secondary:electricity
      description: Electricity carrier
      type: energy
      unit: PJ
      combustible: false

    - id: service:useful_electricity
      description: Useful electricity service
      type: service
      unit: PJ
      combustible: false

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - IND

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_useful_electric_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:useful_electricity

  - id: supply_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55

  - id: generic_electric_end_use
    role: provide_useful_electric_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:useful_electricity
    efficiency: 1.0

  - id: ng_default
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: wind_default
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: wind_turbine
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt
    regions:
      - REG1
    sectors:
      - IND

  - variant: generic_electric_end_use
    regions:
      - REG1
    sectors:
      - IND

  - variant: ng_default
    regions:
      - REG1

  - variant: wind_default
    regions:
      - REG1

  - variant: wind_turbine
    regions:
      - REG1
    sectors:
      - IND

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:useful_electricity
    region: REG1
    values:
      "2020": 8
      "2030": 8
    interpolation: interp_extrap
    sector: IND
