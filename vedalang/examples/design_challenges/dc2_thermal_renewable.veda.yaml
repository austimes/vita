dsl_version: "0.3"

commodities:
  - id: electricity
    type: energy
    energy_form: secondary

  - id: electricity_generation
    type: service

  - id: electricity_service
    type: service

  - id: gas_supply
    type: service

  - id: natural_gas
    type: energy
    energy_form: primary

  - id: wind_resource
    type: energy
    energy_form: resource

  - id: wind_resource_supply
    type: service

technologies:
  - id: ccgt
    description: ccgt provides electricity_generation by transforming natural_gas.
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation

  - id: direct_electric_service
    description: direct_electric_service provides electricity_service by transforming
      electricity.
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_service

  - id: natural_gas_import
    description:
      natural_gas_import provides gas_supply as a primary supply or conversion
      technology.
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply

  - id: wind_resource_supply
    description: wind_resource_supply provides wind_resource_supply as a primary supply
      or conversion technology.
    outputs:
      - commodity: wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: wind_resource_supply

  - id: wind_turbine
    description: wind_turbine provides electricity_generation by transforming wind_resource.
    inputs:
      - commodity: wind_resource
    outputs:
      - commodity: electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_generation

technology_roles:
  - id: electricity_generation
    description:
      "electricity_generation groups technologies that deliver electricity_generation:
      ccgt and wind_turbine."
    primary_service: electricity_generation
    technologies:
      - ccgt
      - wind_turbine

  - id: gas_supply
    description: "gas_supply groups technologies that deliver gas_supply: natural_gas_import."
    primary_service: gas_supply
    technologies:
      - natural_gas_import

  - id: useful_electricity
    description:
      "useful_electricity groups technologies that deliver electricity_service:
      direct_electric_service."
    primary_service: electricity_service
    technologies:
      - direct_electric_service

  - id: wind_resource_supply
    description:
      "wind_resource_supply groups technologies that deliver wind_resource_supply:
      wind_resource_supply."
    primary_service: wind_resource_supply
    technologies:
      - wind_resource_supply

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: reg1_partition
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1

sites:
  - id: reg1_energy_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        reg1_partition: REG1

facilities:
  - id: reg1_gas_supply
    description: reg1_gas_supply instantiates role gas_supply at site reg1_energy_hub.
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2020
          technology: natural_gas_import
    technology_role: gas_supply

  - id: reg1_generation
    description: reg1_generation instantiates role electricity_generation at site reg1_energy_hub.
    available_technologies:
      - ccgt
      - wind_turbine
    new_build_limits:
      - max_new_capacity: 20 MW
        technology: wind_turbine
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2020
          technology: ccgt

        - metric: installed_capacity
          observed:
            value: 6 MW
            year: 2020
          technology: wind_turbine
    technology_role: electricity_generation

  - id: reg1_useful_electricity
    description: reg1_useful_electricity instantiates role useful_electricity at site
      reg1_energy_hub.
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 20 MW
            year: 2020
          technology: direct_electric_service
    technology_role: useful_electricity

  - id: reg1_wind_resource
    description: reg1_wind_resource instantiates role wind_resource_supply at site reg1_energy_hub.
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2020
          technology: wind_resource_supply
    technology_role: wind_resource_supply

runs:
  - id: reg1_2020
    base_year: 2020
    currency_year: 2024
    region_partition: reg1_partition
