# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniSystem6
  description: Timeslice structure with seasonal and day/night resolution
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2025
    - 2030
    - 2040
  timeslices:
    daynite:
      - name: Day
        code: D

      - name: Night
        code: N
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25
    season:
      - name: Summer
        code: S

      - name: Winter
        code: W
  commodities:
    - id: emission:co2
      description: Carbon dioxide emissions
      type: emission
      unit: Mt
      combustible: false

    - id: primary:natural_gas
      description: Natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: resource:wind_resource
      description: Wind resource availability
      type: other
      unit: PJ
      combustible: false

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_demand
      description: Residential demand
      type: service
      unit: PJ
      combustible: false
  scenario_parameters:
    - name: co2_price
      description: Carbon price trajectory
      type: commodity_price
      commodity: emission:co2
      values:
        "2025": 30
        "2030": 50
        "2050": 100
      interpolation: interp_extrap

# Scoping (current key name: segments): defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
segments:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: deliver_residential
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_demand

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emission_factors:
      emission:co2: 0.05
    efficiency: 0.55
    emission_factor_basis: HHV
    fixed_om_cost: 20 MUSD24/GW/yr
    investment_cost: 800 MUSD24/GW
    lifetime: 40
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

  - id: wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    fixed_om_cost: 25 MUSD24/GW/yr
    investment_cost: 1200 MUSD24/GW
    lifetime: 25
    variable_om_cost: 1 MUSD24/PJ

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt
    regions:
      - SINGLE

  - variant: gas_import
    regions:
      - SINGLE

  - variant: residential_device
    regions:
      - SINGLE
    sectors:
      - RES

  - variant: wind
    regions:
      - SINGLE

  - variant: wind_resource_supply
    regions:
      - SINGLE

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - cap_bound:
      up: 100
    selector:
      variant: ccgt
      region: SINGLE
    stock: 2

  - selector:
      variant: gas_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    stock: 1000

  - cap_bound:
      up: 100
    selector:
      variant: wind
      region: SINGLE
    stock: 1

  - selector:
      variant: wind_resource_supply
      region: SINGLE
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/segment).
demands:
  - commodity: service:residential_demand
    region: SINGLE
    values:
      "2020": 30
      "2030": 60
      "2050": 90
    interpolation: interp_extrap
    sector: RES
