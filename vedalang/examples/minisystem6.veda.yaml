# MiniSystem6: Intra-annual Timeslices
# Increment 6: Seasonal and day/night temporal resolution
# New capabilities: timeslices (S/W × D/N), fractions
# Tests: Timeslice definitions, demand distribution across slices
# Issue: vedalang-8pr.6
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniSystem6
  description: Timeslice structure with seasonal and day/night resolution

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2040]

  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25

  commodities:
    - id: gas
      kind: carrier
      unit: PJ
      description: Natural gas

    - id: electricity
      kind: carrier
      unit: PJ
      description: Electricity

    - id: co2
      kind: emission
      unit: Mt
      description: Carbon dioxide emissions

    - id: residential_demand
      kind: service
      unit: PJ
      description: Residential demand

  scenario_parameters:
    - name: co2_price
      description: Carbon price trajectory
      type: commodity_price
      commodity: co2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 100

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    inputs: []
    outputs:
      - commodity: gas

  - id: generate_electricity
    stage: conversion
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity
      - commodity: co2

  - id: generate_electricity_renewable
    stage: conversion
    inputs: []
    outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    lifetime: 40
    emission_factors:
      co2: 0.05

  - id: wind
    role: generate_electricity_renewable
    efficiency: 1.0
    investment_cost: 1200
    fixed_om_cost: 25
    variable_om_cost: 1
    lifetime: 25

  - id: residential_device
    role: deliver_residential
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [SINGLE]

  - variant: ccgt
    regions: [SINGLE]

  - variant: wind
    regions: [SINGLE]

  - variant: residential_device
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: ccgt
      region: SINGLE
    stock: 2
    cap_bound:
      up: 100

  - selector:
      variant: wind
      region: SINGLE
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    stock: 1000

demands:
  - commodity: residential_demand
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 30
      "2030": 60
      "2050": 90
