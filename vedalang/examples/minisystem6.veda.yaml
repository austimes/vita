model:
  name: MiniSystem6
  description: Timeslice structure with seasonal and day/night resolution
  regions:
  - SINGLE
  milestone_years:
  - 2020
  - 2025
  - 2030
  - 2040
  timeslices:
    season:
    - code: S
      name: Summer
    - code: W
      name: Winter
    daynite:
    - code: D
      name: Day
    - code: N
      name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25
  commodities:
  - id: primary:natural_gas
    type: fuel
    unit: PJ
    description: Natural gas
    combustible: true
    lhv_mj_per_unit: 50.0
    hhv_mj_per_unit: 55.0
  - id: secondary:electricity
    type: energy
    unit: PJ
    description: Electricity
    combustible: false
  - id: emission:co2
    type: emission
    unit: Mt
    description: Carbon dioxide emissions
    combustible: false
  - id: service:residential_demand
    type: service
    unit: PJ
    description: Residential demand
    combustible: false
  - id: resource:wind_resource
    type: other
    unit: PJ
    description: Wind resource availability
    combustible: false
  scenario_parameters:
  - name: co2_price
    description: Carbon price trajectory
    type: commodity_price
    commodity: emission:co2
    interpolation: interp_extrap
    values:
      '2025': 30
      '2030': 50
      '2050': 100
segments:
  sectors:
  - RES
process_roles:
- id: import_gas
  activity_unit: PJ
  capacity_unit: GW
  stage: supply
  required_inputs: []
  required_outputs:
  - commodity: primary:natural_gas
- id: supply_wind_resource
  activity_unit: PJ
  capacity_unit: GW
  stage: supply
  required_inputs: []
  required_outputs:
  - commodity: resource:wind_resource
- id: generate_electricity
  activity_unit: PJ
  capacity_unit: GW
  stage: conversion
  required_inputs: []
  required_outputs:
  - commodity: secondary:electricity
- id: deliver_residential
  activity_unit: PJ
  capacity_unit: GW
  stage: end_use
  required_inputs:
  - commodity: secondary:electricity
  required_outputs:
  - commodity: service:residential_demand
process_variants:
- id: gas_import
  role: import_gas
  inputs: []
  outputs:
  - commodity: primary:natural_gas
    basis: HHV
  efficiency: 1.0
  lifetime: 100
- id: wind_resource_supply
  role: supply_wind_resource
  inputs: []
  outputs:
  - commodity: resource:wind_resource
  efficiency: 1.0
  lifetime: 100
- id: ccgt
  role: generate_electricity
  inputs:
  - commodity: primary:natural_gas
    basis: HHV
  outputs:
  - commodity: secondary:electricity
  efficiency: 0.55
  investment_cost: 800 MUSD24/GW
  fixed_om_cost: 20 MUSD24/GW/yr
  variable_om_cost: 2 MUSD24/PJ
  lifetime: 40
  emission_factors:
    emission:co2: 0.05
  variable_om_cost_basis: HHV
  emission_factor_basis: HHV
- id: wind
  role: generate_electricity
  inputs:
  - commodity: resource:wind_resource
  outputs:
  - commodity: secondary:electricity
  efficiency: 1.0
  investment_cost: 1200 MUSD24/GW
  fixed_om_cost: 25 MUSD24/GW/yr
  variable_om_cost: 1 MUSD24/PJ
  lifetime: 25
- id: residential_device
  role: deliver_residential
  inputs:
  - commodity: secondary:electricity
  outputs:
  - commodity: service:residential_demand
  efficiency: 1.0
  lifetime: 100
availability:
- variant: gas_import
  regions:
  - SINGLE
- variant: wind_resource_supply
  regions:
  - SINGLE
- variant: ccgt
  regions:
  - SINGLE
- variant: wind
  regions:
  - SINGLE
- variant: residential_device
  regions:
  - SINGLE
  sectors:
  - RES
process_parameters:
- selector:
    variant: gas_import
    region: SINGLE
  stock: 1000
- selector:
    variant: wind_resource_supply
    region: SINGLE
  stock: 1000
- selector:
    variant: ccgt
    region: SINGLE
  stock: 2
  cap_bound:
    up: 100
- selector:
    variant: wind
    region: SINGLE
  stock: 1
  cap_bound:
    up: 100
- selector:
    variant: residential_device
    region: SINGLE
    sector: RES
  stock: 1000
demands:
- commodity: service:residential_demand
  region: SINGLE
  sector: RES
  interpolation: interp_extrap
  values:
    '2020': 30
    '2030': 60
    '2050': 90
