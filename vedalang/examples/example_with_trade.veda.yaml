model:
  name: TwoRegionTrade
  description: Two regions with electricity and gas trade
  regions:
    - REG1
    - REG2
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
    - 2060
  commodities:
    - id: primary:natural_gas
      description: Natural Gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_demand
      description: Residential demand
      type: service
      unit: PJ
      combustible: false
  trade_links:
    - commodity: primary:natural_gas
      origin: REG1
      destination: REG2
      bidirectional: true

    - commodity: secondary:electricity
      origin: REG1
      destination: REG2
      bidirectional: true
      efficiency: 0.98

segments:
  sectors:
    - RES

process_roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: provide_residential_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_demand

process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    fixed_om_cost: 20 MUSD24/GW/yr
    investment_cost: 800 MUSD24/GW
    lifetime: 30

  - id: pipeline_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: standard_residential_device
    role: provide_residential_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: ccgt
    regions:
      - REG1
      - REG2

  - variant: pipeline_import
    regions:
      - REG1
      - REG2

  - variant: standard_residential_device
    regions:
      - REG1
      - REG2
    sectors:
      - RES

process_parameters:
  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: ccgt
      region: REG2
    stock: 10

  - selector:
      variant: pipeline_import
      region: REG1
    stock: 1000

  - selector:
      variant: pipeline_import
      region: REG2
    stock: 1000

  - selector:
      variant: standard_residential_device
      region: REG1
      sector: RES
    stock: 1000

  - selector:
      variant: standard_residential_device
      region: REG2
      sector: RES
    stock: 1000

demands:
  - commodity: service:residential_demand
    region: REG1
    values:
      "2020": 100.0
      "2030": 120.0
      "2050": 160.0
    interpolation: interp_extrap
    sector: RES

  - commodity: service:residential_demand
    region: REG2
    values:
      "2020": 100.0
      "2030": 120.0
      "2050": 160.0
    interpolation: interp_extrap
    sector: RES
