# VedaLang example: Two-region model with inter-regional trade
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: TwoRegionTrade
  description: Two regions with electricity and gas trade

  regions:
    - REG1
    - REG2

  milestone_years: [2020, 2030, 2040, 2050, 2060]

  commodities:
    - id: electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: gas
      type: fuel
      unit: PJ
      description: Natural Gas

    - id: residential_demand
      type: service
      unit: PJ
      description: Residential demand

  trade_links:
    - origin: REG1
      destination: REG2
      commodity: electricity
      bidirectional: true
      efficiency: 0.98  # 2% transmission loss

    - origin: REG1
      destination: REG2
      commodity: gas
      bidirectional: true
      # No efficiency means default (1.0 = no loss)

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: gas

  - id: generate_electricity
    stage: conversion
    required_inputs:
      - commodity: gas
    required_outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: electricity
    required_outputs:
      - commodity: residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    lifetime: 30

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [REG1, REG2]

  - variant: ccgt
    regions: [REG1, REG2]

  - variant: residential_device
    regions: [REG1, REG2]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: REG1
    stock: 1000

  - selector:
      variant: gas_import
      region: REG2
    stock: 1000

  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: ccgt
      region: REG2
    stock: 10

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000

  - selector:
      variant: residential_device
      region: REG2
      sector: RES
    stock: 1000

demands:
  - commodity: residential_demand
    region: REG1
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100.0
      "2030": 120.0
      "2050": 160.0

  - commodity: residential_demand
    region: REG2
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100.0
      "2030": 120.0
      "2050": 160.0
