# MiniSystem8: Australian Baseline Scaffold
# Increment 8: Production-aligned multi-sector energy system
# New capabilities: Multi-sector (RES/COM/IND/TRN), hydrogen production & use, coal, solar
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability
# Issue: vedalang-8pr.8

model:
  name: MiniSystem8
  description: Australian baseline scaffold with multi-sector energy system

  regions:
    - NEM_EAST
    - NEM_SOUTH
    - WA

  milestone_years: [2020, 2025, 2030, 2040, 2050]

  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25

  commodities:
    # Tradable energy carriers
    - id: gas
      kind: carrier
      unit: PJ
      description: Natural gas

    - id: coal
      kind: carrier
      unit: PJ
      description: Coal

    - id: electricity
      kind: carrier
      unit: PJ
      description: Electricity

    - id: hydrogen
      kind: carrier
      unit: PJ
      description: Hydrogen

    # Emissions
    - id: co2
      kind: emission
      unit: Mt
      description: Carbon dioxide

    # Service demands
    - id: residential_demand
      kind: service
      unit: PJ
      description: Residential demand

    - id: commercial_demand
      kind: service
      unit: PJ
      description: Commercial demand

    - id: industrial_demand
      kind: service
      unit: PJ
      description: Industrial demand

    - id: transport_demand
      kind: service
      unit: PJ
      description: Transport demand

  trade_links:
    - origin: NEM_EAST
      destination: NEM_SOUTH
      commodity: electricity
      bidirectional: false
      efficiency: 0.97

  scenario_parameters:
    - name: co2_price
      description: Carbon price trajectory
      type: commodity_price
      commodity: co2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 150

segments:
  sectors: [RES, COM, IND, TRN]

process_roles:
  # === SUPPLY ===
  - id: import_gas
    stage: supply
    inputs: []
    outputs:
      - commodity: gas

  - id: import_coal
    stage: supply
    inputs: []
    outputs:
      - commodity: coal

  # === ELECTRICITY GENERATION ===
  - id: generate_electricity_gas
    stage: conversion
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity

  - id: generate_electricity_coal
    stage: conversion
    inputs:
      - commodity: coal
    outputs:
      - commodity: electricity

  - id: generate_electricity_renewable
    stage: conversion
    inputs: []
    outputs:
      - commodity: electricity

  # === HYDROGEN PRODUCTION ===
  - id: produce_hydrogen_gas
    stage: conversion
    inputs:
      - commodity: gas
    outputs:
      - commodity: hydrogen

  - id: produce_hydrogen_elec
    stage: conversion
    inputs:
      - commodity: electricity
    outputs:
      - commodity: hydrogen

  # === END USE ===
  - id: deliver_residential
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand

  - id: deliver_commercial
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: commercial_demand

  - id: deliver_industrial_gas
    stage: end_use
    inputs:
      - commodity: gas
    outputs:
      - commodity: industrial_demand

  - id: deliver_industrial_hydrogen
    stage: end_use
    inputs:
      - commodity: hydrogen
    outputs:
      - commodity: industrial_demand

  - id: deliver_transport_elec
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: transport_demand

  - id: deliver_transport_hydrogen
    stage: end_use
    inputs:
      - commodity: hydrogen
    outputs:
      - commodity: transport_demand

process_variants:
  # === SUPPLY ===
  - id: gas_import
    role: import_gas
    efficiency: 1.0
    lifetime: 100

  - id: coal_import
    role: import_coal
    efficiency: 1.0
    lifetime: 100

  # === GENERATION ===
  - id: coal_plant
    role: generate_electricity_coal
    efficiency: 0.38
    investment_cost: 2500
    fixed_om_cost: 40
    variable_om_cost: 3
    lifetime: 40
    emissions:
      - commodity: co2
        emission_factor: 0.09

  - id: ccgt
    role: generate_electricity_gas
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    lifetime: 40
    emissions:
      - commodity: co2
        emission_factor: 0.05

  - id: wind
    role: generate_electricity_renewable
    efficiency: 1.0
    investment_cost: 1200
    fixed_om_cost: 25
    variable_om_cost: 1
    lifetime: 25

  - id: solar
    role: generate_electricity_renewable
    efficiency: 1.0
    investment_cost: 1000
    fixed_om_cost: 15
    variable_om_cost: 0.5
    lifetime: 25

  # === HYDROGEN ===
  - id: smr
    role: produce_hydrogen_gas
    efficiency: 0.75
    investment_cost: 1500
    fixed_om_cost: 50
    variable_om_cost: 2
    lifetime: 25
    emissions:
      - commodity: co2
        emission_factor: 0.056

  - id: electrolyzer
    role: produce_hydrogen_elec
    efficiency: 0.70
    investment_cost: 2000
    fixed_om_cost: 30
    variable_om_cost: 1
    lifetime: 20

  # === DEMAND DEVICES ===
  - id: residential_device
    role: deliver_residential
    efficiency: 1.0
    lifetime: 100

  - id: commercial_device
    role: deliver_commercial
    efficiency: 1.0
    lifetime: 100

  - id: industrial_gas_device
    role: deliver_industrial_gas
    efficiency: 0.85
    lifetime: 30

  - id: industrial_hydrogen_device
    role: deliver_industrial_hydrogen
    efficiency: 0.80
    lifetime: 30

  - id: transport_elec_device
    role: deliver_transport_elec
    efficiency: 0.90
    lifetime: 15

  - id: transport_hydrogen_device
    role: deliver_transport_hydrogen
    efficiency: 0.60
    lifetime: 15

availability:
  # Supply - all regions
  - variant: gas_import
    regions: [NEM_EAST, NEM_SOUTH, WA]

  - variant: coal_import
    regions: [NEM_EAST, NEM_SOUTH, WA]

  # Generation - all regions
  - variant: coal_plant
    regions: [NEM_EAST, NEM_SOUTH, WA]

  - variant: ccgt
    regions: [NEM_EAST, NEM_SOUTH, WA]

  - variant: wind
    regions: [NEM_EAST, NEM_SOUTH, WA]

  - variant: solar
    regions: [NEM_EAST, NEM_SOUTH, WA]

  # Hydrogen - all regions
  - variant: smr
    regions: [NEM_EAST, NEM_SOUTH, WA]

  - variant: electrolyzer
    regions: [NEM_EAST, NEM_SOUTH, WA]

  # Demand devices - sector specific
  - variant: residential_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [RES]

  - variant: commercial_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [COM]

  - variant: industrial_gas_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [IND]

  - variant: industrial_hydrogen_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
