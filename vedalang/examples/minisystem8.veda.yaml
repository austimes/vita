# MiniSystem8: Australian Baseline Scaffold
# Increment 8: Production-aligned multi-sector energy system
# New capabilities: Multi-sector (RES/COM/IND/TRN), hydrogen production & use, coal, solar
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability
# Issue: vedalang-8pr.8

model:
  name: MiniSystem8
  description: Australian baseline scaffold with multi-sector energy system

  regions:
    - NEM_EAST
    - NEM_SOUTH
    - WA

  milestone_years: [2020, 2025, 2030, 2040, 2050]

  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25

  commodities:
    # Tradable energy carriers
    - id: primary:gas
      type: fuel
      unit: PJ
      description: Natural gas

    - id: primary:coal
      type: fuel
      unit: PJ
      description: Coal

    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: secondary:hydrogen
      type: energy
      unit: PJ
      description: Hydrogen

    - id: resource:solar_irradiance
      type: other
      unit: PJ
      description: Solar irradiance resource

    - id: resource:wind_resource
      type: other
      unit: PJ
      description: Wind resource

    # Emissions
    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide

    # Service demands
    - id: service:residential_demand
      type: service
      unit: PJ
      description: Residential demand

    - id: service:commercial_demand
      type: service
      unit: PJ
      description: Commercial demand

    - id: service:industrial_demand
      type: service
      unit: PJ
      description: Industrial demand

    - id: service:transport_demand
      type: service
      unit: PJ
      description: Transport demand

  trade_links:
    - origin: NEM_EAST
      destination: NEM_SOUTH
      commodity: secondary:electricity
      bidirectional: false
      efficiency: 0.97

  scenario_parameters:
    - name: co2-price
      description: Carbon price trajectory
      type: commodity_price
      commodity: emission:co2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 150

segments:
  sectors: [RES, COM, IND, TRN]

process_roles:
  # === SUPPLY ===
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:gas

  - id: import_coal
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:coal

  - id: supply_solar_irradiance
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_irradiance

  - id: supply_wind_resource
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

  # === ELECTRICITY GENERATION ===
  - id: generate_electricity
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  # === HYDROGEN PRODUCTION ===
  - id: produce_hydrogen
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:hydrogen

  # === END USE ===
  - id: provide_residential_demand
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:residential_demand

  - id: provide_commercial_demand
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:commercial_demand

  - id: provide_industrial_demand
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:industrial_demand

  - id: provide_transport_demand
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:transport_demand

process_variants:
  # === SUPPLY ===
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:gas
    efficiency: 1.0
    lifetime: 100

  - id: coal_import
    role: import_coal
    inputs: []
    outputs:
      - commodity: primary:coal
    efficiency: 1.0
    lifetime: 100

  - id: solar_irradiance_supply
    role: supply_solar_irradiance
    inputs: []
    outputs:
      - commodity: resource:solar_irradiance
    efficiency: 1.0
    lifetime: 100

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  # === GENERATION ===
  - id: coal_plant
    role: generate_electricity
    inputs:
      - commodity: primary:coal
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.38
    investment_cost: 2500
    fixed_om_cost: 40
    variable_om_cost: 3
    lifetime: 40
    emission_factors:
      emission:co2: 0.09

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:gas
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    lifetime: 40
    emission_factors:
      emission:co2: 0.05

  - id: wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    investment_cost: 1200
    fixed_om_cost: 25
    variable_om_cost: 1
    lifetime: 25

  - id: solar
    role: generate_electricity
    inputs:
      - commodity: resource:solar_irradiance
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    investment_cost: 1000
    fixed_om_cost: 15
    variable_om_cost: 0.5
    lifetime: 25

  # === HYDROGEN ===
  - id: smr
    role: produce_hydrogen
    inputs:
      - commodity: primary:gas
    outputs:
      - commodity: secondary:hydrogen
    efficiency: 0.75
    investment_cost: 1500
    fixed_om_cost: 50
    variable_om_cost: 2
    lifetime: 25
    emission_factors:
      emission:co2: 0.056

  - id: electrolyzer
    role: produce_hydrogen
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: secondary:hydrogen
    efficiency: 0.70
    investment_cost: 2000
    fixed_om_cost: 30
    variable_om_cost: 1
    lifetime: 20

  # === DEMAND DEVICES ===
  - id: residential_electric_device
    role: provide_residential_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

  - id: commercial_electric_device
    role: provide_commercial_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:commercial_demand
    efficiency: 1.0
    lifetime: 100

  - id: industrial_gas_device
    role: provide_industrial_demand
    inputs:
      - commodity: primary:gas
    outputs:
      - commodity: service:industrial_demand
    efficiency: 0.85
    lifetime: 30

  - id: industrial_hydrogen_device
    role: provide_industrial_demand
    inputs:
      - commodity: secondary:hydrogen
    outputs:
      - commodity: service:industrial_demand
    efficiency: 0.80
    lifetime: 30

  - id: transport_elec_device
    role: provide_transport_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:transport_demand
    efficiency: 0.90
    lifetime: 15

  - id: transport_hydrogen_device
    role: provide_transport_demand
    inputs:
      - commodity: secondary:hydrogen
    outputs:
      - commodity: service:transport_demand
    efficiency: 0.60
    lifetime: 15

