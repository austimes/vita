model:
  name: MiniSystem8
  description: Australian baseline scaffold with multi-sector energy system
  regions:
    - NEM_EAST
    - NEM_SOUTH
    - WA
  milestone_years:
    - 2020
    - 2025
    - 2030
    - 2040
    - 2050
  timeslices:
    daynite:
      - name: Day
        code: D

      - name: Night
        code: N
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25
    season:
      - name: Summer
        code: S

      - name: Winter
        code: W
  commodities:
    - id: emission:co2
      description: Carbon dioxide
      type: emission
      unit: Mt
      combustible: false

    - id: primary:coal
      description: Coal
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 27.5
      lhv_mj_per_unit: 25.0

    - id: primary:gas
      description: Natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: resource:solar_irradiance
      description: Solar irradiance resource
      type: other
      unit: PJ
      combustible: false

    - id: resource:wind_resource
      description: Wind resource
      type: other
      unit: PJ
      combustible: false

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: secondary:hydrogen
      description: Hydrogen
      type: energy
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 132.0
      lhv_mj_per_unit: 120.0

    - id: service:commercial_demand
      description: Commercial demand
      type: service
      unit: PJ
      combustible: false

    - id: service:industrial_demand
      description: Industrial demand
      type: service
      unit: PJ
      combustible: false

    - id: service:residential_demand
      description: Residential demand
      type: service
      unit: PJ
      combustible: false

    - id: service:transport_demand
      description: Transport demand
      type: service
      unit: PJ
      combustible: false
  scenario_parameters:
    - name: co2-price
      description: Carbon price trajectory
      type: commodity_price
      commodity: emission:co2
      values:
        "2025": 30
        "2030": 50
        "2050": 150
      interpolation: interp_extrap
  trade_links:
    - commodity: secondary:electricity
      origin: NEM_EAST
      destination: NEM_SOUTH
      bidirectional: false
      efficiency: 0.97

segments:
  sectors:
    - COM
    - IND
    - RES
    - TRN

process_roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_coal
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:coal

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:gas

  - id: produce_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:hydrogen

  - id: provide_commercial_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:commercial_demand

  - id: provide_industrial_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:industrial_demand

  - id: provide_residential_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:residential_demand

  - id: provide_transport_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:transport_demand

  - id: supply_solar_irradiance
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_irradiance

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emission_factors:
      emission:co2: 0.05
    efficiency: 0.55
    emission_factor_basis: HHV
    fixed_om_cost: 20 MUSD24/GW/yr
    investment_cost: 800 MUSD24/GW
    lifetime: 40
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: coal_import
    role: import_coal
    inputs: []
    outputs:
      - commodity: primary:coal
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: coal_plant
    role: generate_electricity
    inputs:
      - commodity: primary:coal
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emission_factors:
      emission:co2: 0.09
    efficiency: 0.38
    emission_factor_basis: HHV
    fixed_om_cost: 40 MUSD24/GW/yr
    investment_cost: 2500 MUSD24/GW
    lifetime: 40
    variable_om_cost: 3 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: commercial_electric_device
    role: provide_commercial_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:commercial_demand
    efficiency: 1.0
    lifetime: 100

  - id: electrolyzer
    role: produce_hydrogen
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 0.7
    fixed_om_cost: 30 MUSD24/GW/yr
    investment_cost: 2000 MUSD24/GW
    lifetime: 20
    variable_om_cost: 1 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: industrial_gas_device
    role: provide_industrial_demand
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: service:industrial_demand
    efficiency: 0.85
    lifetime: 30

  - id: industrial_hydrogen_device
    role: provide_industrial_demand
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:industrial_demand
    efficiency: 0.8
    lifetime: 30

  - id: residential_electric_device
    role: provide_residential_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

  - id: smr
    role: produce_hydrogen
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    emission_factors:
      emission:co2: 0.056
    efficiency: 0.75
    emission_factor_basis: HHV
    fixed_om_cost: 50 MUSD24/GW/yr
    investment_cost: 1500 MUSD24/GW
    lifetime: 25
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: solar
    role: generate_electricity
    inputs:
      - commodity: resource:solar_irradiance
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    fixed_om_cost: 15 MUSD24/GW/yr
    investment_cost: 1000 MUSD24/GW
    lifetime: 25
    variable_om_cost: 0.5 MUSD24/PJ

  - id: solar_irradiance_supply
    role: supply_solar_irradiance
    inputs: []
    outputs:
      - commodity: resource:solar_irradiance
    efficiency: 1.0
    lifetime: 100

  - id: transport_elec_device
    role: provide_transport_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:transport_demand
    efficiency: 0.9
    lifetime: 15

  - id: transport_hydrogen_device
    role: provide_transport_demand
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:transport_demand
    efficiency: 0.6
    lifetime: 15

  - id: wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    fixed_om_cost: 25 MUSD24/GW/yr
    investment_cost: 1200 MUSD24/GW
    lifetime: 25
    variable_om_cost: 1 MUSD24/PJ

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

