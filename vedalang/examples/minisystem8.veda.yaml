    regions: [NEM_EAST, NEM_SOUTH, WA]

  - variant: electrolyzer
    regions: [NEM_EAST, NEM_SOUTH, WA]

  # Demand devices - sector specific
  - variant: residential_electric_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [RES]

  - variant: commercial_electric_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [COM]

  - variant: industrial_gas_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [IND]

  - variant: industrial_hydrogen_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [IND]

  - variant: transport_elec_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [TRN]

  - variant: transport_hydrogen_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
