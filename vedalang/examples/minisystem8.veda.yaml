model:
  name: MiniSystem8
  description: Australian baseline scaffold with multi-sector energy system
  regions:
    - NEM_EAST
    - NEM_SOUTH
    - WA
  milestone_years:
    - 2020
    - 2025
    - 2030
    - 2040
    - 2050
  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25
  commodities:
    - id: primary:gas
      type: fuel
      unit: PJ
      description: Natural gas
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0
    - id: primary:coal
      type: fuel
      unit: PJ
      description: Coal
      combustible: true
      lhv_mj_per_unit: 25.0
      hhv_mj_per_unit: 27.5
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity
      combustible: false
    - id: secondary:hydrogen
      type: energy
      unit: PJ
      description: Hydrogen
      combustible: true
      lhv_mj_per_unit: 120.0
      hhv_mj_per_unit: 132.0
    - id: resource:solar_irradiance
      type: other
      unit: PJ
      description: Solar irradiance resource
      combustible: false
    - id: resource:wind_resource
      type: other
      unit: PJ
      description: Wind resource
      combustible: false
    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide
      combustible: false
    - id: service:residential_demand
      type: service
      unit: PJ
      description: Residential demand
      combustible: false
    - id: service:commercial_demand
      type: service
      unit: PJ
      description: Commercial demand
      combustible: false
    - id: service:industrial_demand
      type: service
      unit: PJ
      description: Industrial demand
      combustible: false
    - id: service:transport_demand
      type: service
      unit: PJ
      description: Transport demand
      combustible: false
  trade_links:
    - origin: NEM_EAST
      destination: NEM_SOUTH
      commodity: secondary:electricity
      bidirectional: false
      efficiency: 0.97
  scenario_parameters:
    - name: co2-price
      description: Carbon price trajectory
      type: commodity_price
      commodity: emission:co2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 150
segments:
  sectors:
    - RES
    - COM
    - IND
    - TRN
process_roles:
  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:gas
  - id: import_coal
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:coal
  - id: supply_solar_irradiance
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_irradiance
  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity
  - id: produce_hydrogen
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:hydrogen
  - id: provide_residential_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:residential_demand
  - id: provide_commercial_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:commercial_demand
  - id: provide_industrial_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:industrial_demand
  - id: provide_transport_demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:transport_demand
process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100
  - id: coal_import
    role: import_coal
    inputs: []
    outputs:
      - commodity: primary:coal
        basis: HHV
    efficiency: 1.0
    lifetime: 100
  - id: solar_irradiance_supply
    role: supply_solar_irradiance
    inputs: []
    outputs:
      - commodity: resource:solar_irradiance
    efficiency: 1.0
    lifetime: 100
  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100
  - id: coal_plant
    role: generate_electricity
    inputs:
      - commodity: primary:coal
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.38
    investment_cost: 2500 MUSD24/GW
    fixed_om_cost: 40 MUSD24/GW/yr
    variable_om_cost: 3 MUSD24/PJ
    lifetime: 40
    emission_factors:
      emission:co2: 0.09
    variable_om_cost_basis: HHV
    emission_factor_basis: HHV
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    investment_cost: 800 MUSD24/GW
    fixed_om_cost: 20 MUSD24/GW/yr
    variable_om_cost: 2 MUSD24/PJ
    lifetime: 40
    emission_factors:
      emission:co2: 0.05
    variable_om_cost_basis: HHV
    emission_factor_basis: HHV
  - id: wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    investment_cost: 1200 MUSD24/GW
    fixed_om_cost: 25 MUSD24/GW/yr
    variable_om_cost: 1 MUSD24/PJ
    lifetime: 25
  - id: solar
    role: generate_electricity
    inputs:
      - commodity: resource:solar_irradiance
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    investment_cost: 1000 MUSD24/GW
    fixed_om_cost: 15 MUSD24/GW/yr
    variable_om_cost: 0.5 MUSD24/PJ
    lifetime: 25
  - id: smr
    role: produce_hydrogen
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 0.75
    investment_cost: 1500 MUSD24/GW
    fixed_om_cost: 50 MUSD24/GW/yr
    variable_om_cost: 2 MUSD24/PJ
    lifetime: 25
    emission_factors:
      emission:co2: 0.056
    variable_om_cost_basis: HHV
    emission_factor_basis: HHV
  - id: electrolyzer
    role: produce_hydrogen
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: secondary:hydrogen
        basis: HHV
    efficiency: 0.7
    investment_cost: 2000 MUSD24/GW
    fixed_om_cost: 30 MUSD24/GW/yr
    variable_om_cost: 1 MUSD24/PJ
    lifetime: 20
    variable_om_cost_basis: HHV
  - id: residential_electric_device
    role: provide_residential_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100
  - id: commercial_electric_device
    role: provide_commercial_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:commercial_demand
    efficiency: 1.0
    lifetime: 100
  - id: industrial_gas_device
    role: provide_industrial_demand
    inputs:
      - commodity: primary:gas
        basis: HHV
    outputs:
      - commodity: service:industrial_demand
    efficiency: 0.85
    lifetime: 30
  - id: industrial_hydrogen_device
    role: provide_industrial_demand
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:industrial_demand
    efficiency: 0.8
    lifetime: 30
  - id: transport_elec_device
    role: provide_transport_demand
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:transport_demand
    efficiency: 0.9
    lifetime: 15
  - id: transport_hydrogen_device
    role: provide_transport_demand
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    outputs:
      - commodity: service:transport_demand
    efficiency: 0.6
    lifetime: 15
