  - variant: transport_elec_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [TRN]

  - variant: transport_hydrogen_device
    regions: [NEM_EAST, NEM_SOUTH, WA]
    sectors: [TRN]

