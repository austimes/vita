# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniModel
  description: A minimal thermal power model with explicit fuel supply and end-use
    demand
  regions:
    - REG1
  milestone_years:
    - 2020
    - 2030
  commodities:
    - id: primary:natural_gas
      description: Natural Gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:generic_electric_end_use
      description: Generic end-use service delivered from electricity
      type: service
      unit: PJ
      combustible: false

# Scoping (current key name: segments): defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
segments:
  sectors:
    - IND

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_generic_electric_end_use
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:generic_electric_end_use

  - id: sink_generic_electric_end_use
    activity_unit: PJ
    capacity_unit: GW
    stage: sink
    required_inputs:
      - commodity: service:generic_electric_end_use
    required_outputs: []

  - id: supply_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: baseline_electric_end_use
    role: provide_generic_electric_end_use
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:generic_electric_end_use
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 30

  - id: generic_end_use_sink
    role: sink_generic_electric_end_use
    inputs:
      - commodity: service:generic_electric_end_use
    outputs: []
    efficiency: 1.0
    lifetime: 100

  - id: natural_gas_import
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: baseline_electric_end_use
    regions:
      - REG1
    sectors:
      - IND

  - variant: ccgt
    regions:
      - REG1
    sectors:
      - IND

  - variant: generic_end_use_sink
    regions:
      - REG1
    sectors:
      - IND

  - variant: natural_gas_import
    regions:
      - REG1

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - selector:
      variant: baseline_electric_end_use
      region: REG1
      sector: IND
    stock: 1000

  - selector:
      variant: ccgt
      region: REG1
      sector: IND
    stock: 10

  - selector:
      variant: generic_end_use_sink
      region: REG1
      sector: IND
    stock: 1000

  - selector:
      variant: natural_gas_import
      region: REG1
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/segment).
demands:
  - commodity: service:generic_electric_end_use
    region: REG1
    values:
      "2020": 10
      "2030": 10
    interpolation: interp_extrap
    sector: IND
