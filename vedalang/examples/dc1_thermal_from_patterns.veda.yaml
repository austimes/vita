# DC1: Thermal plant generated from patterns
# This model was created by combining pattern expansions:
#   - add_energy_commodity: primary:natural_gas, secondary:electricity
#   - add_power_plant: ccgt
model:
  name: MiniModel
  description: A minimal thermal power model with explicit fuel supply and end-use demand
  
  regions:
    - REG1
  
  milestone_years: [2020, 2030]

  commodities:
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      description: Natural Gas

    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: service:generic_electric_end_use
      type: service
      unit: PJ
      description: Generic end-use service delivered from electricity

segments:
  sectors: [IND]

process_roles:
  - id: supply_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_generic_electric_end_use
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:generic_electric_end_use

  - id: sink_generic_electric_end_use
    activity_unit: PJ
    capacity_unit: GW
    stage: sink
    required_inputs:
      - commodity: service:generic_electric_end_use
    required_outputs: []

process_variants:
  - id: natural_gas_import
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 30

  - id: baseline_electric_end_use
    role: provide_generic_electric_end_use
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:generic_electric_end_use
    efficiency: 1.0
    lifetime: 100

  - id: generic_end_use_sink
    role: sink_generic_electric_end_use
    inputs:
      - commodity: service:generic_electric_end_use
    outputs: []
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: natural_gas_import
    regions: [REG1]

  - variant: ccgt
    regions: [REG1]
    sectors: [IND]

  - variant: baseline_electric_end_use
    regions: [REG1]
    sectors: [IND]

  - variant: generic_end_use_sink
    regions: [REG1]
    sectors: [IND]

process_parameters:
  - selector:
      variant: natural_gas_import
      region: REG1
    stock: 1000

  - selector:
      variant: ccgt
      region: REG1
      sector: IND
    stock: 10

  - selector:
      variant: baseline_electric_end_use
      region: REG1
      sector: IND
    stock: 1000

  - selector:
      variant: generic_end_use_sink
      region: REG1
      sector: IND
    stock: 1000

demands:
  - commodity: service:generic_electric_end_use
    region: REG1
    sector: IND
    interpolation: interp_extrap
    values:
      "2020": 10
      "2030": 10
