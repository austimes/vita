commodities:
  - id: emission:co2
    kind: emission

  - id: primary:biodiesel
    kind: primary

  - id: primary:diesel
    kind: primary

  - id: secondary:electricity
    kind: secondary

  - id: service:biodiesel_supply
    kind: service

  - id: service:diesel_supply
    kind: service

  - id: service:electricity_supply
    kind: service

  - id: service:haul_work
    kind: service

dsl_version: "0.2"

facilities:
  - id: biodiesel_supply_facility
    site: single_mine
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 80 MW
            year: 2025
          technology: biodiesel_import
    technology_role: biodiesel_supply

  - id: diesel_supply_facility
    site: single_mine
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: diesel_import
    technology_role: diesel_supply

  - id: electricity_supply_facility
    site: single_mine
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2025
          technology: electricity_import
    technology_role: electricity_supply

  - id: haul_service_facility
    available_technologies:
      - diesel_haul
      - biodiesel_haul
      - electric_haul
    site: single_mine
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 6 MW
            year: 2025
          technology: diesel_haul

        - metric: installed_capacity
          observed:
            value: 1 MW
            year: 2025
          technology: biodiesel_haul

        - metric: installed_capacity
          observed:
            value: 1 MW
            year: 2025
          technology: electric_haul
    technology_role: haul_service

opportunities:
  - id: electric_haul_rollout
    max_new_capacity: 12 MW
    siting:
      site: single_mine
    technology: electric_haul

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region

sites:
  - id: single_mine
    location:
      point:
        lat: -22.91
        lon: 119.45
    membership_overrides:
      region_partitions:
        single_region: SINGLE

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

technologies:
  - id: biodiesel_haul
    inputs:
      - commodity: primary:biodiesel
        basis: HHV
    lifetime: 15 year
    performance:
      kind: efficiency
      value: 0.35
    provides: service:haul_work

  - id: biodiesel_import
    outputs:
      - commodity: primary:biodiesel
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:biodiesel_supply
    variable_om: 20 AUD2024/MWh

  - id: diesel_haul
    inputs:
      - commodity: primary:diesel
        basis: HHV
    emissions:
      - commodity: emission:co2
        factor: 0.074 t/GJ
    lifetime: 15 year
    performance:
      kind: efficiency
      value: 0.35
    provides: service:haul_work

  - id: diesel_import
    outputs:
      - commodity: primary:diesel
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:diesel_supply
    variable_om: 12 AUD2024/MWh

  - id: electric_haul
    inputs:
      - commodity: secondary:electricity
    investment_cost: 200 AUD2024/kW
    lifetime: 15 year
    performance:
      kind: efficiency
      value: 0.85
    provides: service:haul_work

  - id: electricity_import
    outputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_supply
    variable_om: 25 AUD2024/MWh

technology_roles:
  - id: biodiesel_supply
    primary_service: service:biodiesel_supply
    technologies:
      - biodiesel_import

  - id: diesel_supply
    primary_service: service:diesel_supply
    technologies:
      - diesel_import

  - id: electricity_supply
    primary_service: service:electricity_supply
    technologies:
      - electricity_import

  - id: haul_service
    primary_service: service:haul_work
    technologies:
      - diesel_haul
      - biodiesel_haul
      - electric_haul
    transitions:
      - cost: 35 AUD2024/kW
        from: diesel_haul
        kind: retrofit
        to: electric_haul
