commodities:
  - id: emission:co2
    kind: emission

  - id: primary:natural_gas
    kind: primary

  - id: secondary:electricity
    kind: secondary

  - id: secondary:hydrogen
    kind: secondary

  - id: service:electricity_supply
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:hydrogen_supply
    kind: service

  - id: service:industrial_heat
    kind: service

dsl_version: "0.2"

facilities:
  - id: electricity_supply_facility
    site: single_industrial_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: grid_electricity_supply
    technology_role: electricity_supply

  - id: gas_supply_facility
    site: single_industrial_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: pipeline_gas_supply
    technology_role: gas_supply

  - id: hydrogen_supply_facility
    site: single_industrial_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 60 MW
            year: 2025
          technology: pipeline_hydrogen_supply
    technology_role: hydrogen_supply

  - id: industrial_heat
    available_technologies:
      - gas_boiler
      - electric_heater
      - h2_boiler
    site: single_industrial_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 5 MW
            year: 2025
          technology: gas_boiler

        - metric: installed_capacity
          observed:
            value: 1 MW
            year: 2025
          technology: electric_heater

        - metric: installed_capacity
          observed:
            value: 0.5 MW
            year: 2025
          technology: h2_boiler
    technology_role: industrial_heat_supply

opportunities:
  - id: industrial_electrification
    max_new_capacity: 15 MW
    siting:
      site: single_industrial_hub
    technology: electric_heater

  - id: industrial_hydrogen_shift
    max_new_capacity: 12 MW
    siting:
      site: single_industrial_hub
    technology: h2_boiler

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region

sites:
  - id: single_industrial_hub
    location:
      point:
        lat: -36.85
        lon: 174.76
    membership_overrides:
      region_partitions:
        single_region: SINGLE

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

technologies:
  - id: electric_heater
    inputs:
      - commodity: secondary:electricity
    investment_cost: 80 AUD2024/kW
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.95
    provides: service:industrial_heat

  - id: gas_boiler
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    emissions:
      - commodity: emission:co2
        factor: 0.056 t/GJ
    investment_cost: 50 AUD2024/kW
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.9
    provides: service:industrial_heat

  - id: grid_electricity_supply
    outputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_supply
    variable_om: 25 AUD2024/MWh

  - id: h2_boiler
    inputs:
      - commodity: secondary:hydrogen
        basis: HHV
    investment_cost: 100 AUD2024/kW
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.85
    provides: service:industrial_heat

  - id: pipeline_gas_supply
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply
    variable_om: 8 AUD2024/MWh

  - id: pipeline_hydrogen_supply
    outputs:
      - commodity: secondary:hydrogen
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:hydrogen_supply
    variable_om: 18 AUD2024/MWh

technology_roles:
  - id: electricity_supply
    primary_service: service:electricity_supply
    technologies:
      - grid_electricity_supply

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - pipeline_gas_supply

  - id: hydrogen_supply
    primary_service: service:hydrogen_supply
    technologies:
      - pipeline_hydrogen_supply

  - id: industrial_heat_supply
    primary_service: service:industrial_heat
    technologies:
      - gas_boiler
      - electric_heater
      - h2_boiler
    transitions:
      - cost: 15 AUD2024/kW
        from: gas_boiler
        kind: retrofit
        to: electric_heater

      - cost: 25 AUD2024/kW
        from: gas_boiler
        kind: retrofit
        to: h2_boiler
