commodities:
  - id: emission:co2e
    kind: emission

  - id: material:ag_inputs
    kind: material

  - id: service:ag_input_supply
    kind: service

  - id: service:agricultural_output
    kind: service

dsl_version: "0.2"

facilities:
  - id: farm_inputs
    site: single_farm
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 1000 MW
            year: 2025
          technology: primary_supply
    technology_role: ag_input_supply

  - id: farm_output
    available_technologies:
      - traditional_baseline
      - traditional_with_feed_additives
      - traditional_with_improved_manure
      - soil_carbon
      - reforestation
    site: single_farm
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2025
          technology: traditional_baseline

        - metric: installed_capacity
          observed:
            value: 0.5 MW
            year: 2025
          technology: soil_carbon

        - metric: installed_capacity
          observed:
            value: 0.5 MW
            year: 2025
          technology: reforestation
    technology_role: ag_output

opportunities:
  - id: feed_additives_rollout
    max_new_capacity: 4 MW
    siting:
      site: single_farm
    technology: traditional_with_feed_additives

  - id: improved_manure_rollout
    max_new_capacity: 6 MW
    siting:
      site: single_farm
    technology: traditional_with_improved_manure

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region

sites:
  - id: single_farm
    location:
      point:
        lat: -35.31
        lon: 149.12
    membership_overrides:
      region_partitions:
        single_region: SINGLE

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

technologies:
  - id: primary_supply
    outputs:
      - commodity: material:ag_inputs
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:ag_input_supply

  - id: reforestation
    emissions:
      - commodity: emission:co2e
        factor: -1 t/t
    investment_cost: 15 AUD2024/kW
    lifetime: 50 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:agricultural_output

  - id: soil_carbon
    emissions:
      - commodity: emission:co2e
        factor: -1 t/t
    investment_cost: 30 AUD2024/kW
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:agricultural_output

  - id: traditional_baseline
    inputs:
      - commodity: material:ag_inputs
    emissions:
      - commodity: emission:co2e
        factor: 5 t/t
    lifetime: 50 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:agricultural_output

  - id: traditional_with_feed_additives
    inputs:
      - commodity: material:ag_inputs
    emissions:
      - commodity: emission:co2e
        factor: 3 t/t
    investment_cost: 20 AUD2024/kW
    lifetime: 50 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:agricultural_output

  - id: traditional_with_improved_manure
    inputs:
      - commodity: material:ag_inputs
    emissions:
      - commodity: emission:co2e
        factor: 3.75 t/t
    investment_cost: 10 AUD2024/kW
    lifetime: 50 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:agricultural_output

technology_roles:
  - id: ag_input_supply
    primary_service: service:ag_input_supply
    technologies:
      - primary_supply

  - id: ag_output
    primary_service: service:agricultural_output
    technologies:
      - traditional_baseline
      - traditional_with_feed_additives
      - traditional_with_improved_manure
      - soil_carbon
      - reforestation
