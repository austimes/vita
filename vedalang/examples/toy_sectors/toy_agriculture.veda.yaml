# Model: core system definition (regions, years, commodities, cases).
model:
  name: ToyAgriculture
  description: Agricultural emissions reduction with sequestration
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: emission:co2e
      description: CO2-equivalent greenhouse gas emissions
      type: emission
      unit: Mt
      combustible: false

    - id: material:ag_inputs
      description: Aggregate physical agricultural inputs
      type: material
      unit: Mt
      combustible: false

    - id: service:agricultural_output
      description: Agricultural production
      type: service
      unit: Mt
      combustible: false
  scenario_parameters: []
  constraints:
    - name: CO2E_CAP
      type: emission_cap
      commodity: emission:co2e
      years:
        "2020": 50
        "2030": 35
        "2040": 20
        "2050": 10
      interpolation: interp_extrap
      limtype: up

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - AGR

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: provide_ag_output
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: material:ag_inputs
    required_outputs:
      - commodity: service:agricultural_output

  - id: remove_co2
    activity_unit: PJ
    capacity_unit: GW
    stage: sink
    required_inputs: []
    required_outputs: []

  - id: supply_ag_inputs
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: material:ag_inputs

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: primary_supply
    role: supply_ag_inputs
    inputs: []
    outputs:
      - commodity: material:ag_inputs
    efficiency: 1.0
    lifetime: 100

  - id: reforestation
    description: Allowing forrest to regrow.
    role: remove_co2
    inputs: []
    outputs: []
    emission_factors:
      emission:co2e: -1.0
    efficiency: 1.0
    investment_cost: 15 MUSD24/GW
    lifetime: 50

  - id: soil_carbon
    description:
      practices that remove CO₂ from the atmosphere by increasing and stabilising
      carbon stored in soils.
    role: remove_co2
    inputs: []
    outputs: []
    emission_factors:
      emission:co2e: -1.0
    efficiency: 1.0
    investment_cost: 30 MUSD24/GW
    lifetime: 30

  - id: traditional_baseline
    role: provide_ag_output
    inputs:
      - commodity: material:ag_inputs
    outputs:
      - commodity: service:agricultural_output
    emission_factors:
      emission:co2e: 5.0
    efficiency: 1.0
    lifetime: 50

  - id: traditional_with_feed_additives
    role: provide_ag_output
    inputs:
      - commodity: material:ag_inputs
    outputs:
      - commodity: service:agricultural_output
    emission_factors:
      emission:co2e: 3.0
    efficiency: 1.0
    investment_cost: 20 MUSD24/GW
    lifetime: 50

  - id: traditional_with_improved_manure
    role: provide_ag_output
    inputs:
      - commodity: material:ag_inputs
    outputs:
      - commodity: service:agricultural_output
    emission_factors:
      emission:co2e: 3.75
    efficiency: 1.0
    investment_cost: 10 MUSD24/GW
    lifetime: 50

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: primary_supply
    regions:
      - SINGLE

  - variant: reforestation
    regions:
      - SINGLE

  - variant: soil_carbon
    regions:
      - SINGLE

  - variant: traditional_baseline
    regions:
      - SINGLE
    sectors:
      - AGR

  - variant: traditional_with_feed_additives
    regions:
      - SINGLE
    sectors:
      - AGR

  - variant: traditional_with_improved_manure
    regions:
      - SINGLE
    sectors:
      - AGR

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - selector:
      variant: primary_supply
      region: SINGLE
    stock: 1000

  - ncap_bound:
      up: 3
    selector:
      variant: reforestation
      region: SINGLE
    stock: 0.5

  - ncap_bound:
      up: 2
    selector:
      variant: soil_carbon
      region: SINGLE
    stock: 0.5

  - selector:
      variant: traditional_baseline
      region: SINGLE
      sector: AGR
    stock: 10

  - ncap_bound:
      up: 4
    selector:
      variant: traditional_with_feed_additives
      region: SINGLE
      sector: AGR
    stock: 0.5

  - ncap_bound:
      up: 6
    selector:
      variant: traditional_with_improved_manure
      region: SINGLE
      sector: AGR
    stock: 0.5

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:agricultural_output
    region: SINGLE
    values:
      "2020": 10
      "2050": 10
    interpolation: interp_extrap
    sector: AGR
