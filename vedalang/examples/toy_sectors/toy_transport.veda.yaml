commodities:
  - id: emission:co2
    kind: emission

  - id: primary:petrol
    kind: primary

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_supply
    kind: service

  - id: service:passenger_km
    kind: service

  - id: service:petrol_supply
    kind: service

dsl_version: "0.2"

fleets:
  - id: electricity_supply
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: electricity_import
    technology_role: electricity_supply
    distribution:
      method: direct

  - id: passenger_transport
    available_technologies:
      - ice_car
      - ev_car
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 200 MW
            year: 2025
          technology: ice_car

        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2025
          technology: ev_car
    technology_role: passenger_mobility
    new_build_limits:
      - technology: ev_car
        max_new_capacity: 250 MW
    distribution:
      method: direct

  - id: petrol_supply
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 300 MW
            year: 2025
          technology: petrol_import
    technology_role: petrol_supply
    distribution:
      method: direct

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

technologies:
  - id: electricity_import
    outputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_supply
    variable_om: 6.94 AUD2024/MWh

  - id: ev_car
    inputs:
      - commodity: secondary:electricity
    investment_cost: 100 AUD2024/kW
    lifetime: 15 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:passenger_km
    variable_om: 20 AUD2024/MWh

  - id: ice_car
    inputs:
      - commodity: primary:petrol
        basis: HHV
    emissions:
      - commodity: emission:co2
        factor: 0.067 t/GJ
    lifetime: 15 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:passenger_km
    variable_om: 50 AUD2024/MWh

  - id: petrol_import
    outputs:
      - commodity: primary:petrol
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:petrol_supply
    variable_om: 15 AUD2024/MWh

technology_roles:
  - id: electricity_supply
    primary_service: service:electricity_supply
    technologies:
      - electricity_import

  - id: passenger_mobility
    primary_service: service:passenger_km
    technologies:
      - ice_car
      - ev_car
    transitions:
      - cost: 40 AUD2024/kW
        from: ice_car
        kind: retrofit
        to: ev_car

  - id: petrol_supply
    primary_service: service:petrol_supply
    technologies:
      - petrol_import
