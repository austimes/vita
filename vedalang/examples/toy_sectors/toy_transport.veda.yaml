dsl_version: "0.3"

commodities:
  - id: co2
    type: emission

  - id: electricity
    type: energy
    energy_form: secondary

  - id: electricity_supply
    type: service

  - id: passenger_km
    type: service

  - id: petrol
    type: energy
    energy_form: primary

  - id: petrol_supply
    type: service

technologies:
  - id: electricity_import
    description: electricity_import provides electricity_supply as a primary supply
      or conversion technology.
    outputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_supply
    variable_om: 6.94 AUD2024/MWh

  - id: ev_car
    description: ev_car provides passenger_km by transforming electricity.
    inputs:
      - commodity: electricity
    investment_cost: 100 AUD2024/kW
    lifetime: 15 year
    performance:
      kind: efficiency
      value: 1.0
    provides: passenger_km
    variable_om: 20 AUD2024/MWh

  - id: ice_car
    description: ice_car provides passenger_km by transforming petrol.
    inputs:
      - commodity: petrol
        basis: HHV
    emissions:
      - commodity: co2
        factor: 0.067 t/GJ
    lifetime: 15 year
    performance:
      kind: efficiency
      value: 1.0
    provides: passenger_km
    variable_om: 50 AUD2024/MWh

  - id: petrol_import
    description: petrol_import provides petrol_supply as a primary supply or conversion
      technology.
    outputs:
      - commodity: petrol
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: petrol_supply
    variable_om: 15 AUD2024/MWh

technology_roles:
  - id: electricity_supply
    description:
      "electricity_supply groups technologies that deliver electricity_supply:
      electricity_import."
    primary_service: electricity_supply
    technologies:
      - electricity_import

  - id: passenger_mobility
    description: "passenger_mobility groups technologies that deliver passenger_km:
      ice_car and ev_car."
    primary_service: passenger_km
    technologies:
      - ice_car
      - ev_car
    transitions:
      - cost: 40 AUD2024/kW
        from: ice_car
        kind: retrofit
        to: ev_car

  - id: petrol_supply
    description: "petrol_supply groups technologies that deliver petrol_supply: petrol_import."
    primary_service: petrol_supply
    technologies:
      - petrol_import

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

fleets:
  - id: electricity_supply
    description:
      electricity_supply represents distributed assets for role electricity_supply
      using direct allocation.
    distribution:
      method: direct
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: electricity_import
    technology_role: electricity_supply

  - id: passenger_transport
    description:
      passenger_transport represents distributed assets for role passenger_mobility
      using direct allocation.
    available_technologies:
      - ice_car
      - ev_car
    distribution:
      method: direct
    new_build_limits:
      - max_new_capacity: 250 MW
        technology: ev_car
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 200 MW
            year: 2025
          technology: ice_car

        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2025
          technology: ev_car
    technology_role: passenger_mobility

  - id: petrol_supply
    description: petrol_supply represents distributed assets for role petrol_supply
      using direct allocation.
    distribution:
      method: direct
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 300 MW
            year: 2025
          technology: petrol_import
    technology_role: petrol_supply

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region
