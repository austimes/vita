dsl_version: "0.3"
commodities:
  - id: co2
    type: emission
  - id: natural_gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: electricity_generation
    type: service
  - id: electricity_service
    type: service
  - id: gas_supply
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
  - id: direct_electric
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_service
  - id: gas_import
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
  - id: ocgt
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.08 t/GJ
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 0.35
    provides: electricity_generation
technology_roles:
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - ccgt
      - ocgt
  - id: electricity_service
    primary_service: electricity_service
    technologies:
      - direct_electric
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - gas_import
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: electricity_4node
    layer: geo.demo
    mapping:
      kind: constant
      value: SD
    members:
      - SD
      - SN
      - WD
      - WN
sites:
  - id: sd_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        electricity_4node: SD
  - id: sn_hub
    location:
      point:
        lat: -37.81
        lon: 144.96
    membership_overrides:
      region_partitions:
        electricity_4node: SN
  - id: wd_hub
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        electricity_4node: WD
  - id: wn_hub
    location:
      point:
        lat: -31.95
        lon: 115.86
    membership_overrides:
      region_partitions:
        electricity_4node: WN
facilities:
  - id: sd_generation
    available_technologies:
      - ccgt
      - ocgt
    site: sd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation
  - id: sd_service
    site: sd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service
  - id: sn_generation
    available_technologies:
      - ccgt
      - ocgt
    site: sn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 6 MW
            year: 2025
          technology: ocgt
    technology_role: electricity_generation
  - id: sn_service
    site: sn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service
  - id: wd_generation
    available_technologies:
      - ccgt
      - ocgt
    site: wd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation
  - id: wd_service
    site: wd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service
  - id: wn_generation
    available_technologies:
      - ccgt
      - ocgt
    site: wn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 5 MW
            year: 2025
          technology: ocgt
    technology_role: electricity_generation
  - id: wn_service
    site: wn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service
networks:
  - id: electricity_4node_links
    kind: transmission
    links:
      - id: sd_sn
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: SD
        to: SN
      - id: sd_wd
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: SD
        to: WD
      - id: sn_wn
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: SN
        to: WN
      - id: wd_wn
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: WD
        to: WN
    node_basis:
      kind: region_partition
      ref: electricity_4node
runs:
  - id: electricity_4node_2025
    base_year: 2025
    currency_year: 2024
    region_partition: electricity_4node
