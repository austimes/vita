dsl_version: "0.3"

commodities:
  - id: co2
    type: emission

  - id: electricity
    type: energy
    energy_form: secondary

  - id: electricity_generation
    type: service

  - id: electricity_service
    type: service

  - id: gas_supply
    type: service

  - id: natural_gas
    type: energy
    energy_form: primary

technologies:
  - id: ccgt
    description: ccgt provides electricity_generation by transforming natural_gas.
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation

  - id: direct_electric
    description: direct_electric provides electricity_service by transforming electricity.
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_service

  - id: gas_import
    description: gas_import provides gas_supply as a primary supply or conversion technology.
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply

  - id: ocgt
    description: ocgt provides electricity_generation by transforming natural_gas.
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.08 t/GJ
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 0.35
    provides: electricity_generation

technology_roles:
  - id: electricity_generation
    description:
      "electricity_generation groups technologies that deliver electricity_generation:
      ccgt and ocgt."
    primary_service: electricity_generation
    technologies:
      - ccgt
      - ocgt

  - id: electricity_service
    description:
      "electricity_service groups technologies that deliver electricity_service:
      direct_electric."
    primary_service: electricity_service
    technologies:
      - direct_electric

  - id: gas_supply
    description: "gas_supply groups technologies that deliver gas_supply: gas_import."
    primary_service: gas_supply
    technologies:
      - gas_import

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: electricity_4node
    layer: geo.demo
    mapping:
      kind: constant
      value: SD
    members:
      - SD
      - SN
      - WD
      - WN

sites:
  - id: sd_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        electricity_4node: SD

  - id: sn_hub
    location:
      point:
        lat: -37.81
        lon: 144.96
    membership_overrides:
      region_partitions:
        electricity_4node: SN

  - id: wd_hub
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        electricity_4node: WD

  - id: wn_hub
    location:
      point:
        lat: -31.95
        lon: 115.86
    membership_overrides:
      region_partitions:
        electricity_4node: WN

facilities:
  - id: sd_generation
    description: sd_generation instantiates role electricity_generation at site sd_hub.
    available_technologies:
      - ccgt
      - ocgt
    site: sd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation

  - id: sd_service
    description: sd_service instantiates role electricity_service at site sd_hub.
    site: sd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service

  - id: sn_generation
    description: sn_generation instantiates role electricity_generation at site sn_hub.
    available_technologies:
      - ccgt
      - ocgt
    site: sn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 6 MW
            year: 2025
          technology: ocgt
    technology_role: electricity_generation

  - id: sn_service
    description: sn_service instantiates role electricity_service at site sn_hub.
    site: sn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service

  - id: wd_generation
    description: wd_generation instantiates role electricity_generation at site wd_hub.
    available_technologies:
      - ccgt
      - ocgt
    site: wd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation

  - id: wd_service
    description: wd_service instantiates role electricity_service at site wd_hub.
    site: wd_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service

  - id: wn_generation
    description: wn_generation instantiates role electricity_generation at site wn_hub.
    available_technologies:
      - ccgt
      - ocgt
    site: wn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 5 MW
            year: 2025
          technology: ocgt
    technology_role: electricity_generation

  - id: wn_service
    description: wn_service instantiates role electricity_service at site wn_hub.
    site: wn_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service

networks:
  - id: electricity_4node_links
    kind: transmission
    links:
      - id: sd_sn
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: SD
        to: SN

      - id: sd_wd
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: SD
        to: WD

      - id: sn_wn
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: SN
        to: WN

      - id: wd_wn
        commodity: electricity
        existing_transfer_capacity: 40 MW
        from: WD
        to: WN
    node_basis:
      kind: region_partition
      ref: electricity_4node

runs:
  - id: electricity_4node_2025
    base_year: 2025
    currency_year: 2024
    region_partition: electricity_4node
