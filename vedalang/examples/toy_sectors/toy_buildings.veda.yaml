# Model: core system definition (regions, years, commodities, cases).
model:
  name: ToyBuildings
  description: Heating decarbonisation with variant-level inputs and retrofit demand
    case overlay
  regions:
    - SINGLE
  milestone_years:
    - 2020
    - 2025
    - 2030
    - 2035
    - 2040
    - 2050
  commodities:
    - id: emission:co2
      description: Carbon dioxide
      type: emission
      unit: Mt
      combustible: false

    - id: primary:natural_gas
      description: Natural gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:space_heat
      description: Space heating demand
      type: service
      unit: PJ
      combustible: false
  cases:
    - name: baseline
      description: Reference demand trajectory
      is_baseline: true

    - name: retrofit_policy
      description: Building envelope retrofit reduces space heat demand
      demand_overrides:
        - commodity: service:space_heat
          region: SINGLE
          values:
            "2020": 100
            "2025": 95
            "2030": 90
            "2035": 84
            "2040": 78
            "2050": 70
          interpolation: interp_extrap
          sector: RES

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
roles:
  - id: provide_space_heat
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:space_heat

  - id: supply_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: supply_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

# Process variants: concrete technology definitions bound to roles.
variants:
  - id: gas_heater
    role: provide_space_heat
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: service:space_heat
    emission_factors:
      emission:co2: 0.056
    efficiency: 0.9
    emission_factor_basis: HHV
    investment_cost: 30 MUSD24/GW
    lifetime: 20

  - id: grid_import
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25 MUSD24/PJ

  - id: heat_pump
    role: provide_space_heat
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:space_heat
    efficiency: 1.0
    investment_cost: 150 MUSD24/GW
    lifetime: 20

  - id: pipeline_import
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8 MUSD24/PJ
    variable_om_cost_basis: HHV

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: gas_heater
    regions:
      - SINGLE
    sectors:
      - RES

  - variant: grid_import
    regions:
      - SINGLE

  - variant: heat_pump
    regions:
      - SINGLE
    sectors:
      - RES

  - variant: pipeline_import
    regions:
      - SINGLE

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - cap_bound:
      up: 200
    selector:
      variant: gas_heater
      region: SINGLE
      sector: RES
    stock: 80

  - selector:
      variant: grid_import
      region: SINGLE
    stock: 1000

  - cap_bound:
      up: 200
    selector:
      variant: heat_pump
      region: SINGLE
      sector: RES
    stock: 10

  - selector:
      variant: pipeline_import
      region: SINGLE
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:space_heat
    region: SINGLE
    values:
      "2020": 100
      "2050": 100
    interpolation: interp_extrap
    sector: RES
