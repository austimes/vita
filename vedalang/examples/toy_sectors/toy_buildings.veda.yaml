commodities:
  - id: emission:co2
    kind: emission

  - id: primary:natural_gas
    kind: primary

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_supply
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:space_heat
    kind: service

dsl_version: "0.2"

facilities:
  - id: electricity_supply_facility
    site: single_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: grid_import
    technology_role: electricity_supply

  - id: gas_supply_facility
    site: single_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: pipeline_import
    technology_role: gas_supply

  - id: residential_heat
    available_technologies:
      - gas_heater
      - heat_pump
    site: single_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 80 MW
            year: 2025
          technology: gas_heater

        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2025
          technology: heat_pump
    technology_role: space_heat_supply

opportunities:
  - id: heat_pump_rollout
    max_new_capacity: 60 MW
    siting:
      region_member:
        member: SINGLE
        partition: single_region
    technology: heat_pump

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region

sites:
  - id: single_energy_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        single_region: SINGLE

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

technologies:
  - id: gas_heater
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    emissions:
      - commodity: emission:co2
        factor: 0.056 t/GJ
    investment_cost: 30 AUD2024/kW
    lifetime: 20 year
    performance:
      kind: efficiency
      value: 0.9
    provides: service:space_heat

  - id: grid_import
    outputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_supply
    variable_om: 25 AUD2024/MWh

  - id: heat_pump
    inputs:
      - commodity: secondary:electricity
    investment_cost: 150 AUD2024/kW
    lifetime: 20 year
    performance:
      kind: cop
      value: 3.0
    provides: service:space_heat

  - id: pipeline_import
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply
    variable_om: 8 AUD2024/MWh

technology_roles:
  - id: electricity_supply
    primary_service: service:electricity_supply
    technologies:
      - grid_import

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - pipeline_import

  - id: space_heat_supply
    primary_service: service:space_heat
    technologies:
      - gas_heater
      - heat_pump
    transitions:
      - cost: 25 AUD2024/kW
        from: gas_heater
        kind: retrofit
        to: heat_pump
