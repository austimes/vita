dsl_version: "0.3"
commodities:
  - id: co2
    type: emission
  - id: solar_irradiance
    type: material
  - id: wind_resource
    type: material
  - id: natural_gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: electricity_generation
    type: service
  - id: electricity_service
    type: service
  - id: gas_supply
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.05 t/GJ
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
  - id: direct_electric
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_service
  - id: gas_import
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
  - id: solar_pv
    outputs:
      - commodity: electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_generation
technology_roles:
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - ccgt
      - solar_pv
  - id: electricity_service
    primary_service: electricity_service
    technologies:
      - direct_electric
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - gas_import
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: electricity_2node
    layer: geo.demo
    mapping:
      kind: constant
      value: D
    members:
      - D
      - N
sites:
  - id: day_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        electricity_2node: D
  - id: night_hub
    location:
      point:
        lat: -37.81
        lon: 144.96
    membership_overrides:
      region_partitions:
        electricity_2node: N
facilities:
  - id: day_generation
    available_technologies:
      - ccgt
      - solar_pv
    site: day_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 12 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation
  - id: day_service
    site: day_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 14 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service
  - id: day_supply
    site: day_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 200 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply
  - id: night_generation
    available_technologies:
      - ccgt
      - solar_pv
    site: night_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 6 MW
            year: 2025
          technology: solar_pv
    technology_role: electricity_generation
  - id: night_service
    site: night_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 14 MW
            year: 2025
          technology: direct_electric
    technology_role: electricity_service
  - id: night_supply
    site: night_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 200 MW
            year: 2025
          technology: gas_import
    technology_role: gas_supply
networks:
  - id: day_night_link
    kind: transmission
    links:
      - id: day_to_night_power
        commodity: electricity
        existing_transfer_capacity: 50 MW
        from: D
        to: N
    node_basis:
      kind: region_partition
      ref: electricity_2node
runs:
  - id: electricity_2node_2025
    base_year: 2025
    currency_year: 2024
    region_partition: electricity_2node
