dsl_version: '0.3'
commodities:
- id: co2
  type: emission
- id: electricity
  type: energy
  energy_form: secondary
- id: electricity_generation
  type: service
- id: electricity_service
  type: service
- id: gas_supply
  type: service
- id: natural_gas
  type: energy
  energy_form: primary
- id: solar_irradiance
  type: material
- id: wind_resource
  type: material
technologies:
- id: ccgt
  description: ccgt provides electricity_generation by transforming natural_gas.
  inputs:
  - commodity: natural_gas
    basis: HHV
  outputs:
  - commodity: electricity
  emissions:
  - commodity: co2
    factor: 0.05 t/GJ
  lifetime: 40 year
  performance:
    kind: efficiency
    value: 0.55
  provides: electricity_generation
- id: direct_electric
  description: direct_electric provides electricity_service by transforming electricity.
  inputs:
  - commodity: electricity
  lifetime: 100 year
  performance:
    kind: efficiency
    value: 1.0
  provides: electricity_service
- id: gas_import
  description: gas_import provides gas_supply as a primary supply or conversion technology.
  outputs:
  - commodity: natural_gas
  lifetime: 100 year
  performance:
    kind: efficiency
    value: 1.0
  provides: gas_supply
- id: solar_pv
  description: solar_pv provides electricity_generation as a primary supply or conversion
    technology.
  outputs:
  - commodity: electricity
  lifetime: 25 year
  performance:
    kind: efficiency
    value: 1.0
  provides: electricity_generation
technology_roles:
- id: electricity_generation
  description: 'electricity_generation groups technologies that deliver electricity_generation:
    ccgt and solar_pv.'
  primary_service: electricity_generation
  technologies:
  - ccgt
  - solar_pv
- id: electricity_service
  description: 'electricity_service groups technologies that deliver electricity_service:
    direct_electric.'
  primary_service: electricity_service
  technologies:
  - direct_electric
- id: gas_supply
  description: 'gas_supply groups technologies that deliver gas_supply: gas_import.'
  primary_service: gas_supply
  technologies:
  - gas_import
spatial_layers:
- id: geo_demo
  geometry_file: data/regions.geojson
  key: region_id
  kind: polygon
region_partitions:
- id: electricity_2node
  layer: geo_demo
  mapping:
    kind: constant
    value: D
  members:
  - D
  - N
sites:
- id: day_hub
  location:
    point:
      lat: -33.87
      lon: 151.21
  membership_overrides:
    region_partitions:
      electricity_2node: D
- id: night_hub
  location:
    point:
      lat: -37.81
      lon: 144.96
  membership_overrides:
    region_partitions:
      electricity_2node: N
facilities:
- id: day_generation
  description: day_generation instantiates role electricity_generation at site day_hub.
  available_technologies:
  - ccgt
  - solar_pv
  site: day_hub
  stock:
    items:
    - metric: installed_capacity
      observed:
        value: 12 MW
        year: 2025
      technology: ccgt
  technology_role: electricity_generation
- id: day_service
  description: day_service instantiates role electricity_service at site day_hub.
  site: day_hub
  stock:
    items:
    - metric: installed_capacity
      observed:
        value: 14 MW
        year: 2025
      technology: direct_electric
  technology_role: electricity_service
- id: day_supply
  description: day_supply instantiates role gas_supply at site day_hub.
  site: day_hub
  stock:
    items:
    - metric: installed_capacity
      observed:
        value: 200 MW
        year: 2025
      technology: gas_import
  technology_role: gas_supply
- id: night_generation
  description: night_generation instantiates role electricity_generation at site night_hub.
  available_technologies:
  - ccgt
  - solar_pv
  site: night_hub
  stock:
    items:
    - metric: installed_capacity
      observed:
        value: 6 MW
        year: 2025
      technology: solar_pv
  technology_role: electricity_generation
- id: night_service
  description: night_service instantiates role electricity_service at site night_hub.
  site: night_hub
  stock:
    items:
    - metric: installed_capacity
      observed:
        value: 14 MW
        year: 2025
      technology: direct_electric
  technology_role: electricity_service
- id: night_supply
  description: night_supply instantiates role gas_supply at site night_hub.
  site: night_hub
  stock:
    items:
    - metric: installed_capacity
      observed:
        value: 200 MW
        year: 2025
      technology: gas_import
  technology_role: gas_supply
networks:
- id: day_night_link
  kind: transmission
  links:
  - id: day_to_night_power
    commodity: electricity
    existing_transfer_capacity: 50 MW
    from: D
    to: N
  node_basis:
    kind: region_partition
    ref: electricity_2node
runs:
- id: electricity_2node_2025
  veda_book_name: ELECTRICITY2NODE2025
  year_set: pathway_2025_2035
  currency_year: 2024
  region_partition: electricity_2node
year_sets:
- id: pathway_2025_2035
  start_year: 2025
  milestone_years:
  - 2025
  - 2035
