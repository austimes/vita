# DC5: Two-Region Model Extension
# Demonstrates multi-region support in VedaLang.
# Both regions share the same supply, conversion, and end-use variants.
model:
  name: TwoRegionModel
  description: Two-region model with shared gas-to-power architecture
  
  regions:
    - REG1
    - REG2
  
  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      description: Natural Gas

    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: service:residential_electric_service
      type: service
      unit: PJ
      description: Residential electricity service demand

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_residential_electric_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_electric_service

process_variants:
  - id: pipeline_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 30

  - id: residential_device
    role: provide_residential_electric_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_electric_service
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: pipeline_import
    regions: [REG1, REG2]

  - variant: ccgt
    regions: [REG1, REG2]

  - variant: residential_device
    regions: [REG1, REG2]
    sectors: [RES]

process_parameters:
  - selector:
      variant: pipeline_import
      region: REG1
    stock: 1000

  - selector:
      variant: pipeline_import
      region: REG2
    stock: 1000

  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: ccgt
      region: REG2
    stock: 10

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000

  - selector:
      variant: residential_device
      region: REG2
      sector: RES
    stock: 1000

demands:
  - commodity: service:residential_electric_service
    region: REG1
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100.0
      "2030": 120.0
      "2040": 140.0
      "2050": 160.0

  - commodity: service:residential_electric_service
    region: REG2
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100.0
      "2030": 120.0
      "2040": 140.0
      "2050": 160.0
