# Model: core system definition (regions, years, commodities, cases).
model:
  name: TwoRegionModel
  description: Two-region model with shared gas-to-power architecture
  regions:
    - REG1
    - REG2
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: primary:natural_gas
      description: Natural Gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_electric_service
      description: Residential electricity service demand
      type: service
      unit: PJ
      combustible: false

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: provide_residential_electric_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_electric_service

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 30

  - id: pipeline_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: residential_device
    role: provide_residential_electric_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_electric_service
    efficiency: 1.0
    lifetime: 100

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt
    regions:
      - REG1
      - REG2

  - variant: pipeline_import
    regions:
      - REG1
      - REG2

  - variant: residential_device
    regions:
      - REG1
      - REG2
    sectors:
      - RES

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: ccgt
      region: REG2
    stock: 10

  - selector:
      variant: pipeline_import
      region: REG1
    stock: 1000

  - selector:
      variant: pipeline_import
      region: REG2
    stock: 1000

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000

  - selector:
      variant: residential_device
      region: REG2
      sector: RES
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:residential_electric_service
    region: REG1
    values:
      "2020": 100.0
      "2030": 120.0
      "2040": 140.0
      "2050": 160.0
    interpolation: interp_extrap
    sector: RES

  - commodity: service:residential_electric_service
    region: REG2
    values:
      "2020": 100.0
      "2030": 120.0
      "2040": 140.0
      "2050": 160.0
    interpolation: interp_extrap
    sector: RES
