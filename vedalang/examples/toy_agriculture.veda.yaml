# Toy Agriculture: Methane Abatement and Carbon Sequestration
# Agricultural emissions reduction + sequestration (ENV-as-input pattern)
# Tests: ENV commodity as process input, sequestration consuming emissions
# Design: VedaLang enforces physicality — trees consume CO2, not emit negative CO2
# Issue: vedalang-0pt.11

model:
  name: ToyAgriculture
  description: Agricultural emissions reduction with sequestration

  regions:
    - SINGLE

  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: ag_inputs
      type: material
      unit: Mt
      description: Aggregate physical agricultural inputs

    - id: agricultural_output
      type: service
      unit: Mt
      description: Agricultural production

    - id: co2e
      type: emission
      unit: Mt
      tradable: true
      description: CO2-equivalent greenhouse gas emissions

  scenario_parameters: []

  constraints:
    - name: CO2E_CAP
      type: emission_cap
      commodity: co2e
      years:
        "2020": 50
        "2030": 35
        "2040": 20
        "2050": 10
      interpolation: interp_extrap
      limtype: up

segments:
  sectors: [AGR]

process_roles:
  - id: supply_ag_inputs
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: ag_inputs

  - id: provide_ag_output
    stage: end_use
    required_inputs:
      - commodity: ag_inputs
    required_outputs:
      - commodity: agricultural_output

  - id: sequester_carbon
    stage: sink
    required_inputs:
      - commodity: co2e
    required_outputs: []

process_variants:
  - id: primary_supply
    role: supply_ag_inputs
    inputs: []
    outputs:
      - commodity: ag_inputs
    efficiency: 1.0
    lifetime: 100

  - id: traditional_baseline
    role: provide_ag_output
    inputs:
      - commodity: ag_inputs
    outputs:
      - commodity: agricultural_output
      - commodity: co2e
    efficiency: 1.0
    lifetime: 50
    emission_factors:
      co2e: 5.0

  - id: traditional_with_feed_additives
    role: provide_ag_output
    inputs:
      - commodity: ag_inputs
    outputs:
      - commodity: agricultural_output
      - commodity: co2e
    efficiency: 1.0
    lifetime: 50
    investment_cost: 20
    emission_factors:
      co2e: 3.0

  - id: traditional_with_improved_manure
    role: provide_ag_output
    inputs:
      - commodity: ag_inputs
    outputs:
      - commodity: agricultural_output
      - commodity: co2e
    efficiency: 1.0
    lifetime: 50
    investment_cost: 10
    emission_factors:
      co2e: 3.75

  - id: soil_carbon
    role: sequester_carbon
    inputs:
      - commodity: co2e
    outputs: []
    efficiency: 1.0
    lifetime: 30
    investment_cost: 30

  - id: reforestation
    role: sequester_carbon
    inputs:
      - commodity: co2e
    outputs: []
    efficiency: 1.0
    lifetime: 50
    investment_cost: 15

availability:
  - variant: primary_supply
    regions: [SINGLE]

  - variant: traditional_baseline
    regions: [SINGLE]
    sectors: [AGR]

  - variant: traditional_with_feed_additives
    regions: [SINGLE]
    sectors: [AGR]

  - variant: traditional_with_improved_manure
    regions: [SINGLE]
    sectors: [AGR]

  - variant: soil_carbon
    regions: [SINGLE]

  - variant: reforestation
    regions: [SINGLE]

process_parameters:
  - selector:
      variant: primary_supply
      region: SINGLE
    stock: 1000

  - selector:
      variant: traditional_baseline
      region: SINGLE
      sector: AGR
    stock: 10

  - selector:
      variant: traditional_with_feed_additives
      region: SINGLE
      sector: AGR
    stock: 0.5
    ncap_bound:
      up: 4

  - selector:
      variant: traditional_with_improved_manure
      region: SINGLE
      sector: AGR
    stock: 0.5
    ncap_bound:
      up: 6

  - selector:
      variant: soil_carbon
      region: SINGLE
    stock: 0.5
    ncap_bound:
      up: 2

  - selector:
      variant: reforestation
      region: SINGLE
    stock: 0.5
    ncap_bound:
      up: 3

demands:
  - commodity: agricultural_output
    region: SINGLE
    sector: AGR
    interpolation: interp_extrap
    values:
      "2020": 10
      "2050": 10
