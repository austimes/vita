dsl_version: "0.3"
commodities:
  - id: natural_gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: space_heat
    type: service
technologies:
  - id: gas_heater
    inputs:
      - commodity: natural_gas
        basis: HHV
    fixed_om: 8 AUD2024/kW/year
    investment_cost: 220 AUD2024/kW
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 0.9
    provides: space_heat
  - id: heat_pump
    inputs:
      - commodity: electricity
    fixed_om: 12 AUD2024/kW/year
    investment_cost: 400 AUD2024/kW
    lifetime: 15 year
    performance:
      kind: cop
      value: 3.2
    provides: space_heat
technology_roles:
  - id: space_heat_supply
    primary_service: space_heat
    technologies:
      - gas_heater
      - heat_pump
    transitions:
      - cost: 70 AUD2024/kW
        from: gas_heater
        kind: retrofit
        to: heat_pump
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: toy_states
    layer: geo.demo
    mapping:
      kind: constant
      value: NSW
    members:
      - NSW
      - QLD
sites:
  - id: brisbane_site
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        toy_states: QLD
facilities:
  - id: brisbane_heat
    available_technologies:
      - gas_heater
      - heat_pump
    new_build_limits:
      - max_new_capacity: 500 MW
        technology: heat_pump
    site: brisbane_site
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 600 MW
            year: 2025
          technology: gas_heater
    technology_role: space_heat_supply
networks:
  - id: east_coast_power
    kind: transmission
    links:
      - id: qld_nsw_power
        commodity: electricity
        existing_transfer_capacity: 1200 MW
        from: QLD
        to: NSW
    node_basis:
      kind: region_partition
      ref: toy_states
runs:
  - id: toy_states_2025
    base_year: 2025
    currency_year: 2024
    region_partition: toy_states
