# Model: core system definition (regions, years, commodities, cases).
model:
  name: DemoS001
  description: "Coal resource supply system — domestic mining (3-step supply curve),
    imports, exports, and demand technology. Single region, annual resolution.

    "
  regions:
    - REG1
  milestone_years:
    - 2005
    - 2006
  commodities:
    - id: primary:coal
      description: Solid fuels (coal)
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 27.5
      lhv_mj_per_unit: 25.0

    - id: service:coal_supply
      description: Total primary supply demand for coal
      type: service
      unit: PJ
      combustible: false

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - IND

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
roles:
  - id: deliver_coal_supply
    description: Demand technology — delivers coal to meet supply demand
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: primary:coal
    required_outputs:
      - commodity: service:coal_supply

  - id: export_coal
    description: Coal exports to international market
    activity_unit: PJ
    capacity_unit: GW
    stage: sink
    required_inputs:
      - commodity: primary:coal
    required_outputs: []

  - id: import_coal
    description: Coal imports from international market
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:coal

  - id: mine_coal
    description: Domestic coal extraction (mining)
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:coal

# Process variants: concrete technology definitions bound to roles.
variants:
  - id: coal_demand_device
    description: Generic demand technology consuming coal
    role: deliver_coal_supply
    inputs:
      - commodity: primary:coal
        basis: HHV
    outputs:
      - commodity: service:coal_supply
    efficiency: 1.0
    fixed_om_cost: 0.2 MUSD24/GW/yr
    investment_cost: 10 MUSD24/GW
    lifetime: 20

  - id: coal_export
    description: Coal export to international market
    role: export_coal
    inputs:
      - commodity: primary:coal
        basis: HHV
    outputs: []
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 2.75 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: coal_import
    description: International coal import at world market price
    role: import_coal
    inputs: []
    outputs:
      - commodity: primary:coal
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 2.75 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: mine_coal_step1
    description: Cheapest domestic coal — shallow/accessible deposits
    role: mine_coal
    inputs: []
    outputs:
      - commodity: primary:coal
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 2 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: mine_coal_step2
    description: Mid-cost domestic coal — deeper deposits
    role: mine_coal
    inputs: []
    outputs:
      - commodity: primary:coal
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 2.5 MUSD24/PJ
    variable_om_cost_basis: HHV

  - id: mine_coal_step3
    description: Expensive domestic coal — marginal deposits
    role: mine_coal
    inputs: []
    outputs:
      - commodity: primary:coal
        basis: HHV
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 3 MUSD24/PJ
    variable_om_cost_basis: HHV

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: coal_demand_device
    regions:
      - REG1
    sectors:
      - IND

  - variant: coal_export
    regions:
      - REG1

  - variant: coal_import
    regions:
      - REG1

  - variant: mine_coal_step1
    regions:
      - REG1

  - variant: mine_coal_step2
    regions:
      - REG1

  - variant: mine_coal_step3
    regions:
      - REG1

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - cap_bound:
      up: 100000
    selector:
      variant: coal_demand_device
      region: REG1
      sector: IND
    stock: 15000

  - activity_bound:
      up: 1147
    selector:
      variant: coal_export
      region: REG1
    stock: 10000

  - selector:
      variant: coal_import
      region: REG1
    stock: 100000

  - activity_bound:
      up: 6074
    selector:
      variant: mine_coal_step1
      region: REG1
    stock: 10000

  - activity_bound:
      up: 2025
    selector:
      variant: mine_coal_step2
      region: REG1
    stock: 10000

  - selector:
      variant: mine_coal_step3
      region: REG1
    stock: 10000

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:coal_supply
    region: REG1
    values:
      "2005": 13414
    interpolation: interp_extrap
    sector: IND
