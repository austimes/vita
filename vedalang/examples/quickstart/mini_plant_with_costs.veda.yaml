# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniPlantCosts
  description: Minimal thermal plant model with process costs
  regions:
    - REG1
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_electricity_service
      type: service
      unit: PJ
      combustible: false

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
roles:
  - id: deliver_residential
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_electricity_service

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

  - id: import_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

# Process variants: concrete technology definitions bound to roles.
variants:
  - id: ccgt
    role: generate_electricity
    modes:
      - id: ng
        inputs:
          - commodity: primary:natural_gas
            basis: HHV
        outputs:
          - commodity: secondary:electricity
        efficiency: 0.55
        fixed_om_cost: 20 MUSD24/GW/yr
        investment_cost: 800 MUSD24/GW
        lifetime: 30
        variable_om_cost: 2 MUSD24/PJ
        variable_om_cost_basis: HHV

  - id: gas_import
    role: import_gas
    modes:
      - id: steady
        inputs: []
        outputs:
          - commodity: primary:natural_gas
            basis: HHV
        efficiency: 1.0
        lifetime: 100
        variable_om_cost: 5 MUSD24/PJ
        variable_om_cost_basis: HHV

  - id: residential_device
    role: deliver_residential
    modes:
      - id: direct
        inputs:
          - commodity: secondary:electricity
        outputs:
          - commodity: service:residential_electricity_service
        efficiency: 1.0
        lifetime: 100

# Providers: concrete reporting objects hosting role/variant/mode choices.
providers:
  - id: fleet.generate_electricity.REG1
    kind: fleet
    role: generate_electricity
    region: REG1
    offerings:
      - variant: ccgt
        modes: [ng]

  - id: fleet.import_gas.REG1
    kind: fleet
    role: import_gas
    region: REG1
    offerings:
      - variant: gas_import
        modes: [steady]

  - id: fleet.deliver_residential.REG1.RES
    kind: fleet
    role: deliver_residential
    region: REG1
    scopes:
      - RES
    offerings:
      - variant: residential_device
        modes: [direct]

# Provider parameters: selector-based overrides applied to provider instances.
provider_parameters:
  - selector:
      provider: fleet.generate_electricity.REG1
      variant: ccgt
      mode: ng
      region: REG1
    stock: 10

  - selector:
      provider: fleet.import_gas.REG1
      variant: gas_import
      mode: steady
      region: REG1
    stock: 1000

  - selector:
      provider: fleet.deliver_residential.REG1.RES
      variant: residential_device
      mode: direct
      region: REG1
      scope: RES
    stock: 1000
