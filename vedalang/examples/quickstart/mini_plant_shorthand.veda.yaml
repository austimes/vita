dsl_version: "0.3"
commodities:
  - id: co2
    type: emission
  - id: natural_gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: delivered_electricity
    type: service
  - id: electricity_generation
    type: service
  - id: gas_supply
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    emissions:
      - commodity: co2
        factor: 0.056 t/GJ
    fixed_om: 20 MUSD24/GW/year
    investment_cost: 800 MUSD24/GW
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
  - id: gas_import
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
    variable_om: 5 MUSD24/PJ
  - id: grid_connection
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: delivered_electricity
technology_roles:
  - id: delivered_electricity
    primary_service: delivered_electricity
    technologies:
      - grid_connection
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - ccgt
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - gas_import
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
region_partitions:
  - id: reg1_partition
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1
sites:
  - id: reg1_energy_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        reg1_partition: REG1
facilities:
  - id: reg1_ccgt
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2020
          technology: ccgt
    technology_role: electricity_generation
  - id: reg1_gas_supply
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 1000 MW
            year: 2020
          technology: gas_import
    technology_role: gas_supply
  - id: reg1_grid_connection
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2020
          technology: grid_connection
    technology_role: delivered_electricity
runs:
  - id: reg1_2020
    base_year: 2020
    currency_year: 2024
    region_partition: reg1_partition
