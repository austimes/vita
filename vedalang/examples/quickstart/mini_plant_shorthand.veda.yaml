# Model: core system definition (regions, years, commodities, cases).
model:
  name: MiniModelShorthand
  description: Minimal model aligned with modeling conventions
  regions:
    - REG1
  milestone_years:
    - 2020
    - 2030
  commodities:
    - id: emission:co2
      description: Carbon dioxide
      type: emission
      combustible: false

    - id: primary:natural_gas
      description: Natural Gas
      type: fuel
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      combustible: false

    - id: service:delivered_electricity
      description: Delivered electricity service proxy
      type: service
      combustible: false

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
roles:
  - id: deliver_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:delivered_electricity

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: import_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

# Process variants: concrete technology definitions bound to roles.
variants:
  - id: ccgt
    role: generate_electricity
    modes:
      - id: ng
        inputs:
          - commodity: primary:natural_gas
            basis: HHV
        outputs:
          - commodity: secondary:electricity
        emission_factors:
          emission:co2: 0.056
        efficiency: 0.55
        emission_factor_basis: HHV
        investment_cost: 800 MUSD24/GW
        lifetime: 30

  - id: gas_import
    role: import_natural_gas
    modes:
      - id: steady
        inputs: []
        outputs:
          - commodity: primary:natural_gas
            basis: HHV
        efficiency: 1.0
        lifetime: 100
        variable_om_cost: 5 MUSD24/PJ
        variable_om_cost_basis: HHV

  - id: grid_connection
    role: deliver_electricity
    modes:
      - id: direct
        inputs:
          - commodity: secondary:electricity
        outputs:
          - commodity: service:delivered_electricity
        efficiency: 1.0
        lifetime: 100

# Providers: concrete reporting objects hosting role/variant/mode choices.
providers:
  - id: fleet.generate_electricity.REG1
    kind: fleet
    role: generate_electricity
    region: REG1
    offerings:
      - variant: ccgt
        modes: [ng]

  - id: fleet.import_natural_gas.REG1
    kind: fleet
    role: import_natural_gas
    region: REG1
    offerings:
      - variant: gas_import
        modes: [steady]

  - id: fleet.deliver_electricity.REG1.RES
    kind: fleet
    role: deliver_electricity
    region: REG1
    scopes:
      - RES
    offerings:
      - variant: grid_connection
        modes: [direct]

# Demands: service demand trajectories by region and optional scope (sector/scope).
demands:
  - commodity: service:delivered_electricity
    region: REG1
    values:
      "2020": 10
      "2030": 12
    interpolation: interp_extrap
    sector: RES
