# MiniSystem3: Investment and Stock Dynamics
# Increment 3: Capacity stock, life, investment decisions
# New capabilities: invcost, fixom, varom, life, stock, cap_bound, demand growth
# Tests: Investment triggered by demand growth, inter-period dynamics
# Issue: vedalang-8pr.3

model:
  name: MiniSystem3
  description: Investment decisions with demand growth forcing new capacity

  regions:
    - SINGLE

  start_year: 2020
  time_periods: [5, 5, 10]

  commodities:
    - name: NG
      type: energy
      unit: PJ
      description: Natural gas

    - name: ELC
      type: energy
      unit: PJ
      description: Electricity

    - name: RSD
      type: demand
      unit: PJ
      description: Residential demand

  processes:
    - name: IMP_NG
      description: Natural gas import supply
      sets: [IMP]
      primary_commodity_group: NRGO
      outputs:
        - commodity: NG
      efficiency: 1.0
      cost: 5.0
      stock: 1000

    - name: PP_CCGT
      description: CCGT with investment
      sets: [ELE]
      primary_commodity_group: NRGO
      inputs:
        - commodity: NG
      outputs:
        - commodity: ELC
      efficiency: 0.55
      invcost: 800
      fixom: 20
      varom: 2
      life: 40
      stock: 2
      cap_bound:
        up: 100

    - name: DMD_RSD
      description: Residential demand device
      sets: [DMD]
      primary_commodity_group: DEMO
      inputs:
        - commodity: ELC
      outputs:
        - commodity: RSD
      efficiency: 1.0
      stock: 1000
      life: 100

  scenario_parameters:
    - name: DemandRSD
      description: Residential demand projection with growth
      type: demand_projection
      commodity: RSD
      interpolation: interp_extrap
      values:
        "2020": 30
        "2030": 60
        "2050": 90
