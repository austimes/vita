# MiniSystem3: Investment and Stock Dynamics
# Increment 3: Capacity stock, life, investment decisions
# New capabilities: invcost, fixom, varom, life, stock, cap_bound, demand growth
# Tests: Investment triggered by demand growth, inter-period dynamics
# Issue: vedalang-8pr.3
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniSystem3
  description: Investment decisions with demand growth forcing new capacity

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2040]

  commodities:
    - id: fuel:natural_gas
      type: fuel
      unit: PJ
      description: Natural gas

    - id: energy:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: service:residential_demand
      type: service
      unit: PJ
      description: Residential demand

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: fuel:natural_gas

  - id: generate_electricity
    stage: conversion
    required_inputs:
      - commodity: fuel:natural_gas
    required_outputs:
      - commodity: energy:electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: energy:electricity
    required_outputs:
      - commodity: service:residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: fuel:natural_gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: fuel:natural_gas
    outputs:
      - commodity: energy:electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    lifetime: 40

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: energy:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [SINGLE]

  - variant: ccgt
    regions: [SINGLE]

  - variant: residential_device
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: ccgt
      region: SINGLE
    existing_capacity:
      - vintage: 2010
        capacity: 2
    cap_bound:
      up: 100

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    stock: 1000

demands:
  - commodity: service:residential_demand
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 30
      "2030": 60
      "2050": 90
