# MiniSystem4: Emissions and Climate Policy
# Increment 4: Emission accounting and carbon pricing
# New capabilities: CO2 commodity, emission_factor, commodity_price
# Tests: Emissions tracked, carbon price affects objective
# Issue: vedalang-8pr.4
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniSystem4
  description: Emission tracking and carbon pricing

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2040]

  commodities:
    - id: gas
      kind: carrier
      unit: PJ
      description: Natural gas

    - id: electricity
      kind: carrier
      unit: PJ
      description: Electricity

    - id: co2
      kind: emission
      unit: Mt
      description: Carbon dioxide emissions

    - id: residential_demand
      kind: service
      unit: PJ
      description: Residential demand

  scenario_parameters:
    - name: co2_price
      description: Carbon price trajectory
      type: commodity_price
      commodity: co2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 100

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    inputs: []
    outputs:
      - commodity: gas

  - id: generate_electricity
    stage: conversion
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    lifetime: 40
    emissions:
      - commodity: co2
        emission_factor: 0.05

  - id: residential_device
    role: deliver_residential
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [SINGLE]

  - variant: ccgt
    regions: [SINGLE]

  - variant: residential_device
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: ccgt
      region: SINGLE
    existing_capacity:
      - vintage: 2010
        capacity: 2
    cap_bound:
      up: 100

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    stock: 1000

demands:
  - commodity: residential_demand
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 30
      "2030": 60
      "2050": 90
