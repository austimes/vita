# Minimal VedaLang example using canonical role/variant modeling
model:
  name: MiniModelShorthand
  description: Minimal model aligned with modeling conventions

  regions:
    - REG1

  milestone_years: [2020, 2030]

  commodities:
    - id: secondary:electricity
      type: energy
      description: Electricity
      combustible: false
    - id: primary:natural_gas
      type: fuel
      description: Natural Gas
      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0
    - id: service:delivered_electricity
      type: service
      description: Delivered electricity service proxy
      combustible: false
    - id: emission:co2
      type: emission
      description: Carbon dioxide

      combustible: false
segments:
  sectors: [RES]

process_roles:
  - id: import_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: deliver_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:delivered_electricity

process_variants:
  - id: gas_import
    role: import_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    variable_om_cost: 5.0
    lifetime: 100

    variable_om_cost_basis: HHV
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    investment_cost: 800
    lifetime: 30
    emission_factors:
      emission:co2: 0.056

    emission_factor_basis: HHV
  - id: grid_connection
    role: deliver_electricity
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:delivered_electricity
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [REG1]

  - variant: ccgt
    regions: [REG1]

  - variant: grid_connection
    regions: [REG1]
    sectors: [RES]

demands:
  - commodity: service:delivered_electricity
    region: REG1
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 10
      "2030": 12
