# Toy Buildings: Heating Decarbonisation
# Variant-level inputs for fuel-specific topology
# Tests: service-role abstraction, demand overrides, COP>1 placeholder (eff=1.0)
# Issue: vedalang-0pt.8

model:
  name: ToyBuildings
  description: Heating decarbonisation with variant-level inputs and retrofit demand case overlay

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2035, 2040, 2050]

  commodities:
    - id: service:space_heat
      type: service
      unit: PJ
      description: Space heating demand

    - id: energy:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: energy:natural_gas
      type: energy
      unit: PJ
      description: Natural gas

    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide

  cases:
    - name: baseline
      is_baseline: true
      description: Reference demand trajectory

    - name: retrofit_policy
      description: Building envelope retrofit reduces space heat demand
      demand_overrides:
        - commodity: service:space_heat
          region: SINGLE
          sector: RES
          interpolation: interp_extrap
          values:
            "2020": 100
            "2025": 95
            "2030": 90
            "2035": 84
            "2040": 78
            "2050": 70

segments:
  sectors: [RES]

process_roles:
  - id: supply_natural_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: energy:natural_gas

  - id: supply_electricity
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: energy:electricity

  - id: provide_space_heat
    stage: end_use
    required_inputs: []
    required_outputs:
      - commodity: service:space_heat

process_variants:
  - id: pipeline_import
    role: supply_natural_gas
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8
    inputs: []
    outputs:
      - commodity: energy:natural_gas

  - id: grid_import 
    role: supply_electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25
    inputs: []
    outputs:
      - commodity: energy:electricity

  - id: gas_heater
    role: provide_space_heat
    inputs:
      - commodity: energy:natural_gas
    outputs:
      - commodity: service:space_heat
    efficiency: 0.90
    lifetime: 20
    investment_cost: 30
    emission_factors:
      emission:co2: 0.056

  - id: heat_pump
    role: provide_space_heat
    inputs:
      - commodity: energy:electricity
    outputs:
      - commodity: service:space_heat
    # COP is 3.0 but schema constrains efficiency to 0-1 range.
    # Schema extension needed to support COP > 1.
    efficiency: 1.0
    lifetime: 20
    investment_cost: 150

availability:
  - variant: pipeline_import
    regions: [SINGLE]

  - variant: grid_import
    regions: [SINGLE]

  - variant: gas_heater
    regions: [SINGLE]
    sectors: [RES]

  - variant: heat_pump
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: pipeline_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: grid_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: gas_heater
      region: SINGLE
      sector: RES
    stock: 80
    cap_bound:
      up: 200

  - selector:
      variant: heat_pump
      region: SINGLE
      sector: RES
    stock: 10
    cap_bound:
      up: 200

demands:
  - commodity: service:space_heat
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100
      "2050": 100
