# Toy Buildings: Heating Decarbonisation
# Gas heater vs heat pump vs building retrofit (avoided demand pattern)
# Tests: zero-input process, ncap_bound, COP>1 (limited by schema to eff=1.0)
# Issue: vedalang-248.3

model:
  name: ToyBuildings
  description: Heating decarbonisation with gas heater, heat pump, and building retrofit

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2035, 2040, 2050]

  commodities:
    - id: space_heat
      kind: service
      unit: PJ
      description: Space heating demand

    - id: electricity
      kind: carrier
      unit: PJ
      description: Electricity

    - id: natural_gas
      kind: carrier
      unit: PJ
      description: Natural gas

    - id: co2
      kind: emission
      unit: Mt
      description: Carbon dioxide

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    inputs: []
    outputs:
      - commodity: natural_gas

  - id: import_electricity
    stage: supply
    inputs: []
    outputs:
      - commodity: electricity

  - id: heat_from_gas
    stage: end_use
    inputs:
      - commodity: natural_gas
    outputs:
      - commodity: space_heat
      - commodity: co2

  - id: heat_from_electricity
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: space_heat

  # Zero-input role: "avoided demand" via building retrofit
  - id: reduce_heat_demand
    stage: end_use
    inputs: []
    outputs:
      - commodity: space_heat

process_variants:
  - id: gas_import
    role: import_gas
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8

  - id: electricity_import
    role: import_electricity
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 25

  - id: gas_heater
    role: heat_from_gas
    efficiency: 0.90
    lifetime: 20
    investment_cost: 30
    emission_factors:
      co2: 0.056

  - id: heat_pump
    role: heat_from_electricity
    # COP is 3.0 but schema constrains efficiency to 0-1 range.
    # Schema extension needed to support COP > 1.
    efficiency: 1.0
    lifetime: 20
    investment_cost: 150

  - id: building_retrofit
    role: reduce_heat_demand
    efficiency: 1.0
    lifetime: 30
    investment_cost: 200

availability:
  - variant: gas_import
    regions: [SINGLE]

  - variant: electricity_import
    regions: [SINGLE]

  - variant: gas_heater
    regions: [SINGLE]
    sectors: [RES]

  - variant: heat_pump
    regions: [SINGLE]
    sectors: [RES]

  - variant: building_retrofit
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: electricity_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: gas_heater
      region: SINGLE
      sector: RES
    stock: 80
    cap_bound:
      up: 200

  - selector:
      variant: heat_pump
      region: SINGLE
      sector: RES
    stock: 10
    cap_bound:
      up: 200

  - selector:
      variant: building_retrofit
      region: SINGLE
      sector: RES
    stock: 0.5
    ncap_bound:
      up: 30

demands:
  - commodity: space_heat
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100
      "2050": 100
