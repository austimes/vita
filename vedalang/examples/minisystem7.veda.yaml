# MiniSystem7: Multi-region with Unidirectional Trade
# Increment 7: Multiple regions, inter-regional electricity trade
# New capabilities: 2 regions, trade_links, transport efficiency
# Tests: Cross-region flows, trade losses (3%), clean RES topology
# Note: Uses unidirectional trade to avoid ELC self-loop in RES
# Issue: vedalang-8pr.7

model:
  name: MiniSystem7
  description: Multi-region model with unidirectional electricity trade

  regions:
    - NORTH
    - SOUTH

  start_year: 2020
  time_periods: [5, 5, 10]

  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25

  commodities:
    - name: NG
      type: energy
      unit: PJ
      description: Natural gas

    - name: ELC
      type: energy
      unit: PJ
      description: Electricity

    - name: CO2
      type: emission
      unit: Mt
      description: Carbon dioxide emissions

    - name: RSD
      type: demand
      unit: PJ
      description: Residential demand

  processes:
    - name: IMP_NG
      description: Natural gas import supply
      sets: [IMP]
      primary_commodity_group: NRGO
      outputs:
        - commodity: NG
      efficiency: 1.0
      cost: 5.0
      stock: 1000

    - name: PP_CCGT
      description: CCGT with emissions
      sets: [ELE]
      primary_commodity_group: NRGO
      inputs:
        - commodity: NG
      outputs:
        - commodity: ELC
        - commodity: CO2
          emission_factor: 0.05
      efficiency: 0.55
      invcost: 800
      fixom: 20
      varom: 2
      life: 40
      stock: 2
      cap_bound:
        up: 100

    - name: PP_WIND
      description: Onshore wind plant
      sets: [ELE]
      primary_commodity_group: NRGO
      outputs:
        - commodity: ELC
      efficiency: 1.0
      invcost: 1200
      fixom: 25
      varom: 1
      life: 25
      stock: 1
      cap_bound:
        up: 100

    - name: DMD_RSD
      description: Residential demand device
      sets: [DMD]
      primary_commodity_group: DEMO
      inputs:
        - commodity: ELC
      outputs:
        - commodity: RSD
      efficiency: 1.0
      stock: 1000
      life: 100

  trade_links:
    - origin: NORTH
      destination: SOUTH
      commodity: ELC
      bidirectional: false
      efficiency: 0.97

  scenario_parameters:
    - name: DemandRSD
      description: Residential demand projection with growth
      type: demand_projection
      commodity: RSD
      interpolation: interp_extrap
      values:
        "2020": 30
        "2030": 60
        "2050": 90

    - name: CO2_Price
      description: Carbon price trajectory
      type: commodity_price
      commodity: CO2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 100
