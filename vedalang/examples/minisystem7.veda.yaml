# MiniSystem7: Multi-region with Unidirectional Trade
# Increment 7: Multiple regions, inter-regional electricity trade
# New capabilities: 2 regions, trade_links, transport efficiency
# Tests: Cross-region flows, trade losses (3%), clean RES topology
# Note: Uses unidirectional trade to avoid ELC self-loop in RES
# Issue: vedalang-8pr.7
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniSystem7
  description: Multi-region model with unidirectional electricity trade

  regions:
    - NORTH
    - SOUTH

  milestone_years: [2020, 2025, 2030, 2040]

  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25

  commodities:
    - id: fuel:gas
      type: fuel
      unit: PJ
      description: Natural gas

    - id: energy:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide emissions

    - id: service:residential_demand
      type: service
      unit: PJ
      description: Residential demand

  trade_links:
    - origin: NORTH
      destination: SOUTH
      commodity: energy:electricity
      bidirectional: false
      efficiency: 0.97

  scenario_parameters:
    - name: co2_price
      description: Carbon price trajectory
      type: commodity_price
      commodity: emission:co2
      interpolation: interp_extrap
      values:
        "2025": 30
        "2030": 50
        "2050": 100

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: fuel:gas

  - id: generate_electricity
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: energy:electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: energy:electricity
    required_outputs:
      - commodity: service:residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: fuel:gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: fuel:gas
    outputs:
      - commodity: energy:electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    lifetime: 40
    emission_factors:
      emission:co2: 0.05

  - id: wind
    role: generate_electricity
    inputs: []
    outputs:
      - commodity: energy:electricity
    efficiency: 1.0
    investment_cost: 1200
    fixed_om_cost: 25
    variable_om_cost: 1
    lifetime: 25

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: energy:electricity
    outputs:
      - commodity: service:residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [NORTH, SOUTH]

  - variant: ccgt
    regions: [NORTH, SOUTH]

  - variant: wind
    regions: [NORTH, SOUTH]

  - variant: residential_device
    regions: [NORTH, SOUTH]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: NORTH
    stock: 1000

  - selector:
      variant: gas_import
      region: SOUTH
    stock: 1000

  - selector:
      variant: ccgt
      region: NORTH
    stock: 2
    cap_bound:
      up: 100

  - selector:
      variant: ccgt
      region: SOUTH
    stock: 2
    cap_bound:
      up: 100

  - selector:
      variant: wind
      region: NORTH
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: wind
      region: SOUTH
    stock: 1
    cap_bound:
      up: 100

  - selector:
      variant: residential_device
      region: NORTH
      sector: RES
    stock: 1000

  - selector:
      variant: residential_device
      region: SOUTH
      sector: RES
    stock: 1000

demands:
  - commodity: service:residential_demand
    region: NORTH
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 30
      "2030": 60
      "2050": 90

  - commodity: service:residential_demand
    region: SOUTH
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 30
      "2030": 60
      "2050": 90
