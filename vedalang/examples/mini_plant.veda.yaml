# Minimal VedaLang example: A simple thermal power plant
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniModel
  description: A minimal test model with one power plant

  regions:
    - REG1

  milestone_years: [2020, 2030]

  commodities:
    - id: electricity
      kind: carrier
      unit: PJ
      description: Electricity

    - id: gas
      kind: carrier
      unit: PJ
      description: Natural Gas

process_roles:
  - id: generate_electricity
    stage: conversion
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity

process_variants:
  - id: ccgt
    role: generate_electricity
    efficiency: 0.55

availability:
  - variant: ccgt
    regions: [REG1]
