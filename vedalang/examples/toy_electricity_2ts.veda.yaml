# Toy Electricity (2 timeslices): VRE + Gas + Storage under CO2 cap
# Day/Night resolution — solar generates only during day
# Tests: timeslices, VRE capacity factors, battery storage, emission_cap
# Issue: vedalang-0pt.10

model:
  name: ToyElectricity2TS
  description: Electricity system with VRE, gas, storage and CO2 cap (day/night resolution)

  regions:
    - SINGLE

  milestone_years: [2020, 2025, 2030, 2035, 2040, 2050]

  timeslices:
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      D: 0.50
      N: 0.50

  commodities:
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: secondary:delivered_electricity
      type: energy
      unit: PJ
      description: Grid-delivered electricity at end-use connection

    - id: service:electricity_service
      type: service
      unit: PJ
      description: Electricity service demand

    - id: primary:natural_gas
      type: fuel
      unit: PJ
      description: Natural gas

    - id: resource:solar_irradiance
      type: other
      unit: PJ
      description: Solar irradiance resource

    - id: resource:wind_resource
      type: other
      unit: PJ
      description: Wind energy resource

    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide

  scenario_parameters:
    - name: co2-price
      description: Carbon price trajectory
      type: commodity_price
      commodity: emission:co2
      interpolation: interp_extrap
      values:
        "2020": 10
        "2030": 50
        "2050": 100

  constraints:
    - name: CO2_CAP
      type: emission_cap
      commodity: emission:co2
      years:
        "2020": 10
        "2030": 5
        "2040": 2
        "2050": 0.5
      interpolation: interp_extrap
      limtype: up

segments:
  sectors: [RES]

process_roles:
  - id: supply_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: supply_solar_irradiance
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_irradiance

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: store_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: storage
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: secondary:electricity

  - id: deliver_electricity_grid
    activity_unit: PJ
    capacity_unit: GW
    stage: distribution
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: secondary:delivered_electricity

  - id: provide_electricity_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:delivered_electricity
    required_outputs:
      - commodity: service:electricity_service

process_variants:
  - id: gas_import
    role: supply_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
    efficiency: 1.0
    lifetime: 100
    variable_om_cost: 8

  - id: exogenous_solar 
    role: supply_solar_irradiance
    inputs: []
    outputs:
      - commodity: resource:solar_irradiance
    efficiency: 1.0
    lifetime: 100

  - id: exogenous_wind
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 40
    investment_cost: 800
    fixed_om_cost: 20
    variable_om_cost: 2
    emission_factors:
      emission:co2: 0.05

  - id: ocgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.35
    lifetime: 30
    investment_cost: 400
    fixed_om_cost: 10
    variable_om_cost: 5
    emission_factors:
      emission:co2: 0.08

  - id: solar_pv
    role: generate_electricity
    inputs:
      - commodity: resource:solar_irradiance
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25
    investment_cost: 1000
    fixed_om_cost: 15
    variable_om_cost: 0.5

  - id: onshore_wind
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25
    investment_cost: 1200
    fixed_om_cost: 25
    variable_om_cost: 1

  - id: battery
    role: store_electricity
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.85
    lifetime: 15
    investment_cost: 300
    fixed_om_cost: 5

  - id: grid_distribution
    role: deliver_electricity_grid
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: secondary:delivered_electricity
    efficiency: 0.95
    lifetime: 100
    kind: network

  - id: direct_electric
    role: provide_electricity_service
    inputs:
      - commodity: secondary:delivered_electricity
    outputs:
      - commodity: service:electricity_service
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [SINGLE]

  - variant: exogenous_solar
    regions: [SINGLE]

  - variant: exogenous_wind
    regions: [SINGLE]

  - variant: ccgt
    regions: [SINGLE]

  - variant: ocgt
    regions: [SINGLE]

  - variant: solar_pv
    regions: [SINGLE]

  - variant: onshore_wind
    regions: [SINGLE]

  - variant: battery
    regions: [SINGLE]

  - variant: grid_distribution
    regions: [SINGLE]

  - variant: direct_electric
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: SINGLE
    stock: 1000

  - selector:
      variant: exogenous_solar
      region: SINGLE
    stock: 1000

  - selector:
      variant: exogenous_wind
      region: SINGLE
    stock: 1000

  - selector:
      variant: ccgt
      region: SINGLE
    stock: 5
    cap_bound:
      up: 100

  - selector:
      variant: ocgt
      region: SINGLE
    stock: 2
    cap_bound:
      up: 100

  - selector:
      variant: solar_pv
      region: SINGLE
    stock: 1
    cap_bound:
      up: 500

  - selector:
      variant: onshore_wind
      region: SINGLE
    stock: 1
    cap_bound:
      up: 500

  - selector:
      variant: battery
      region: SINGLE
    stock: 0.5
    cap_bound:
      up: 200

  - selector:
      variant: grid_distribution
      region: SINGLE
    stock: 1000

  - selector:
      variant: direct_electric
      region: SINGLE
      sector: RES
    stock: 1000

demands:
  - commodity: service:electricity_service
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 50
      "2050": 100
