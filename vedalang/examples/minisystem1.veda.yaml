# MiniSystem1: Minimal Solvable Model
# Increment 1: Pipeline sanity test
# New capabilities: Basic RES, demand projection, E2E validation
# Tests: VedaLang → TableIR → Excel → DD → solve
# Issue: vedalang-8pr.1
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability
# Migrated from old process_templates/processes syntax

model:
  name: MiniSystem1
  description: Simplest possible solvable VedaLang model

  regions:
    - SINGLE

  milestone_years: [2020, 2030]

  commodities:
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

      combustible: false
    - id: service:residential_electricity
      type: service
      unit: PJ
      description: Residential demand

      combustible: false
segments:
  sectors: [RES]

process_roles:
  - id: supply_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_residential_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_electricity

process_variants:
  - id: grid_supply
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    variable_om_cost: 10
    lifetime: 40

  - id: residential_device
    role: provide_residential_electricity
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_electricity
    efficiency: 1.0
    lifetime: 40

availability:
  - variant: grid_supply
    regions: [SINGLE]

  - variant: residential_device
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: grid_supply
      region: SINGLE
    existing_capacity:
      - vintage: 2010
        capacity: 100
    cap_bound:
      up: 1000

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    existing_capacity:
      - vintage: 2010
        capacity: 100
    cap_bound:
      up: 1000

demands:
  - commodity: service:residential_electricity
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 50
