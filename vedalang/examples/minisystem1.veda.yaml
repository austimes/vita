# MiniSystem1: Minimal Solvable Model
# Increment 1: Pipeline sanity test
# New capabilities: Basic RES, demand projection, E2E validation
# Tests: VedaLang → TableIR → Excel → DD → solve
# Issue: vedalang-8pr.1
#
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability
# Migrated from old process_templates/processes syntax

model:
  name: MiniSystem1
  description: Simplest possible solvable VedaLang model

  regions:
    - SINGLE

  milestone_years: [2020, 2030]

  commodities:
    - id: electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: residential_demand
      type: service
      unit: PJ
      description: Residential demand

segments:
  sectors: [RES]

process_roles:
  - id: generate_electricity
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: electricity
    required_outputs:
      - commodity: residential_demand

process_variants:
  - id: simple_generator
    role: generate_electricity
    inputs: []
    outputs:
      - commodity: electricity
    efficiency: 1.0
    variable_om_cost: 10
    lifetime: 40

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand
    efficiency: 1.0
    lifetime: 40

availability:
  - variant: simple_generator
    regions: [SINGLE]

  - variant: residential_device
    regions: [SINGLE]
    sectors: [RES]

process_parameters:
  - selector:
      variant: simple_generator
      region: SINGLE
    existing_capacity:
      - vintage: 2010
        capacity: 100
    cap_bound:
      up: 1000

  - selector:
      variant: residential_device
      region: SINGLE
      sector: RES
    existing_capacity:
      - vintage: 2010
        capacity: 100
    cap_bound:
      up: 1000

demands:
  - commodity: residential_demand
    region: SINGLE
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 50
