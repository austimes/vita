# MiniSystem1: Minimal Solvable Model
# Increment 1: Pipeline sanity test
# New capabilities: Basic RES, demand projection, E2E validation
# Tests: VedaLang → TableIR → Excel → DD → solve
# Issue: vedalang-8pr.1
#
# Uses existing_capacity (NCAP_PASTI) with vintage years for proper
# capacity tracking. Unlike 'stock' (PRC_RESID), NCAP_PASTI:
# - Tracks specific vintage years
# - Provides proper economic life tracking
# - Retires based on lifetime from vintage year

model:
  name: MiniSystem1
  description: Simplest possible solvable VedaLang model

  regions:
    - SINGLE

  milestone_years: [2020, 2030]

  commodities:
    - name: ELC
      type: energy
      unit: PJ
      description: Electricity

    - name: RSD
      type: demand
      unit: PJ
      description: Residential demand

  processes:
    - name: PP_SIMPLE
      description: Simple power generator
      sets: [ELE]
      primary_commodity_group: NRGO
      outputs:
        - commodity: ELC
      efficiency: 1.0
      variable_om_cost: 10  # Activity cost ($/PJ)
      lifetime: 40  # Years - capacity retires after this period
      existing_capacity:
        - vintage: 2010
          capacity: 100  # GW built in 2010, retires 2050
      cap_bound:
        up: 1000

    - name: DMD_RSD
      description: Residential demand device
      sets: [DMD]
      primary_commodity_group: DEMO
      inputs:
        - commodity: ELC
      outputs:
        - commodity: RSD
      efficiency: 1.0
      lifetime: 40
      existing_capacity:
        - vintage: 2010
          capacity: 100  # GW built in 2010, retires 2050
      cap_bound:
        up: 1000

  scenario_parameters:
    - name: DemandRSD
      description: Residential demand projection
      type: demand_projection
      commodity: RSD
      interpolation: interp_extrap
      values:
        "2020": 50
