# Example: User Constraints in VedaLang
# Demonstrates emission_cap and activity_share constraint types.
#
# NOTE: This compiles to valid TableIR, but xl2times validation currently fails
# because UC tables require uc_sets metadata (R_E, T_E) that veda_emit_excel
# does not yet emit. This is a known limitation - see tests/test_golden_fixtures.py.
model:
  name: ConstraintDemo
  description: Model with CO2 cap and renewable energy target

  regions:
    - REG1

  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      description: Natural Gas

    - id: resource:wind_resource
      type: other
      unit: PJ
      description: Wind resource

    - id: resource:solar_resource
      type: other
      unit: PJ
      description: Solar resource

    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: emission:co2
      type: emission
      unit: Mt
      description: Carbon dioxide emissions

  constraints:
    # Emission cap: limit CO2 to 100 Mt initially, declining to 50 Mt by 2040
    - name: co2_cap
      type: emission_cap
      commodity: emission:co2
      years:
        "2020": 100
        "2040": 50
      interpolation: interp_extrap
      limtype: up

    # Renewable energy target: at least 30% of electricity from wind+solar
    - name: ren_target
      type: activity_share
      commodity: secondary:electricity
      processes: [wind_generation, solar_generation]
      minimum_share: 0.30

segments:
  sectors: [IND]

process_roles:
  - id: import_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

  - id: supply_solar_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_resource

  - id: provide_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

process_variants:
  - id: pipeline_import
    role: import_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
    efficiency: 1.0
    lifetime: 100

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: solar_resource_supply
    role: supply_solar_resource
    inputs: []
    outputs:
      - commodity: resource:solar_resource
    efficiency: 1.0
    lifetime: 100

  - id: ccgt_generation
    role: provide_electricity
    inputs:
      - commodity: primary:natural_gas
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 30
    emission_factors:
      emission:co2: 0.05

  - id: wind_generation
    role: provide_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25

  - id: solar_generation
    role: provide_electricity
    inputs:
      - commodity: resource:solar_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25

availability:
  - variant: pipeline_import
    regions: [REG1]

  - variant: wind_resource_supply
    regions: [REG1]

  - variant: solar_resource_supply
    regions: [REG1]

  - variant: ccgt_generation
    regions: [REG1]
    sectors: [IND]

  - variant: wind_generation
    regions: [REG1]
    sectors: [IND]

  - variant: solar_generation
    regions: [REG1]
    sectors: [IND]

process_parameters:
  - selector:
      variant: pipeline_import
      region: REG1
    stock: 1000

  - selector:
      variant: wind_resource_supply
      region: REG1
    stock: 1000

  - selector:
      variant: solar_resource_supply
      region: REG1
    stock: 1000

  - selector:
      variant: ccgt_generation
      region: REG1
      sector: IND
    stock: 10

  - selector:
      variant: wind_generation
      region: REG1
      sector: IND
    stock: 2

  - selector:
      variant: solar_generation
      region: REG1
      sector: IND
    stock: 2
