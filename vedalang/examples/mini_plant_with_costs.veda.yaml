# VedaLang example: Minimal thermal plant with cost attributes
# Demonstrates investment_cost, fixed_om_cost, variable_om_cost, lifetime
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniPlantCosts
  description: Minimal thermal plant model with process costs
  regions:
    - REG1
  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: gas
      kind: carrier
      unit: PJ

    - id: electricity
      kind: carrier
      unit: PJ

    - id: residential_demand
      kind: service
      unit: PJ

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    inputs: []
    outputs:
      - commodity: gas

  - id: generate_electricity
    stage: conversion
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    efficiency: 1.0
    variable_om_cost: 5.0  # M€/PJ import cost (ACT_COST)
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    efficiency: 0.55
    investment_cost: 800    # M€/GW investment cost (NCAP_COST)
    fixed_om_cost: 20       # M€/GW/yr fixed O&M (FOM)
    variable_om_cost: 2     # M€/PJ variable O&M (VOM)
    lifetime: 30

  - id: residential_device
    role: deliver_residential
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [REG1]

  - variant: ccgt
    regions: [REG1]

  - variant: residential_device
    regions: [REG1]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: REG1
    stock: 1000

  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000
