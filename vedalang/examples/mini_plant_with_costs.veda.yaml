# VedaLang example: Minimal thermal plant with cost attributes
# Demonstrates investment_cost, fixed_om_cost, variable_om_cost, lifetime
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: MiniPlantCosts
  description: Minimal thermal plant model with process costs
  regions:
    - REG1
  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: fuel:natural_gas
      type: fuel
      unit: PJ

    - id: energy:electricity
      type: energy
      unit: PJ

    - id: service:residential_electricity_service
      type: service
      unit: PJ

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: fuel:natural_gas

  - id: generate_electricity
    stage: conversion
    required_inputs:
      - commodity: fuel:natural_gas
    required_outputs:
      - commodity: energy:electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: energy:electricity
    required_outputs:
      - commodity: service:residential_electricity_service

process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: fuel:natural_gas
    efficiency: 1.0
    variable_om_cost: 5.0  # M€/PJ import cost (ACT_COST)
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: fuel:natural_gas
    outputs:
      - commodity: energy:electricity
    efficiency: 0.55
    investment_cost: 800    # M€/GW investment cost (NCAP_COST)
    fixed_om_cost: 20       # M€/GW/yr fixed O&M (FOM)
    variable_om_cost: 2     # M€/PJ variable O&M (VOM)
    lifetime: 30

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: energy:electricity
    outputs:
      - commodity: service:residential_electricity_service
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [REG1]

  - variant: ccgt
    regions: [REG1]

  - variant: residential_device
    regions: [REG1]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: REG1
    stock: 1000

  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000
