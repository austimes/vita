model:
  name: DemoS001
  description: "Coal resource supply system \u2014 domestic mining (3-step supply\
    \ curve), imports, exports, and demand technology. Single region, annual resolution.\n"
  regions:
  - REG1
  milestone_years:
  - 2005
  - 2006
  commodities:
  - id: primary:coal
    type: fuel
    unit: PJ
    description: Solid fuels (coal)
    combustible: true
    lhv_mj_per_unit: 25.0
    hhv_mj_per_unit: 27.5
  - id: service:coal_supply
    type: service
    unit: PJ
    description: Total primary supply demand for coal
    combustible: false
segments:
  sectors:
  - IND
process_roles:
- id: mine_coal
  activity_unit: PJ
  capacity_unit: GW
  stage: supply
  description: Domestic coal extraction (mining)
  required_inputs: []
  required_outputs:
  - commodity: primary:coal
- id: import_coal
  activity_unit: PJ
  capacity_unit: GW
  stage: supply
  description: Coal imports from international market
  required_inputs: []
  required_outputs:
  - commodity: primary:coal
- id: export_coal
  activity_unit: PJ
  capacity_unit: GW
  stage: sink
  description: Coal exports to international market
  required_inputs:
  - commodity: primary:coal
  required_outputs: []
- id: deliver_coal_supply
  activity_unit: PJ
  capacity_unit: GW
  stage: end_use
  description: "Demand technology \u2014 delivers coal to meet supply demand"
  required_inputs:
  - commodity: primary:coal
  required_outputs:
  - commodity: service:coal_supply
process_variants:
- id: mine_coal_step1
  role: mine_coal
  description: "Cheapest domestic coal \u2014 shallow/accessible deposits"
  inputs: []
  outputs:
  - commodity: primary:coal
    basis: HHV
  efficiency: 1.0
  lifetime: 100
  variable_om_cost: 2 MUSD24/PJ
  variable_om_cost_basis: HHV
- id: mine_coal_step2
  role: mine_coal
  description: "Mid-cost domestic coal \u2014 deeper deposits"
  inputs: []
  outputs:
  - commodity: primary:coal
    basis: HHV
  efficiency: 1.0
  lifetime: 100
  variable_om_cost: 2.5 MUSD24/PJ
  variable_om_cost_basis: HHV
- id: mine_coal_step3
  role: mine_coal
  description: "Expensive domestic coal \u2014 marginal deposits"
  inputs: []
  outputs:
  - commodity: primary:coal
    basis: HHV
  efficiency: 1.0
  lifetime: 100
  variable_om_cost: 3 MUSD24/PJ
  variable_om_cost_basis: HHV
- id: coal_import
  role: import_coal
  description: International coal import at world market price
  inputs: []
  outputs:
  - commodity: primary:coal
    basis: HHV
  efficiency: 1.0
  lifetime: 100
  variable_om_cost: 2.75 MUSD24/PJ
  variable_om_cost_basis: HHV
- id: coal_export
  role: export_coal
  description: Coal export to international market
  inputs:
  - commodity: primary:coal
    basis: HHV
  outputs: []
  efficiency: 1.0
  lifetime: 100
  variable_om_cost: 2.75 MUSD24/PJ
  variable_om_cost_basis: HHV
- id: coal_demand_device
  role: deliver_coal_supply
  description: Generic demand technology consuming coal
  inputs:
  - commodity: primary:coal
    basis: HHV
  outputs:
  - commodity: service:coal_supply
  efficiency: 1.0
  lifetime: 20
  investment_cost: 10 MUSD24/GW
  fixed_om_cost: 0.2 MUSD24/GW/yr
availability:
- variant: mine_coal_step1
  regions:
  - REG1
- variant: mine_coal_step2
  regions:
  - REG1
- variant: mine_coal_step3
  regions:
  - REG1
- variant: coal_import
  regions:
  - REG1
- variant: coal_export
  regions:
  - REG1
- variant: coal_demand_device
  regions:
  - REG1
  sectors:
  - IND
process_parameters:
- selector:
    variant: mine_coal_step1
    region: REG1
  stock: 10000
  activity_bound:
    up: 6074
- selector:
    variant: mine_coal_step2
    region: REG1
  stock: 10000
  activity_bound:
    up: 2025
- selector:
    variant: mine_coal_step3
    region: REG1
  stock: 10000
- selector:
    variant: coal_import
    region: REG1
  stock: 100000
- selector:
    variant: coal_export
    region: REG1
  stock: 10000
  activity_bound:
    up: 1147
- selector:
    variant: coal_demand_device
    region: REG1
    sector: IND
  stock: 15000
  cap_bound:
    up: 100000
demands:
- commodity: service:coal_supply
  region: REG1
  sector: IND
  interpolation: interp_extrap
  values:
    '2005': 13414
