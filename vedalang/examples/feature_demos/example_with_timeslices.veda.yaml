dsl_version: "0.3"
commodities:
  - id: natural_gas
    type: energy
    energy_form: primary
  - id: electricity
    type: energy
    energy_form: secondary
  - id: electricity_demand
    type: service
  - id: electricity_generation
    type: service
  - id: gas_supply
    type: service
technologies:
  - id: ccgt
    inputs:
      - commodity: natural_gas
        basis: HHV
    outputs:
      - commodity: electricity
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: electricity_generation
  - id: electric_device
    inputs:
      - commodity: electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: electricity_demand
  - id: gas_import
    outputs:
      - commodity: natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: gas_supply
technology_roles:
  - id: electricity_generation
    primary_service: electricity_generation
    technologies:
      - ccgt
  - id: electricity_service
    primary_service: electricity_demand
    technologies:
      - electric_device
  - id: gas_supply
    primary_service: gas_supply
    technologies:
      - gas_import
spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon
temporal_index_series:
  - id: day_night_profile_proxy
    unit: index
    values:
      "2020": 1.0
      "2030": 1.2
    base_year: 2020
region_partitions:
  - id: reg1_partition
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1
sites:
  - id: reg1_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        reg1_partition: REG1
facilities:
  - id: reg1_demand
    site: reg1_hub
    stock:
      items:
        - adjust_to_base_year:
            using: day_night_profile_proxy
          metric: annual_activity
          observed:
            value: 20 GWh/year
            year: 2020
          technology: electric_device
    technology_role: electricity_service
  - id: reg1_gas_supply
    site: reg1_hub
    stock:
      items:
        - adjust_to_base_year:
            using: day_night_profile_proxy
          metric: annual_activity
          observed:
            value: 200 GWh/year
            year: 2020
          technology: gas_import
    technology_role: gas_supply
  - id: reg1_generation
    site: reg1_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2020
          technology: ccgt
    technology_role: electricity_generation
runs:
  - id: reg1_2020
    base_year: 2020
    currency_year: 2024
    region_partition: reg1_partition
