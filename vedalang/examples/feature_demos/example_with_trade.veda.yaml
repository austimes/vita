dsl_version: "0.2"

commodities:
  - id: primary:natural_gas
    kind: primary

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_generation
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:residential_demand
    kind: service

technologies:
  - id: ccgt
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    fixed_om: 20 AUD2024/kW/year
    investment_cost: 800 AUD2024/kW
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: service:electricity_generation

  - id: pipeline_import
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply

  - id: residential_device
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:residential_demand

technology_roles:
  - id: electricity_generation
    primary_service: service:electricity_generation
    technologies:
      - ccgt

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - pipeline_import

  - id: residential_service
    primary_service: service:residential_demand
    technologies:
      - residential_device

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: trade_regions
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1
      - REG2

sites:
  - id: reg1_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        trade_regions: REG1

  - id: reg2_hub
    location:
      point:
        lat: -37.81
        lon: 144.96
    membership_overrides:
      region_partitions:
        trade_regions: REG2

facilities:
  - id: reg1_gas_supply
    site: reg1_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 300 MW
            year: 2025
          technology: pipeline_import
    technology_role: gas_supply

  - id: reg1_generation
    site: reg1_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 15 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation

  - id: reg1_residential_service
    site: reg1_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 20 MW
            year: 2025
          technology: residential_device
    technology_role: residential_service

  - id: reg2_gas_supply
    site: reg2_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: pipeline_import
    technology_role: gas_supply

  - id: reg2_generation
    site: reg2_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 8 MW
            year: 2025
          technology: ccgt
    technology_role: electricity_generation

  - id: reg2_residential_service
    site: reg2_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 20 MW
            year: 2025
          technology: residential_device
    technology_role: residential_service

networks:
  - id: gas_pipeline
    kind: pipeline
    links:
      - id: reg1_reg2_gas
        commodity: primary:natural_gas
        existing_transfer_capacity: 100 MW
        from: REG1
        max_new_capacity: 80 MW
        to: REG2
    node_basis:
      kind: region_partition
      ref: trade_regions

  - id: interconnector
    kind: transmission
    links:
      - id: reg1_reg2_power
        commodity: secondary:electricity
        existing_transfer_capacity: 120 MW
        from: REG1
        max_new_capacity: 90 MW
        to: REG2
    node_basis:
      kind: region_partition
      ref: trade_regions

runs:
  - id: trade_regions_2025
    base_year: 2025
    currency_year: 2024
    region_partition: trade_regions
