dsl_version: "0.2"

commodities:
  - id: primary:natural_gas
    kind: primary

  - id: resource:wind_resource
    kind: material

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_generation
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:residential_energy_services
    kind: service

  - id: service:wind_resource_supply
    kind: service

technologies:
  - id: ccgt
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    fixed_om: 20 AUD2024/kW/year
    investment_cost: 800 AUD2024/kW
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: service:electricity_generation

  - id: existing_gas_steam
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    lifetime: 40 year
    performance:
      kind: efficiency
      value: 0.4
    provides: service:electricity_generation

  - id: onshore_wind_resource
    outputs:
      - commodity: resource:wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:wind_resource_supply

  - id: onshore_wind_turbine
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    fixed_om: 25 AUD2024/kW/year
    investment_cost: 1200 AUD2024/kW
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_generation

  - id: pipeline_import
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply

  - id: residential_electric_service
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:residential_energy_services

technology_roles:
  - id: electricity_generation
    primary_service: service:electricity_generation
    technologies:
      - existing_gas_steam
      - ccgt
      - onshore_wind_turbine

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - pipeline_import

  - id: residential_energy_services
    primary_service: service:residential_energy_services
    technologies:
      - residential_electric_service

  - id: wind_resource_supply
    primary_service: service:wind_resource_supply
    technologies:
      - onshore_wind_resource

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: reg1_partition
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1

sites:
  - id: reg1_energy_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        reg1_partition: REG1

facilities:
  - id: reg1_gas_supply
    site: reg1_energy_hub
    stock:
      items:
        - metric: annual_activity
          observed:
            value: 500 GWh/year
            year: 2025
          technology: pipeline_import
    technology_role: gas_supply

  - id: reg1_generation
    available_technologies:
      - existing_gas_steam
      - ccgt
      - onshore_wind_turbine
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 3 MW
            year: 2025
          technology: existing_gas_steam

        - metric: installed_capacity
          observed:
            value: 2 MW
            year: 2025
          technology: ccgt

        - metric: installed_capacity
          observed:
            value: 5 MW
            year: 2025
          technology: onshore_wind_turbine
    technology_role: electricity_generation

  - id: reg1_residential_energy_services
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 12 MW
            year: 2025
          technology: residential_electric_service
    technology_role: residential_energy_services

  - id: reg1_wind_resource
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: onshore_wind_resource
    technology_role: wind_resource_supply

opportunities:
  - id: reg1_new_ccgt
    max_new_capacity: 2 MW
    siting:
      region_member:
        member: REG1
        partition: reg1_partition
    technology: ccgt

  - id: reg1_new_wind
    max_new_capacity: 50 MW
    siting:
      region_member:
        member: REG1
        partition: reg1_partition
    technology: onshore_wind_turbine

runs:
  - id: reg1_2025
    base_year: 2025
    currency_year: 2024
    region_partition: reg1_partition
