commodities:
  - id: emission:co2
    kind: emission

  - id: primary:lng
    kind: primary

  - id: service:industrial_heat
    kind: service

  - id: service:lng_supply
    kind: service

dsl_version: "0.2"

facilities:
  - id: industrial_heat_hub
    available_technologies:
      - lng_boiler_baseline
      - lng_boiler_with_ccs
    site: lng_industrial_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 60 MW
            year: 2025
          technology: lng_boiler_baseline

        - metric: installed_capacity
          observed:
            value: 5 MW
            year: 2025
          technology: lng_boiler_with_ccs
    technology_role: industrial_heat_supply

  - id: lng_supply_hub
    site: lng_industrial_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 100 MW
            year: 2025
          technology: lng_import_terminal
    technology_role: lng_supply

opportunities:
  - id: single_ccs_retrofit
    max_new_capacity: 40 MW
    siting:
      region_member:
        member: SINGLE
        partition: single_region
    technology: lng_boiler_with_ccs

region_partitions:
  - id: single_region
    layer: geo.demo
    mapping:
      kind: constant
      value: SINGLE
    members:
      - SINGLE

runs:
  - id: single_2025
    base_year: 2025
    currency_year: 2024
    region_partition: single_region

sites:
  - id: lng_industrial_hub
    location:
      point:
        lat: -27.47
        lon: 153.02
    membership_overrides:
      region_partitions:
        single_region: SINGLE

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

technologies:
  - id: lng_boiler_baseline
    inputs:
      - commodity: primary:lng
        basis: HHV
    emissions:
      - commodity: emission:co2
        factor: 0.056 t/GJ
    fixed_om: 2 AUD2024/kW/year
    investment_cost: 30 AUD2024/kW
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 0.9
    provides: service:industrial_heat

  - id: lng_boiler_with_ccs
    inputs:
      - commodity: primary:lng
        basis: HHV
    emissions:
      - commodity: emission:co2
        factor: 0.01 t/GJ
    fixed_om: 4 AUD2024/kW/year
    investment_cost: 55 AUD2024/kW
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 0.82
    provides: service:industrial_heat
    variable_om: 1.2 AUD2024/MWh

  - id: lng_import_terminal
    outputs:
      - commodity: primary:lng
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:lng_supply
    variable_om: 9 AUD2024/MWh

technology_roles:
  - id: industrial_heat_supply
    primary_service: service:industrial_heat
    technologies:
      - lng_boiler_baseline
      - lng_boiler_with_ccs
    transitions:
      - cost: 45 AUD2024/kW
        from: lng_boiler_baseline
        kind: retrofit
        to: lng_boiler_with_ccs

  - id: lng_supply
    primary_service: service:lng_supply
    technologies:
      - lng_import_terminal
