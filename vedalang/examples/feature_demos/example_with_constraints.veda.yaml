dsl_version: "0.2"

commodities:
  - id: emission:co2
    kind: emission

  - id: primary:natural_gas
    kind: primary

  - id: resource:solar_resource
    kind: material

  - id: resource:wind_resource
    kind: material

  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_generation
    kind: service

  - id: service:electricity_service
    kind: service

  - id: service:gas_supply
    kind: service

  - id: service:solar_supply
    kind: service

  - id: service:wind_supply
    kind: service

technologies:
  - id: ccgt_generation
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emissions:
      - commodity: emission:co2
        factor: 0.056 t/GJ
    lifetime: 30 year
    performance:
      kind: efficiency
      value: 0.55
    provides: service:electricity_generation

  - id: electric_service
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_service

  - id: pipeline_import
    outputs:
      - commodity: primary:natural_gas
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:gas_supply

  - id: solar_generation
    inputs:
      - commodity: resource:solar_resource
    outputs:
      - commodity: secondary:electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_generation

  - id: solar_resource_supply
    outputs:
      - commodity: resource:solar_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:solar_supply

  - id: wind_generation
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    lifetime: 25 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_generation

  - id: wind_resource_supply
    outputs:
      - commodity: resource:wind_resource
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:wind_supply

technology_roles:
  - id: electricity_generation
    primary_service: service:electricity_generation
    technologies:
      - ccgt_generation
      - solar_generation
      - wind_generation

  - id: electricity_service
    primary_service: service:electricity_service
    technologies:
      - electric_service

  - id: gas_supply
    primary_service: service:gas_supply
    technologies:
      - pipeline_import

  - id: solar_supply
    primary_service: service:solar_supply
    technologies:
      - solar_resource_supply

  - id: wind_supply
    primary_service: service:wind_supply
    technologies:
      - wind_resource_supply

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

region_partitions:
  - id: reg1_partition
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1

sites:
  - id: reg1_energy_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        reg1_partition: REG1

facilities:
  - id: reg1_fuel_supply
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 150 MW
            year: 2025
          technology: pipeline_import
    technology_role: gas_supply

  - id: reg1_generation
    available_technologies:
      - ccgt_generation
      - solar_generation
      - wind_generation
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 10 MW
            year: 2025
          technology: ccgt_generation

        - metric: installed_capacity
          observed:
            value: 3 MW
            year: 2025
          technology: solar_generation

        - metric: installed_capacity
          observed:
            value: 3 MW
            year: 2025
          technology: wind_generation
    technology_role: electricity_generation

  - id: reg1_service
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 16 MW
            year: 2025
          technology: electric_service
    technology_role: electricity_service

  - id: reg1_solar_supply
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: solar_resource_supply
    technology_role: solar_supply

  - id: reg1_wind_supply
    site: reg1_energy_hub
    stock:
      items:
        - metric: installed_capacity
          observed:
            value: 120 MW
            year: 2025
          technology: wind_resource_supply
    technology_role: wind_supply

opportunities:
  - id: reg1_solar_build
    max_new_capacity: 30 MW
    siting:
      region_member:
        member: REG1
        partition: reg1_partition
    technology: solar_generation

  - id: reg1_wind_build
    max_new_capacity: 40 MW
    siting:
      region_member:
        member: REG1
        partition: reg1_partition
    technology: wind_generation

runs:
  - id: reg1_2025
    base_year: 2025
    currency_year: 2024
    region_partition: reg1_partition
