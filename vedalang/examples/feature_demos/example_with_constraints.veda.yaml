# Model: core system definition (regions, years, commodities, cases).
model:
  name: ConstraintDemo
  description: Model with CO2 cap and renewable energy target
  regions:
    - REG1
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
  commodities:
    - id: emission:co2
      description: Carbon dioxide emissions
      type: emission
      unit: Mt
      combustible: false

    - id: primary:natural_gas
      description: Natural Gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: resource:solar_resource
      description: Solar resource
      type: other
      unit: PJ
      combustible: false

    - id: resource:wind_resource
      description: Wind resource
      type: other
      unit: PJ
      combustible: false

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false
  constraints:
    - name: co2_cap
      type: emission_cap
      commodity: emission:co2
      years:
        "2020": 100
        "2040": 50
      interpolation: interp_extrap
      limtype: up

    - name: ren_target
      type: activity_share
      commodity: secondary:electricity
      minimum_share: 0.3
      processes:
        - solar_generation
        - wind_generation

# Scoping: defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
scoping:
  sectors:
    - IND

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: import_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: provide_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: supply_solar_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:solar_resource

  - id: supply_wind_resource
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: ccgt_generation
    role: provide_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    emission_factors:
      emission:co2: 0.05
    efficiency: 0.55
    emission_factor_basis: HHV
    lifetime: 30

  - id: pipeline_import
    role: import_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: solar_generation
    role: provide_electricity
    inputs:
      - commodity: resource:solar_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25

  - id: solar_resource_supply
    role: supply_solar_resource
    inputs: []
    outputs:
      - commodity: resource:solar_resource
    efficiency: 1.0
    lifetime: 100

  - id: wind_generation
    role: provide_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 25

  - id: wind_resource_supply
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt_generation
    regions:
      - REG1
    sectors:
      - IND

  - variant: pipeline_import
    regions:
      - REG1

  - variant: solar_generation
    regions:
      - REG1
    sectors:
      - IND

  - variant: solar_resource_supply
    regions:
      - REG1

  - variant: wind_generation
    regions:
      - REG1
    sectors:
      - IND

  - variant: wind_resource_supply
    regions:
      - REG1

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - selector:
      variant: ccgt_generation
      region: REG1
      sector: IND
    stock: 10

  - selector:
      variant: pipeline_import
      region: REG1
    stock: 1000

  - selector:
      variant: solar_generation
      region: REG1
      sector: IND
    stock: 2

  - selector:
      variant: solar_resource_supply
      region: REG1
    stock: 1000

  - selector:
      variant: wind_generation
      region: REG1
      sector: IND
    stock: 2

  - selector:
      variant: wind_resource_supply
      region: REG1
    stock: 1000
