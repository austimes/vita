commodities:
  - id: secondary:electricity
    kind: secondary

  - id: service:electricity_supply
    kind: service

  - id: service:residential_electric_service
    kind: service

dsl_version: "0.2"

facilities:
  - id: reg1_residential_service
    site: reg1_hub
    stock:
      items:
        - adjust_to_base_year:
            using: residential_service_index
          metric: annual_activity
          observed:
            value: 100 GWh/year
            year: 2020
          technology: residential_device
    technology_role: residential_service

  - id: reg1_supply
    site: reg1_hub
    stock:
      items:
        - adjust_to_base_year:
            using: residential_service_index
          metric: annual_activity
          observed:
            value: 100 GWh/year
            year: 2020
          technology: generic_supply
    technology_role: electricity_supply

region_partitions:
  - id: reg1_partition
    layer: geo.demo
    mapping:
      kind: constant
      value: REG1
    members:
      - REG1

runs:
  - id: reg1_2020
    base_year: 2020
    currency_year: 2024
    region_partition: reg1_partition

sites:
  - id: reg1_hub
    location:
      point:
        lat: -33.87
        lon: 151.21
    membership_overrides:
      region_partitions:
        reg1_partition: REG1

spatial_layers:
  - id: geo.demo
    geometry_file: data/regions.geojson
    key: region_id
    kind: polygon

technologies:
  - id: generic_supply
    outputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:electricity_supply

  - id: residential_device
    inputs:
      - commodity: secondary:electricity
    lifetime: 100 year
    performance:
      kind: efficiency
      value: 1.0
    provides: service:residential_electric_service

technology_roles:
  - id: electricity_supply
    primary_service: service:electricity_supply
    technologies:
      - generic_supply

  - id: residential_service
    primary_service: service:residential_electric_service
    technologies:
      - residential_device

temporal_index_series:
  - id: residential_service_index
    unit: index
    values:
      "2020": 1.0
      "2030": 1.2
      "2040": 1.4
      "2050": 1.6
      "2060": 1.8
    base_year: 2020
