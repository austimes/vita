# VedaLang example: Capacity and activity bounds
# Demonstrates cap_bound, ncap_bound, and activity_bound constraints
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: BoundsExample
  description: Model demonstrating capacity and activity bounds
  regions:
    - REG1
  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: fuel:natural_gas
      type: fuel
      unit: PJ

    - id: resource:wind_resource
      type: other
      unit: PJ

    - id: energy:electricity
      type: energy
      unit: PJ

    - id: service:residential_energy_services
      type: service
      unit: PJ

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: fuel:natural_gas

  - id: supply_wind_resource
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: resource:wind_resource

  - id: generate_electricity
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: energy:electricity

  - id: provide_residential_energy_services
    stage: end_use
    required_inputs:
      - commodity: energy:electricity
    required_outputs:
      - commodity: service:residential_energy_services

process_variants:
  - id: pipeline_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: fuel:natural_gas
    efficiency: 1.0
    lifetime: 100

  - id: onshore_wind_resource
    role: supply_wind_resource
    inputs: []
    outputs:
      - commodity: resource:wind_resource
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: fuel:natural_gas
    outputs:
      - commodity: energy:electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    lifetime: 30

  - id: onshore_wind_turbine
    role: generate_electricity
    inputs:
      - commodity: resource:wind_resource
    outputs:
      - commodity: energy:electricity
    efficiency: 1.0
    investment_cost: 1200
    fixed_om_cost: 25
    lifetime: 25

  - id: existing_gas_steam
    role: generate_electricity
    inputs:
      - commodity: fuel:natural_gas
    outputs:
      - commodity: energy:electricity
    efficiency: 0.40
    lifetime: 40

  - id: electric_residential_devices
    role: provide_residential_energy_services
    inputs:
      - commodity: energy:electricity
    outputs:
      - commodity: service:residential_energy_services
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: pipeline_import
    regions: [REG1]

  - variant: onshore_wind_resource
    regions: [REG1]

  - variant: ccgt
    regions: [REG1]

  - variant: onshore_wind_turbine
    regions: [REG1]

  - variant: existing_gas_steam
    regions: [REG1]

  - variant: electric_residential_devices
    regions: [REG1]
    sectors: [RES]

process_parameters:
  - selector:
      variant: pipeline_import
      region: REG1
    activity_bound:
      up: 500.0  # Maximum 500 PJ/year import

  - selector:
      variant: ccgt
      region: REG1
    cap_bound:
      up: 10.0  # Maximum 10 GW total capacity
    ncap_bound:
      up: 2.0   # Maximum 2 GW new per period

  - selector:
      variant: onshore_wind_turbine
      region: REG1
    cap_bound:
      lo: 5.0   # Minimum 5 GW (renewable portfolio standard)
      up: 50.0  # Maximum 50 GW (grid integration limit)

  - selector:
      variant: existing_gas_steam
      region: REG1
    ncap_bound:
      fx: 3.0  # Exactly 3 GW existing capacity

  - selector:
      variant: electric_residential_devices
      region: REG1
      sector: RES
    stock: 1000
