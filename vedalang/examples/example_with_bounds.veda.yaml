# VedaLang example: Capacity and activity bounds
# Demonstrates cap_bound, ncap_bound, and activity_bound constraints
# Uses new VedaLang syntax (P4): process_roles, process_variants, availability

model:
  name: BoundsExample
  description: Model demonstrating capacity and activity bounds
  regions:
    - REG1
  milestone_years: [2020, 2030, 2040, 2050]

  commodities:
    - id: gas
      type: fuel
      unit: PJ

    - id: electricity
      type: energy
      unit: PJ

    - id: residential_demand
      type: service
      unit: PJ

segments:
  sectors: [RES]

process_roles:
  - id: import_gas
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: gas

  - id: generate_electricity
    stage: conversion
    required_inputs:
      - commodity: gas
    required_outputs:
      - commodity: electricity

  - id: generate_electricity_renewable
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: electricity
    required_outputs:
      - commodity: residential_demand

process_variants:
  - id: gas_import
    role: import_gas
    inputs: []
    outputs:
      - commodity: gas
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity
    efficiency: 0.55
    investment_cost: 800
    fixed_om_cost: 20
    lifetime: 30

  - id: wind
    role: generate_electricity_renewable
    inputs: []
    outputs:
      - commodity: electricity
    efficiency: 1.0
    investment_cost: 1200
    fixed_om_cost: 25
    lifetime: 25

  - id: existing_coal
    role: generate_electricity
    inputs:
      - commodity: gas
    outputs:
      - commodity: electricity
    efficiency: 0.40
    lifetime: 40

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [REG1]

  - variant: ccgt
    regions: [REG1]

  - variant: wind
    regions: [REG1]

  - variant: existing_coal
    regions: [REG1]

  - variant: residential_device
    regions: [REG1]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: REG1
    activity_bound:
      up: 500.0  # Maximum 500 PJ/year import

  - selector:
      variant: ccgt
      region: REG1
    cap_bound:
      up: 10.0  # Maximum 10 GW total capacity
    ncap_bound:
      up: 2.0   # Maximum 2 GW new per period

  - selector:
      variant: wind
      region: REG1
    cap_bound:
      lo: 5.0   # Minimum 5 GW (renewable portfolio standard)
      up: 50.0  # Maximum 50 GW (grid integration limit)

  - selector:
      variant: existing_coal
      region: REG1
    ncap_bound:
      fx: 3.0  # Exactly 3 GW existing capacity

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000
