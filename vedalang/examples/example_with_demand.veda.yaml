# VedaLang example demonstrating demand_projection scenario type
# Uses new VedaLang syntax (P4): process_roles, process_variants, demands

model:
  name: DemandExample
  regions: [REG1]
  milestone_years: [2020, 2030, 2040, 2050, 2060]

  commodities:
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

      combustible: false
    - id: service:residential_electric_service
      type: service
      unit: PJ
      description: Residential electricity demand

      combustible: false
segments:
  sectors: [RES]

process_roles:
  - id: supply_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_residential_electric_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_electric_service

process_variants:
  - id: generic_supply
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100

  - id: residential_device
    role: provide_residential_electric_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_electric_service
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: generic_supply
    regions: [REG1]

  - variant: residential_device
    regions: [REG1]
    sectors: [RES]

process_parameters:
  - selector:
      variant: generic_supply
      region: REG1
    stock: 1000

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000

demands:
  - commodity: service:residential_electric_service
    region: REG1
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100.0
      "2030": 120.0
      "2050": 160.0
