# VedaLang example demonstrating demand_projection scenario type
# Uses new VedaLang syntax (P4): process_roles, process_variants, demands

model:
  name: DemandExample
  regions: [REG1]
  milestone_years: [2020, 2030, 2040, 2050, 2060]

  commodities:
    - id: electricity
      type: energy
      unit: PJ
      description: Electricity

    - id: residential_demand
      type: service
      unit: PJ
      description: Residential electricity demand

segments:
  sectors: [RES]

process_roles:
  - id: generate_electricity
    stage: conversion
    required_inputs: []
    required_outputs:
      - commodity: electricity

  - id: deliver_residential
    stage: end_use
    required_inputs:
      - commodity: electricity
    required_outputs:
      - commodity: residential_demand

process_variants:
  - id: generic_supply
    role: generate_electricity
    inputs: []
    outputs:
      - commodity: electricity
    efficiency: 1.0
    lifetime: 100

  - id: residential_device
    role: deliver_residential
    inputs:
      - commodity: electricity
    outputs:
      - commodity: residential_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: generic_supply
    regions: [REG1]

  - variant: residential_device
    regions: [REG1]
    sectors: [RES]

process_parameters:
  - selector:
      variant: generic_supply
      region: REG1
    stock: 1000

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000

demands:
  - commodity: residential_demand
    region: REG1
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 100.0
      "2030": 120.0
      "2050": 160.0
