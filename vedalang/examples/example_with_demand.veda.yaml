# Model: core system definition (regions, years, commodities, cases).
model:
  name: DemandExample
  regions:
    - REG1
  milestone_years:
    - 2020
    - 2030
    - 2040
    - 2050
    - 2060
  commodities:
    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:residential_electric_service
      description: Residential electricity demand
      type: service
      unit: PJ
      combustible: false

# Scoping (current key name: segments): defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
segments:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: provide_residential_electric_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:residential_electric_service

  - id: supply_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: secondary:electricity

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: generic_supply
    role: supply_electricity
    inputs: []
    outputs:
      - commodity: secondary:electricity
    efficiency: 1.0
    lifetime: 100

  - id: residential_device
    role: provide_residential_electric_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:residential_electric_service
    efficiency: 1.0
    lifetime: 100

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: generic_supply
    regions:
      - REG1

  - variant: residential_device
    regions:
      - REG1
    sectors:
      - RES

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - selector:
      variant: generic_supply
      region: REG1
    stock: 1000

  - selector:
      variant: residential_device
      region: REG1
      sector: RES
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/segment).
demands:
  - commodity: service:residential_electric_service
    region: REG1
    values:
      "2020": 100.0
      "2030": 120.0
      "2050": 160.0
    interpolation: interp_extrap
    sector: RES
