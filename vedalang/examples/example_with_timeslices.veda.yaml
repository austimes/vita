# Model: core system definition (regions, years, commodities, cases).
model:
  name: TimesliceModel
  description: A model with 4 timeslices (2 seasons × 2 daynite) in role/variant syntax
  regions:
    - REG1
  milestone_years:
    - 2020
    - 2030
  timeslices:
    daynite:
      - name: Day
        code: D

      - name: Night
        code: N
    fractions:
      SD: 0.25
      SN: 0.23
      WD: 0.27
      WN: 0.25
    season:
      - name: Summer
        code: S

      - name: Winter
        code: W
  commodities:
    - id: primary:natural_gas
      description: Natural Gas
      type: fuel
      unit: PJ
      combustible: true
      hhv_mj_per_unit: 55.0
      lhv_mj_per_unit: 50.0

    - id: secondary:electricity
      description: Electricity
      type: energy
      unit: PJ
      combustible: false

    - id: service:electricity_demand
      description: Electricity demand service
      type: service
      unit: PJ
      combustible: false

# Scoping (current key name: segments): defines demand-side namespaces for instantiation/scoping.
# sectors: required enum values = RES, COM, IND, TRN, AGR, NE, OTH.
# end_uses: optional non-enum lowercase tokens (e.g., heating) to create scopes like RES.heating.
segments:
  sectors:
    - RES

# Process roles: reusable contracts (required I/O + units) shared by multiple variants.
process_roles:
  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_electricity_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:electricity_demand

  - id: supply_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

# Process variants: concrete technology definitions bound to roles.
process_variants:
  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 30

  - id: electric_device
    role: provide_electricity_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:electricity_demand
    efficiency: 1.0
    lifetime: 100

  - id: gas_import
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

# Availability: expands each variant into region/scope-specific process instances in the RES.
availability:
  - variant: ccgt
    regions:
      - REG1

  - variant: electric_device
    regions:
      - REG1
    sectors:
      - RES

  - variant: gas_import
    regions:
      - REG1

# Process parameters: selector-based overrides applied to matching instantiated process copies.
process_parameters:
  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: electric_device
      region: REG1
      sector: RES
    stock: 1000

  - selector:
      variant: gas_import
      region: REG1
    stock: 1000

# Demands: service demand trajectories by region and optional scope (sector/segment).
demands:
  - commodity: service:electricity_demand
    region: REG1
    values:
      "2020": 20
      "2030": 24
    interpolation: interp_extrap
    sector: RES
