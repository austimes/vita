# VedaLang example with timeslice definitions
# This model includes intra-annual temporal structure (seasons + day/night)
model:
  name: TimesliceModel
  description: A model with 4 timeslices (2 seasons × 2 daynite) in role/variant syntax

  regions:
    - REG1

  milestone_years: [2020, 2030]
  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25 # Summer-Day
      SN: 0.23 # Summer-Night
      WD: 0.27 # Winter-Day
      WN: 0.25 # Winter-Night
  commodities:
    - id: secondary:electricity
      type: energy
      unit: PJ
      description: Electricity

      combustible: false
    - id: primary:natural_gas
      type: fuel
      unit: PJ
      description: Natural Gas

      combustible: true
      lhv_mj_per_unit: 50.0
      hhv_mj_per_unit: 55.0
    - id: service:electricity_demand
      type: service
      unit: PJ
      description: Electricity demand service

      combustible: false
segments:
  sectors: [RES]

process_roles:
  - id: supply_natural_gas
    activity_unit: PJ
    capacity_unit: GW
    stage: supply
    required_inputs: []
    required_outputs:
      - commodity: primary:natural_gas

  - id: generate_electricity
    activity_unit: PJ
    capacity_unit: GW
    stage: conversion
    required_inputs:
      - commodity: primary:natural_gas
    required_outputs:
      - commodity: secondary:electricity

  - id: provide_electricity_service
    activity_unit: PJ
    capacity_unit: GW
    stage: end_use
    required_inputs:
      - commodity: secondary:electricity
    required_outputs:
      - commodity: service:electricity_demand

process_variants:
  - id: gas_import
    role: supply_natural_gas
    inputs: []
    outputs:
      - commodity: primary:natural_gas
        basis: HHV
    efficiency: 1.0
    lifetime: 100

  - id: ccgt
    role: generate_electricity
    inputs:
      - commodity: primary:natural_gas
        basis: HHV
    outputs:
      - commodity: secondary:electricity
    efficiency: 0.55
    lifetime: 30

  - id: electric_device
    role: provide_electricity_service
    inputs:
      - commodity: secondary:electricity
    outputs:
      - commodity: service:electricity_demand
    efficiency: 1.0
    lifetime: 100

availability:
  - variant: gas_import
    regions: [REG1]

  - variant: ccgt
    regions: [REG1]

  - variant: electric_device
    regions: [REG1]
    sectors: [RES]

process_parameters:
  - selector:
      variant: gas_import
      region: REG1
    stock: 1000

  - selector:
      variant: ccgt
      region: REG1
    stock: 10

  - selector:
      variant: electric_device
      region: REG1
      sector: RES
    stock: 1000

demands:
  - commodity: service:electricity_demand
    region: REG1
    sector: RES
    interpolation: interp_extrap
    values:
      "2020": 20
      "2030": 24
