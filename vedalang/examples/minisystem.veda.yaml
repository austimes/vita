# MiniSystem: Comprehensive VedaLang Stress Test Model
# Version: 1.3 - Fixed CAP2ACT conversion; reduced stock to force investment
# Issue: vedalang-scv, vedalang-rkf

model:
  name: MiniSystem
  description: Comprehensive stress-test for VedaLang

  regions:
    - NORTH
    - SOUTH

  start_year: 2020
  time_periods: [10, 10, 10]

  timeslices:
    season:
      - code: S
        name: Summer
      - code: W
        name: Winter
    daynite:
      - code: D
        name: Day
      - code: N
        name: Night
    fractions:
      SD: 0.25
      SN: 0.22
      WD: 0.28
      WN: 0.25

  commodities:
    - name: NG
      type: energy
      unit: PJ
      description: Natural Gas

    - name: ELC
      type: energy
      unit: PJ
      description: Electricity

    - name: CO2
      type: emission
      unit: Mt
      description: Carbon dioxide

    - name: RSD
      type: demand
      unit: PJ
      description: Residential demand

    - name: IND
      type: demand
      unit: PJ
      description: Industrial demand

    - name: H2
      type: material
      unit: PJ
      description: Hydrogen

  processes:
    # Supply process: Natural gas import
    - name: IMP_NG
      description: Natural gas import supply
      sets: [IMP]
      primary_commodity_group: NRGO
      outputs:
        - commodity: NG
      efficiency: 1.0
      cost: 5.0

    # Thermal generation: CCGT
    - name: PP_CCGT
      description: Combined cycle gas turbine
      sets: [ELE]
      primary_commodity_group: NRGO
      inputs:
        - commodity: NG
      outputs:
        - commodity: ELC
        - commodity: CO2
          emission_factor: 0.05
      efficiency: 0.55
      invcost: 800
      fixom: 20
      varom: 2
      life: 40
      stock: 5
      cap_bound:
        up: 500

    # Renewable generation: Wind
    - name: PP_WIND
      description: Onshore wind plant
      sets: [ELE]
      primary_commodity_group: NRGO
      outputs:
        - commodity: ELC
      efficiency: 1.0
      invcost: 1200
      fixom: 25
      varom: 1
      life: 40
      stock: 5

    # Demand device: Residential
    - name: DMD_RSD
      description: Residential electricity demand
      sets: [DMD]
      primary_commodity_group: DEMO
      inputs:
        - commodity: ELC
      outputs:
        - commodity: RSD
      efficiency: 1.0
      stock: 100
      life: 100

  trade_links:
    - origin: NORTH
      destination: SOUTH
      commodity: ELC
      bidirectional: true
      efficiency: 0.97

  scenarios:
    # CO2 price trajectory
    - name: CO2_Price
      description: Carbon price trajectory
      type: commodity_price
      commodity: CO2
      interpolation: interp_extrap
      values:
        "2025": 50
        "2030": 100
        "2050": 200

    # Demand projection for residential sector
    # Stock capacity: 5 GW per generator × 31.536 PJ/GW/yr ≈ 158 PJ/yr per generator
    # Total: 2 generators × 2 regions × 158 × 0.65 AF ≈ 411 PJ - but demand per region
    - name: DemandRSD
      description: Residential demand
      type: demand_projection
      commodity: RSD
      interpolation: interp_extrap
      values:
        "2020": 50
        "2030": 100
        "2050": 150

  constraints:
    # CO2 emission cap (relaxed for feasibility)
    - name: CO2_CAP
      type: emission_cap
      commodity: CO2
      limtype: up
      years:
        "2020": 1000
        "2050": 500
      interpolation: interp_extrap
