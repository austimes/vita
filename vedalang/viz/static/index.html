<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VedaLang RES Viewer</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>RES Viewer</h1>
      <div id="status">Ready</div>
    </header>

    <section class="controls">
      <label>File
        <select id="fileSelect"></select>
      </label>
      <label>Mode
        <select id="modeSelect">
          <option value="compiled" selected>compiled</option>
          <option value="source">source</option>
        </select>
      </label>
      <label>Granularity
        <select id="granularitySelect">
          <option value="role" selected>role</option>
          <option value="variant">variant</option>
          <option value="instance">instance</option>
        </select>
      </label>
      <label>Lens
        <select id="lensSelect">
          <option value="system" selected>system</option>
          <option value="trade">trade</option>
        </select>
      </label>
      <label>Case
        <select id="caseSelect">
          <option value="">(default)</option>
        </select>
      </label>
      <label>Sectors (comma)
        <input id="sectorInput" placeholder="RES,COM" />
      </label>
      <label>Segments (comma)
        <input id="segmentInput" placeholder="RES.heating" />
      </label>
      <button id="refreshBtn">Refresh</button>
    </section>

    <section class="regions">
      <span>Regions:</span>
      <div id="regionFilters"></div>
    </section>

    <main>
      <div id="graph"></div>
      <aside>
        <h2>Diagnostics</h2>
        <pre id="diagnostics"></pre>
        <h2>Details</h2>
        <pre id="details"></pre>
      </aside>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
